        const lengthSquared = dx * dx + dy * dy || 1;
        const t = this.clamp(((point.x - start.x) * dx + (point.y - start.y) * dy) / lengthSquared, 0, 1);
        const projection = {
          x: start.x + t * dx,
          y: start.y + t * dy
        };

        return this.distanceBetween(point, projection);
      }

      clamp(value, min, max) {
        return Math.max(min, Math.min(max, value));
      }

      getOverallDelta(player) {
        return this.clamp((player.overall - 80) / 20, -1, 1);
      }

      getOverallImpactMultiplier() {
        return 1.25;
      }

      getSuccessFactor(player, range = 0.35) {
        return 1 + this.getOverallDelta(player) * range * this.getOverallImpactMultiplier();
      }

      getErrorFactor(player, range = 0.35) {
        return 1 - this.getOverallDelta(player) * range * this.getOverallImpactMultiplier();
      }

      getDuelFactor(actor, opponent, range = 0.45) {
        const diff = this.clamp((actor.overall - opponent.overall) / 30, -1, 1);
        return 1 + diff * range * this.getOverallImpactMultiplier();
      }

      forwardValue(player, team, progress = null, hasForwardOption = true, underPressure = false) {
        const passProgress = progress ?? this.getPassProgress(this.possession, player, team);

        if (passProgress < -10) return underPressure && !hasForwardOption ? 0.72 : 0.12;
        if (passProgress < -4) return underPressure && !hasForwardOption ? 0.9 : 0.38;
        if (passProgress < 5) return 0.95;
        if (passProgress < 15) return 1.22;
        return 1.36;
      }

      lateralPassValue(progress, distance) {
        const isLateral = Math.abs(progress) <= 5;
        if (!isLateral) return 1;
        if (distance < 12) return 1.12;
        if (distance < 28) return 1.42;
        return 1.22;
      }

      pickWeighted(items) {
        if (!items || items.length === 0) return null;
        const total = items.reduce((sum, item) => sum + (item.weight || 0), 0);
        if (total <= 0) return items[0]?.player || null;
        let roll = Math.random() * total;

        for (const item of items) {
          roll -= item.weight;
          if (roll <= 0) return item.player;
        }

        return items[items.length - 1].player;
      }

      registerPossessionTransition(previousTeam, newTeam) {
        const now = this.getExactMatchMinute();
        const opponentLineHeight = this.getDefensiveLineHeight(previousTeam);

        this.lastPossessionTeam = previousTeam;
        this.lostBallTeam = previousTeam;
        this.postLossPressUntil = now + this.tacticalRules.postLossPress.durationMinutes;

        if (opponentLineHeight > this.tacticalRules.counter.lineHeightTrigger) {
          this.counterTeam = newTeam;
          this.counterUntil = now + this.tacticalRules.counter.durationMinutes;
          this.addEventLog({
            time: this.clock.textContent,
            type: newTeam.id,
            title: "Contra-ataque armado",
            detail: `${newTeam.name} recuperou com a linha rival alta e tem espaco para acelerar.`,
            meta: ["transicao ofensiva", `linha rival ${Math.round(opponentLineHeight)}%`]
          });
        } else {
          this.counterTeam = null;
          this.counterUntil = 0;
        }
      }

      isCounterTeam(team) {
        return this.counterTeam === team && this.getExactMatchMinute() <= this.counterUntil;
      }

      isPostLossPressTeam(team) {
        return this.lostBallTeam === team && this.getExactMatchMinute() <= this.postLossPressUntil;
      }

      getDefensiveLineHeight(team) {
        const defenders = team.players.filter((player) => this.isDefensiveLineRole(player.role));
        if (!defenders.length) return team.attacksDown ? 24 : 76;
        const averageY = defenders.reduce((sum, player) => sum + player.y, 0) / defenders.length;
        return team.attacksDown ? averageY : 100 - averageY;
      }

      updatePossession(player, animate, options = {}) {
        const previous = this.possession;
        this.possession = player;
        if (previous && previous.team !== player.team) {
          if (!options.skipTransition) {
            this.registerPossessionTransition(previous.team, player.team);
          }
          this.lastCompletedPass = null;
          this.protectedTeam = player.team;
          this.possessionProtectedUntil = this.getExactMatchMinute() + 1.5;
          previous.team.players.forEach((member) => {
            member.setTarget({ x: member.baseX, y: member.baseY });
          });
        }
        this.teams.forEach((team) => {
          team.players.forEach((member) => member.element.classList.toggle("has-ball", member === player));
        });
        this.calculatePressure();
        this.updateBall(animate);
        this.updateStatus();
      }

      updateBall(animate = true) {
        const duration = `${Math.round(this.baseBallMoveMs / this.getPlaybackRate())}ms`;
        this.ball.style.transitionDuration = animate ? duration : "0ms";
        this.ball.style.left = `${this.possession.x}%`;
        this.ball.style.top = `${this.possession.y}%`;

        if (!animate) {
          window.requestAnimationFrame(() => {
            this.ball.style.transitionDuration = duration;
          });
        }
      }

      updateScore() {
        this.score.textContent = `${this.getTeamScore(this.homeTeam)} x ${this.getTeamScore(this.awayTeam)}`;
      }

      updateControls() {
        const controlsByState = {
          pre: [{ label: "Iniciar", action: () => this.start(), primary: true }],
          playing: [{ label: "Pausar", action: () => this.pause(), primary: false }],
          paused: [{ label: "Continuar", action: () => this.start(), primary: true }],
          goalPause: [],
          halftime: [{ label: "Iniciar 2o tempo", action: () => this.start(), primary: true }],
          finished: [{ label: "Reiniciar", action: () => this.reset(), primary: true }]
        };

        this.controls.innerHTML = "";
        (controlsByState[this.state] || []).forEach((control) => {
          const button = document.createElement("button");
          button.className = `btn${control.primary ? " primary" : ""}`;
          button.type = "button";
          button.textContent = control.label;
          button.addEventListener("click", control.action);
          this.controls.appendChild(button);
        });
      }

      updateStatus(message) {
        if (message) {
          this.statusText.textContent = message;
          return;
        }
        const pressure = Math.round(this.possession.pressure * 100);
        this.statusText.textContent = `Posse: ${this.possession.team.name} ${this.possession.number} - marcado ${pressure}%`;
        this.statusDot.className = "status-dot";
        this.statusDot.style.background = this.possession.team.colors.main;
        this.statusDot.style.boxShadow = `0 0 0 4px ${this.possession.team.colors.glow}`;
      }

      updateClock() {
        let visibleMinute;
        const halfMinute = Math.floor(this.halfMinute);

        if (this.period === 1) {
          visibleMinute = halfMinute <= 45
            ? String(halfMinute).padStart(2, "0")
            : `45+${halfMinute - 45}`;
        } else {
          visibleMinute = halfMinute <= 45
            ? String(45 + halfMinute).padStart(2, "0")
            : `90+${halfMinute - 45}`;
        }

        this.clock.textContent = `${visibleMinute}'`;
      }

      formatPlayer(player) {
        return `${player.team.name} ${player.number} (${player.role})`;
      }

      formatTeamTarget(player) {
        return `${player.team.name} ${player.number}`;
      }

      playerLogData(player) {
        if (!player) return null;
        return {
          team: player.team.shortName,
          name: player.name,
          number: player.number,
          role: player.role,
          preferredPositions: [...player.preferredPositions],
          overall: player.overall,
          pressure: Number(player.pressure.toFixed(2)),
          x: Number(player.x.toFixed(1)),
          y: Number(player.y.toFixed(1)),
          space: Number((player.spaceScore || 0).toFixed(2))
        };
      }

      describePressure(pressure) {
        if (pressure < 0.25) return "livre";
        if (pressure < 0.55) return "pressionado";
        if (pressure < 0.78) return "bem marcado";
        return "sufocado";
      }

      describeDistance(distance) {
        if (distance < 12) return "passe curto";
        if (distance < 24) return "passe medio";
        return "passe longo";
      }

      getPassProgress(passer, receiver, team) {
        return team.attacksDown
          ? receiver.y - passer.y
          : passer.y - receiver.y;
      }

      describePassDirection(progress) {
        if (progress > 8) return "ganhando campo";
        if (progress < -7) return "recuando para manter a posse";
        return "mantendo a circulacao";
      }

      getPassTitle(progress, distance) {
        if (progress > 12) return "Passe vertical";
        if (progress < -7) return "Passe de seguranca";
        if (Math.abs(progress) <= 5) return "Passe lateral";
        if (distance > 24) return "Inversao de jogo";
        return "Passe trabalhado";
      }

      logBallMovement(passer, receiver, option = {}) {
        const intended = option.intended || receiver;
        const isTurnover = passer.team !== receiver.team;
        const distance = option.distance || this.distanceBetween(passer, intended);
        const progress = this.getPassProgress(passer, intended, passer.team);
        const risk = Math.round((option.errorChance || this.getPassErrorChance(passer, intended, distance)) * 100);
        const space = Math.round((intended.spaceScore || 0) * 100);
        const isCombo = !isTurnover && this.isGiveAndGoOption(intended);
        const title = isTurnover ? "Passe interceptado" : (isCombo ? "Tabela rapida" : this.getPassTitle(progress, distance));
        const detail = isTurnover
          ? `${this.formatPlayer(passer)} tentou acionar ${this.formatPlayer(intended)}, mas ${this.formatTeamTarget(receiver)} leu a linha do passe.`
          : `${this.formatPlayer(passer)} encontrou ${this.formatPlayer(receiver)} ${isCombo ? "no passe de retorno" : this.describePassDirection(progress)}.`;
        const meta = [
          this.describeDistance(distance),
          `espaco ${space}%`,
          `risco passe ${risk}%`,
          isTurnover ? "transicao para defender" : (isCombo ? "tabela" : `receptor ${this.describePressure(receiver.pressure)}`)
        ];
        const type = isTurnover ? "turnover" : passer.team.id;
        const fanText = isTurnover
          ? `${receiver.team.shortName} corta o passe e muda o jogo de lado.`
          : `${passer.team.shortName} trabalha a bola: ${receiver.name} recebe ${this.describePassDirection(progress)}.`;
        const consoleMessage = `${title}: ${detail} (${meta.join(", ")})`;

        console.log(`[${this.clock.textContent}] ${consoleMessage}`);
        this.addEventLog({
          time: this.clock.textContent,
          title,
          detail,
          fanText,
          meta,
          type,
          kind: isTurnover ? "turnover" : "pass",
          data: {
            passer: this.playerLogData(passer),
            receiver: this.playerLogData(receiver),
            intended: this.playerLogData(intended),
            distance: Number(distance.toFixed(1)),
            progress: Number(progress.toFixed(1)),
            risk,
            space,
            intercepted: isTurnover,
            laneSafety: Number(this.getPassingLaneSafety(passer, intended, this.getOpponentTeam(passer.team).players).toFixed(2))
          },
          consoleLogged: true
        });
      }

      logCarry(player) {
        const goalDistance = this.distanceBetween(player, this.getGoalPoint(player.team));
        const title = player.pressure < 0.25 ? "Conducao com espaco" : "Conducao sob pressao";
        const detail = `${this.formatPlayer(player)} carregou a bola para aproximar o time do gol.`;
        const meta = [
          this.describePressure(player.pressure),
          `${Math.round(goalDistance)} ate o gol`,
          "time sobe as linhas"
        ];
        const consoleMessage = `${title}: ${detail} (${meta.join(", ")})`;

        console.log(`[${this.clock.textContent}] ${consoleMessage}`);
        this.addEventLog({
          time: this.clock.textContent,
          title,
          detail,
          fanText: `${player.name} carrega e empurra ${player.team.shortName} para o ataque.`,
          meta,
          type: player.team.id,
          kind: "carry",
          data: {
            carrier: this.playerLogData(player),
            distanceToGoal: Number(goalDistance.toFixed(1)),
            pressure: Number(player.pressure.toFixed(2))
          },
          consoleLogged: true
        });
      }

      logDribble(player, marker, chance, success) {
        const title = success ? "Drible bem sucedido" : "Drible perdido";
        const detail = success
          ? `${this.formatPlayer(player)} passou por ${this.formatTeamTarget(marker)} e ganhou espaco para atacar.`
          : `${this.formatPlayer(player)} tentou driblar ${this.formatTeamTarget(marker)}, mas perdeu a bola.`;
        const meta = [
          `chance ${Math.round(chance * 100)}%`,
          this.describePressure(player.pressure),
          success ? "quebrou a marcacao" : "transicao defensiva"
        ];
        const consoleMessage = `${title}: ${detail} (${meta.join(", ")})`;

        console.log(`[${this.clock.textContent}] ${consoleMessage}`);
        this.addEventLog({
          time: this.clock.textContent,
          title,
          detail,
          fanText: success
            ? `${player.name} ganha no mano a mano e levanta a torcida.`
            : `${marker.team.shortName} leva a melhor no duelo e recupera a bola.`,
          meta,
          type: success ? player.team.id : "turnover",
          kind: success ? "dribble" : "turnover",
          data: {
            dribbler: this.playerLogData(player),
            marker: this.playerLogData(marker),
            chance: Math.round(chance * 100),
            success
          },
          consoleLogged: true
        });
      }

      logSteal(defender, carrier, chance) {
        const title = "Roubada de bola";
        const detail = `${this.formatPlayer(defender)} cercou ${this.formatPlayer(carrier)} e tomou a posse.`;
        const meta = [
          `pressao ${Math.round(carrier.pressure * 100)}%`,
          `chance ${Math.round(chance * 100)}%`,
          "recuperacao ativa"
        ];
        const consoleMessage = `${title}: ${detail} (${meta.join(", ")})`;

        console.log(`[${this.clock.textContent}] ${consoleMessage}`);
        this.addEventLog({
          time: this.clock.textContent,
          title,
          detail,
          fanText: `${defender.name} rouba e ${defender.team.shortName} tem a posse.`,
          meta,
          type: "turnover",
          kind: "steal",
          data: {
            defender: this.playerLogData(defender),
            carrier: this.playerLogData(carrier),
            chance: Math.round(chance * 100)
          },
          consoleLogged: true
        });
      }

      logOffside(passer, receiver, restartPlayer, line) {
        const title = "Impedimento";
        const detail = `${this.formatPlayer(receiver)} atacou as costas da defesa antes do passe de ${this.formatPlayer(passer)}.`;
        const meta = [
          `linha ${Math.round(line)}%`,
          `reposicao ${this.formatTeamTarget(restartPlayer)}`,
          "ataque ajusta a corrida"
        ];
        const consoleMessage = `${title}: ${detail} (${meta.join(", ")})`;

        console.log(`[${this.clock.textContent}] ${consoleMessage}`);
        this.addEventLog({
          time: this.clock.textContent,
          title,
          detail,
          fanText: `Bandeira sobe: ${receiver.name} estava a frente da linha.`,
          meta,
          type: "turnover",
          kind: "offside",
          data: {
            passer: this.playerLogData(passer),
            receiver: this.playerLogData(receiver),
            restartPlayer: this.playerLogData(restartPlayer),
            line: Math.round(line)
          },
          consoleLogged: true
        });
      }

      logChanceCreation(passer, receiver, option) {
        const intended = option.intended || receiver;
        const isTurnover = passer.team !== receiver.team;
        const risk = Math.round((option.errorChance || 0) * 100);
        const space = Math.round((intended.spaceScore || 0) * 100);
        const actionLabel = option.actionType === "cross" ? "cruzamento" : "passe decisivo";
        const title = isTurnover
          ? (option.actionType === "cross" ? "Cruzamento bloqueado" : "Passe decisivo cortado")
          : (option.actionType === "cross" ? "Cruzamento na area" : "Passe decisivo");
        const detail = isTurnover
          ? `${this.formatPlayer(passer)} tentou ${actionLabel} para ${this.formatPlayer(intended)}, mas ${this.formatTeamTarget(receiver)} fechou a jogada.`
          : `${this.formatPlayer(passer)} achou ${this.formatPlayer(receiver)} em condicao de atacar o gol.`;
        const meta = [
          this.describeDistance(option.distance),
          `espaco ${space}%`,
          `risco ${risk}%`,
          isTurnover ? "defesa cortou" : "chance criada"
        ];
        const type = isTurnover ? "turnover" : passer.team.id;
        const fanText = isTurnover
          ? `${receiver.team.shortName} bloqueia uma jogada perigosa.`
          : `${passer.name} encontra uma bola que deixa ${receiver.name} perto do gol.`;
        const consoleMessage = `${title}: ${detail} (${meta.join(", ")})`;

        console.log(`[${this.clock.textContent}] ${consoleMessage}`);
        this.addEventLog({
          time: this.clock.textContent,
          title,
          detail,
          fanText,
          meta,
          type,
          kind: isTurnover ? "turnover" : "chance",
          data: {
            passer: this.playerLogData(passer),
            receiver: this.playerLogData(receiver),
            intended: this.playerLogData(intended),
            actionType: option.actionType,
            distance: Number((option.distance || 0).toFixed(1)),
            risk,
            space,
            intercepted: isTurnover
          },
          consoleLogged: true
        });
      }

      logShot(player, goalChance, outcome, context = {}) {
        const distance = context.distanceMeters ?? Math.round(this.distanceMetersBetween(player, this.getGoalPoint(player.team)));
        const chance = Math.round(goalChance * 100);
        const assist = context.assist;
        const assistText = assist ? ` Assistencia de ${this.formatPlayer(assist.passer)}.` : " Sem assistencia direta.";
        const title = outcome === "goal" ? "Gol" : "Finalizacao defendida";
        const detail = outcome === "goal"
          ? `${this.formatPlayer(player)} marcou de ${distance} metros.${assistText}`
          : `${this.formatPlayer(player)} chutou de ${distance} metros, mas o goleiro defendeu e ficou com a bola.`;
        const meta = [
          `${distance} m`,
          `chance ${chance}%`,
          this.describePressure(player.pressure),
          outcome === "goal" ? (assist ? `assist ${assist.passer.number}` : "sem assist") : "defesa do goleiro"
        ];
        const consoleMessage = `${title}: ${detail} (${meta.join(", ")})`;
        const fanText = outcome === "goal"
          ? `${player.name} manda para a rede. ${player.team.shortName} comemora!`
          : `${player.name} finaliza, mas o goleiro segura para ${this.getOpponentTeam(player.team).shortName}.`;

        console.log(`[${this.clock.textContent}] ${consoleMessage}`);
        this.addEventLog({
          time: this.clock.textContent,
          title,
          detail,
          fanText,
          meta,
          type: outcome === "goal" ? "goal" : player.team.id,
          kind: outcome === "goal" ? "goal" : "shot",
          data: {
            shooter: this.playerLogData(player),
            assist: assist ? this.playerLogData(assist.passer) : null,
            distanceMeters: distance,
            chance,
            outcome,
            pressure: Number(player.pressure.toFixed(2)),
            scoreAfter: this.score.textContent
          },
          consoleLogged: true
        });
      }

      logKickoff(team, reason) {
        const taker = this.getKickoffPlayer(team);
        const title = "Saida de bola";
        const detail = `${team.name} reinicia pelo meio com ${this.formatPlayer(taker)} depois de ${reason}.`;
        const meta = [this.score.textContent, `atacando ${team.attacksDown ? "para baixo" : "para cima"}`];
        const consoleMessage = `${title}: ${detail} (${meta.join(", ")})`;

        console.log(`[${this.clock.textContent}] ${consoleMessage}`);
        this.addEventLog({
          time: this.clock.textContent,
          title,
          detail,
          fanText: `${team.shortName} repoe a bola em jogo pelo centro.`,
          meta,
          type: team.id,
          kind: "restart",
          data: {
            restartTeam: team.shortName,
            taker: this.playerLogData(taker),
            reason,
            score: this.score.textContent
          },
          consoleLogged: true
        });
      }

      createMatchId() {
        if (window.crypto?.randomUUID) {
          return window.crypto.randomUUID();
        }

        return `match-${Date.now()}-${Math.floor(Math.random() * 100000)}`;
      }

      addEventLog(timeOrEvent, message, type = "system") {
        const event = typeof timeOrEvent === "object"
          ? timeOrEvent
          : { time: timeOrEvent, title: message, detail: "", meta: [], type };
        const analytics = this.getLogAnalytics(event);
        const kind = event.kind || analytics.kind;
        const entry = {
          id: `${this.matchId}-${String(++this.logSequence).padStart(4, "0")}`,
          sequence: this.logSequence,
          matchId: this.matchId,
          time: event.time || this.clock.textContent,
          minute: Number(this.getExactMatchMinute().toFixed(2)),
          period: this.period,
          title: event.title || event.message || "",
          detail: event.detail || "",
          meta: event.meta || [],
          fanText: event.fanText || "",
          kind,
          data: event.data || {},
          analytics,
          type: event.type || "system",
          consoleLogged: Boolean(event.consoleLogged)
        };

        this.logEntries.unshift(entry);
        this.logEntries = this.logEntries.slice(0, 40);
        this.allLogEntries.push(entry);
        if (this.debugLogs && !entry.consoleLogged) {
          console.log(`[${entry.time}] ${this.formatLogEntry(entry)}`);
        }
        if (this.debugLogs) {
          console.log(`[${entry.time}] dados do lance`, entry.analytics);
        }
        this.addKeyMoment(entry);
        this.renderEventLog();
      }

      clearEventLog() {
        this.logEntries = [];
        this.allLogEntries = [];
        this.keyMomentEntries = [];
        this.logSequence = 0;
        this.renderEventLog();
      }

      formatLogEntry(entry) {
        const meta = entry.meta?.length ? ` (${entry.meta.join(", ")})` : "";
        const detail = entry.detail ? ` - ${entry.detail}` : "";
        const numbers = entry.analytics?.eventNumbers ? ` | numeros=${JSON.stringify(entry.analytics.eventNumbers)}` : "";
        return `${entry.kind || "event"} #${entry.sequence}: ${entry.title}${detail}${meta}${numbers}`;
      }

      getFullLogText() {
        const summary = this.getLogSummary();
        const header = [
          "Ballsfoot match logs",
          `matchId=${this.matchId}`,
          `placar=${this.score.textContent}`,
          `tempo=${this.clock.textContent}`,
          `posse=${this.possession?.team?.shortName || "-"} ${this.possession?.number || "-"}`,
          `eventos=${summary.totalEvents}`,
          `passes=${summary.pass.completed}/${summary.pass.total}`,
          `finalizacoes=${summary.shots.total}`,
          `apoiosMedios=${summary.shape.averageSupportOptionsNearCarrier}`,
          `xg=${summary.shots.xg.toFixed(2)}`,
          "---"
        ].join("\n");
        const body = this.allLogEntries
          .map((entry) => `[${entry.time}] ${this.formatLogEntry(entry)}`)
          .join("\n");

        return `${header}\n${body}`;
      }

      getLogJsonLines() {
        return this.allLogEntries
          .map((entry) => JSON.stringify(entry))
          .join("\n");
      }

      getLogJson() {
        return JSON.stringify(this.getLogExport(), null, 2);
      }

      getLogCsv() {
        const columns = [
          "sequence",
          "time",
          "minute",
          "period",
          "kind",
          "type",
          "title",
          "team",
          "player",
          "role",
          "pressure",
          "distance",
          "progress",
          "risk",
          "laneSafety",
          "supportOptions",
          "lineStretch",
          "strikerSeparation",
          "nearestTeammateDistance",
          "outcome",
          "score"
        ];
        const rows = this.allLogEntries.map((entry) => {
          const numbers = entry.analytics?.eventNumbers || {};
          const actor = this.getPrimaryActor(entry);
          return {
            sequence: entry.sequence,
            time: entry.time,
            minute: entry.minute,
            period: entry.period,
            kind: entry.kind,
            type: entry.type,
            title: entry.title,
            team: actor?.team || entry.analytics?.possession?.team || "",
            player: actor?.name || actor?.player || "",
            role: actor?.role || "",
            pressure: actor?.pressure ?? numbers.pressure ?? "",
            distance: numbers.distance ?? numbers.distanceMeters ?? numbers.distanceToGoal ?? "",
            progress: numbers.progress ?? "",
            risk: numbers.risk ?? "",
            laneSafety: numbers.laneSafety ?? "",
            supportOptions: entry.analytics?.shape?.supportOptionsNearCarrier ?? "",
            lineStretch: entry.analytics?.shape?.lineStretch ?? "",
            strikerSeparation: entry.analytics?.shape?.strikerSeparation ?? "",
            nearestTeammateDistance: entry.analytics?.shape?.averageNearestTeammateDistance ?? "",
            outcome: numbers.outcome ?? entry.data?.outcome ?? "",
            score: entry.analytics?.score || this.score.textContent
          };
        });

        return [
          columns.join(","),
          ...rows.map((row) => columns.map((column) => this.csvCell(row[column])).join(","))
        ].join("\n");
      }

      csvCell(value) {
        const text = value === null || value === undefined ? "" : String(value);
        return `"${text.replace(/"/g, '""')}"`;
      }

      getLogExport() {
        return {
          schemaVersion: 2,
          generatedAt: new Date().toISOString(),
          match: {
            id: this.matchId,
            score: this.score.textContent,
            clock: this.clock.textContent,
            period: this.period,
            minute: Number(this.getExactMatchMinute().toFixed(2)),
            state: this.state,
            speed: this.speed,
            playbackRate: this.getPlaybackRate(),
            teams: this.teams.map((team) => ({
              id: team.id,
              name: team.name,
              shortName: team.shortName,
              score: this.getTeamScore(team),
              formation: team.select.value,
              attacksDown: team.attacksDown,
              players: team.players.map((player) => ({
                name: player.name,
                number: player.number,
                overall: player.overall,
                preferredPositions: [...player.preferredPositions],
                role: player.role
              }))
            }))
          },
          summary: this.getLogSummary(),
          realismSignals: this.getRealismSignals(),
          events: this.allLogEntries
        };
      }

      getLogSummary() {
        const summary = {
          totalEvents: this.allLogEntries.length,
          byKind: {},
          byTeam: {},
          pass: {
            total: 0,
            completed: 0,
            intercepted: 0,
            completionRate: 0,
            averageRisk: 0,
            averageProgress: 0,
            averageLaneSafety: 0,
            highPressure: { total: 0, completed: 0, completionRate: 0 },
            lowLaneSafety: { total: 0, completed: 0, completionRate: 0 },
            byTeam: {}
          },
          shots: { total: 0, goals: 0, xg: 0, averageDistanceMeters: 0, conversionRate: 0 },
          turnovers: 0,
          pressure: { averageCarrierPressure: 0 },
          directness: { averagePassProgress: 0 },
          shape: {
            averageSupportOptionsNearCarrier: 0,
            lowSupportEvents: 0,
            averageNearestTeammateDistance: 0,
            averageLineStretch: 0,
            averageStrikerSeparation: 0,
            averageFullbackCoverRate: 0
          }
        };
        const passRisks = [];
        const passProgress = [];
        const passLaneSafety = [];
        const shotDistances = [];
        const carrierPressures = [];
        const supportOptions = [];
        const nearestTeammateDistances = [];
        const lineStretches = [];
        const strikerSeparations = [];
        const fullbackCoverRates = [];

        this.allLogEntries.forEach((entry) => {
          const kind = entry.kind || "system";
          summary.byKind[kind] = (summary.byKind[kind] || 0) + 1;
          summary.byTeam[entry.type] = (summary.byTeam[entry.type] || 0) + 1;
          if (["turnover", "steal", "offside"].includes(kind) || entry.type === "turnover") {
            summary.turnovers += 1;
          }
          if (entry.analytics?.possession?.pressure !== undefined) {
            carrierPressures.push(entry.analytics.possession.pressure);
          }
          if (entry.analytics?.shape) {
            const shape = entry.analytics.shape;
            if (shape.supportOptionsNearCarrier !== undefined) {
              supportOptions.push(shape.supportOptionsNearCarrier);
              if (shape.supportOptionsNearCarrier < 2) summary.shape.lowSupportEvents += 1;
            }
            if (shape.averageNearestTeammateDistance !== undefined) nearestTeammateDistances.push(shape.averageNearestTeammateDistance);
            if (shape.lineStretch !== undefined) lineStretches.push(shape.lineStretch);
            if (shape.strikerSeparation !== undefined) strikerSeparations.push(shape.strikerSeparation);
            if (shape.fullbackCoverRate !== undefined) fullbackCoverRates.push(shape.fullbackCoverRate);
          }

          const numbers = entry.analytics?.eventNumbers || {};
          if (this.isPassAttemptEntry(entry)) {
            const passerTeam = entry.data.passer.team || "unknown";
            const teamPass = summary.pass.byTeam[passerTeam] || {
              total: 0,
              completed: 0,
              intercepted: 0,
              completionRate: 0,
              averageRisk: 0,
              averageProgress: 0,
              averagePasserPressure: 0
            };
            const teamRisks = teamPass._risks || [];
            const teamProgress = teamPass._progress || [];
            const teamPressures = teamPass._pressures || [];
            const intercepted = Boolean(numbers.intercepted);

            summary.pass.total += 1;
            teamPass.total += 1;
            if (intercepted) {
              summary.pass.intercepted += 1;
              teamPass.intercepted += 1;
            } else {
              summary.pass.completed += 1;
              teamPass.completed += 1;
            }
            if (numbers.risk !== undefined) passRisks.push(numbers.risk);
            if (numbers.progress !== undefined) passProgress.push(numbers.progress);
            if (numbers.laneSafety !== undefined) passLaneSafety.push(numbers.laneSafety);
            if (entry.data.passer.pressure >= 0.8) {
              summary.pass.highPressure.total += 1;
              if (!intercepted) summary.pass.highPressure.completed += 1;
            }
            if (numbers.laneSafety !== undefined && numbers.laneSafety <= 0.25) {
              summary.pass.lowLaneSafety.total += 1;
              if (!intercepted) summary.pass.lowLaneSafety.completed += 1;
            }
            if (numbers.risk !== undefined) teamRisks.push(numbers.risk);
            if (numbers.progress !== undefined) teamProgress.push(numbers.progress);
            if (entry.data.passer.pressure !== undefined) teamPressures.push(entry.data.passer.pressure);
            teamPass._risks = teamRisks;
            teamPass._progress = teamProgress;
            teamPass._pressures = teamPressures;
            summary.pass.byTeam[passerTeam] = teamPass;
          }
          if (kind === "shot" || kind === "goal") {
            summary.shots.total += 1;
            if (kind === "goal" || numbers.outcome === "goal") summary.shots.goals += 1;
            if (numbers.chance !== undefined) summary.shots.xg += numbers.chance / 100;
            if (numbers.distanceMeters !== undefined) shotDistances.push(numbers.distanceMeters);
          }
        });

        summary.pass.completionRate = this.rate(summary.pass.completed, summary.pass.total);
        summary.pass.averageRisk = this.average(passRisks);
        summary.pass.averageProgress = this.average(passProgress);
        summary.pass.averageLaneSafety = this.average(passLaneSafety);
        summary.pass.highPressure.completionRate = this.rate(summary.pass.highPressure.completed, summary.pass.highPressure.total);
        summary.pass.lowLaneSafety.completionRate = this.rate(summary.pass.lowLaneSafety.completed, summary.pass.lowLaneSafety.total);
        Object.values(summary.pass.byTeam).forEach((teamPass) => {
          teamPass.completionRate = this.rate(teamPass.completed, teamPass.total);
          teamPass.averageRisk = this.average(teamPass._risks || []);
          teamPass.averageProgress = this.average(teamPass._progress || []);
          teamPass.averagePasserPressure = this.average(teamPass._pressures || []);
          delete teamPass._risks;
          delete teamPass._progress;
          delete teamPass._pressures;
        });
        summary.shots.xg = Number(summary.shots.xg.toFixed(2));
        summary.shots.averageDistanceMeters = this.average(shotDistances);
        summary.shots.conversionRate = this.rate(summary.shots.goals, summary.shots.total);
        summary.pressure.averageCarrierPressure = this.average(carrierPressures);
        summary.directness.averagePassProgress = summary.pass.averageProgress;
        summary.shape.averageSupportOptionsNearCarrier = this.average(supportOptions);
        summary.shape.averageNearestTeammateDistance = this.average(nearestTeammateDistances);
        summary.shape.averageLineStretch = this.average(lineStretches);
        summary.shape.averageStrikerSeparation = this.average(strikerSeparations);
        summary.shape.averageFullbackCoverRate = this.average(fullbackCoverRates);

        return summary;
      }

      isPassAttemptEntry(entry) {
        return Boolean(entry?.data?.passer && entry?.data?.intended);
      }

      getRealismSignals() {
        const summary = this.getLogSummary();
        const minutes = Math.max(this.getExactMatchMinute(), 1);
        const shotsPer90 = Number(((summary.shots.total / minutes) * 90).toFixed(1));
        const turnoversPer90 = Number((summary.turnovers / minutes * 90).toFixed(1));
        const signals = [
          {
            metric: "passCompletionRate",
            value: summary.pass.completionRate,
            target: "75-88",
            note: summary.pass.completionRate > 90
              ? "passes podem estar seguros demais"
              : (summary.pass.completionRate < 68 ? "passes podem estar caoticos demais" : "faixa plausivel")
          },
          {
            metric: "shotsPer90",
            value: shotsPer90,
            target: "18-32 somando os dois times",
            note: shotsPer90 > 36
              ? "jogo esta gerando finalizacoes demais"
              : (shotsPer90 < 12 ? "jogo esta travando antes da finalizacao" : "volume plausivel")
          },
          {
            metric: "turnoversPer90",
            value: turnoversPer90,
            target: "20-45 eventos relevantes",
            note: turnoversPer90 > 55
              ? "posses estao quebrando com frequencia alta"
              : (turnoversPer90 < 12 ? "marcacao pode estar passiva demais" : "faixa plausivel")
          },
          {
            metric: "averageCarrierPressure",
            value: summary.pressure.averageCarrierPressure,
            target: "0.25-0.55",
            note: summary.pressure.averageCarrierPressure > 0.65
              ? "portador vive sufocado"
              : (summary.pressure.averageCarrierPressure < 0.18 ? "portador encontra espaco facil demais" : "faixa plausivel")
          },
          {
            metric: "averagePassProgress",
            value: summary.pass.averageProgress,
            target: "2-8",
            note: summary.pass.averageProgress > 11
              ? "passes estao verticais demais"
              : (summary.pass.averageProgress < -1 ? "circulacao esta conservadora demais" : "progressao plausivel")
          },
          {
            metric: "supportOptionsNearCarrier",
            value: summary.shape.averageSupportOptionsNearCarrier,
            target: "2-3",
            note: summary.shape.averageSupportOptionsNearCarrier < 1.8
              ? "portador esta ficando sem triangulos de apoio"
              : (summary.shape.averageSupportOptionsNearCarrier > 3.4 ? "jogadores podem estar embolando perto da bola" : "apoios proximos plausiveis")
          },
          {
            metric: "lineStretch",
            value: summary.shape.averageLineStretch,
            target: "28-40",
            note: summary.shape.averageLineStretch > 44
              ? "bloco pode estar alongado demais"
              : (summary.shape.averageLineStretch < 24 ? "linhas podem estar compactas demais" : "compactacao vertical plausivel")
          },
          {
            metric: "strikerSeparation",
            value: summary.shape.averageStrikerSeparation,
            target: "10-22",
            note: summary.shape.averageStrikerSeparation < 8
              ? "atacantes estao ocupando espaco parecido demais"
              : (summary.shape.averageStrikerSeparation > 26 ? "dupla de ataque pode estar desconectada" : "separacao dos atacantes plausivel")
          },
          {
            metric: "fullbackCoverRate",
            value: summary.shape.averageFullbackCoverRate,
            target: "0.65-1",
            note: summary.shape.averageFullbackCoverRate < 0.55
              ? "laterais avancados podem estar sem cobertura do zagueiro"
              : "cobertura dos laterais plausivel"
          }
        ];

        return signals;
      }

      rate(part, total) {
        if (!total) return 0;
        return Number(((part / total) * 100).toFixed(1));
      }

      average(values) {
        if (!values.length) return 0;
        return Number((values.reduce((sum, value) => sum + Number(value || 0), 0) / values.length).toFixed(2));
      }

      getPrimaryActor(entry) {
        const data = entry.data || {};
        return data.shooter || data.carrier || data.passer || data.dribbler || data.defender || data.receiver || data.taker || null;
      }

      getTeamShapeMetrics(team, context = this.getTacticalContext(team)) {
        if (!team) return null;

        const fieldPlayers = team.players.filter((player) => player.role !== "GOL");
        const nearestDistances = fieldPlayers.map((player) => {
          const nearest = Math.min(...fieldPlayers
            .filter((teammate) => teammate !== player)
            .map((teammate) => this.distanceBetween(player, teammate)));
          return Number.isFinite(nearest) ? nearest : 0;
        });
        const forwards = team.players.filter((player) => this.isForwardRole(player.role));
        const strikerSeparation = forwards.length >= 2
          ? this.distanceBetween(forwards[0], forwards[1])
          : 0;
        const lineStretch = context.lineCenters.attack - context.lineCenters.defense;

        return {
          supportOptionsNearCarrier: this.getCarrierSupportOptionCount(team),
          averageNearestTeammateDistance: this.average(nearestDistances),
          lineStretch: Number(lineStretch.toFixed(2)),
          strikerSeparation: Number(strikerSeparation.toFixed(2)),
          fullbackCoverRate: this.getFullbackCoverRate(team, context)
        };
      }

      getCarrierSupportOptionCount(team) {
        if (!this.possession || this.possession.team !== team) return 0;

        const rules = this.tacticalRules.supportOptions;
        const opponents = this.getOpponentTeam(team).players;
        return team.players
          .filter((player) => player !== this.possession && player.role !== "GOL")
          .filter((player) => {
            const distance = this.distanceBetween(player, this.possession);
            if (distance < rules.closeMin || distance > rules.closeMax) return false;
            if (player.pressure > 0.82) return false;
            return this.getPassingLaneSafety(this.possession, player, opponents) > 0.34;
          })
          .length;
      }

      getFullbackCoverRate(team, context) {
        const fullbacks = team.players.filter((player) => this.isFullbackRole(player.role));
        const advancedFullbacks = fullbacks.filter((fullback) => {
          const progress = this.getAttackProgress(fullback, team);
          return progress > context.lineCenters.defense + 10;
        });
        if (!advancedFullbacks.length) return 1;

        const covered = advancedFullbacks.filter((fullback) => {
          const side = this.getPlayerSideSign(fullback);
          const centerBack = team.players.find((player) => player.role === "ZAG" && this.getPlayerSideSign(player) === side);
          if (!centerBack) return false;
          const fullbackProgress = this.getAttackProgress(fullback, team);
          const centerBackProgress = this.getAttackProgress(centerBack, team);
          return centerBackProgress <= fullbackProgress - 6 && Math.abs(centerBack.x - fullback.x) <= 34;
        }).length;

        return Number((covered / advancedFullbacks.length).toFixed(2));
      }

      getLogAnalytics(event = {}) {
        const possession = this.possession;
        const team = possession?.team;
        const context = team ? this.getTacticalContext(team) : null;
        const opponent = team ? this.getOpponentTeam(team) : null;
        const nearestOpponent = possession && opponent
          ? this.getNearestPlayers(opponent.players.filter((player) => player.role !== "GOL"), possession, 1)[0]
          : null;

        return {
          kind: event.kind || this.inferEventKind(event.title || ""),
          score: this.score.textContent,
          state: this.state,
          period: this.period,
          minute: this.clock.textContent,
          possession: possession ? {
            team: possession.team.shortName,
            player: possession.name,
            number: possession.number,
            role: possession.role,
            pressure: Number(possession.pressure.toFixed(2)),
            x: Number(possession.x.toFixed(1)),
            y: Number(possession.y.toFixed(1))
          } : null,
          nearestMarker: nearestOpponent ? {
            team: nearestOpponent.team.shortName,
            player: nearestOpponent.name,
            number: nearestOpponent.number,
            distance: Number(this.distanceBetween(possession, nearestOpponent).toFixed(1))
          } : null,
          tactic: context ? {
            phase: context.phase,
            intent: context.intent,
            pressureZone: context.pressureZone,
            ballSide: context.ballSide,
            lineCenters: {
              defense: Number(context.lineCenters.defense.toFixed(1)),
              midfield: Number(context.lineCenters.midfield.toFixed(1)),
              attack: Number(context.lineCenters.attack.toFixed(1))
            }
          } : null,
          shape: team && context ? this.getTeamShapeMetrics(team, context) : null,
          eventData: event.data || {},
          eventNumbers: this.getEventNumbers(event)
        };
      }

      getEventNumbers(event = {}) {
        const data = event.data || {};
        return {
          distance: data.distance,
          distanceMeters: data.distanceMeters,
          distanceToGoal: data.distanceToGoal,
          progress: data.progress,
          risk: data.risk,
          chance: data.chance,
          pressure: data.pressure,
          space: data.space,
          laneSafety: data.laneSafety,
          intercepted: data.intercepted,
          success: data.success,
          outcome: data.outcome
        };
      }

      inferEventKind(title) {
        if (title.includes("Gol")) return "goal";
        if (title.includes("Finalizacao")) return "shot";
        if (title.includes("Passe")) return "pass";
        if (title.includes("Drible")) return "dribble";
        if (title.includes("Roubada")) return "steal";
        if (title.includes("Contra")) return "transition";
        if (title.includes("Saida")) return "restart";
        if (title.includes("Impedimento")) return "offside";
        return "system";
      }

      async copyLogs(mode = "text") {
        if (!this.allLogEntries.length) {
          this.copyFeedback.textContent = "Ainda nao ha logs para copiar.";
          return;
        }
        const exporters = {
          text: { label: "texto", getText: () => this.getFullLogText() },
          jsonl: { label: "JSONL", getText: () => this.getLogJsonLines() },
          csv: { label: "CSV", getText: () => this.getLogCsv() }
        };
        const exporter = exporters[mode] || exporters.text;
        const text = exporter.getText();

        try {
          if (navigator.clipboard?.writeText) {
            await navigator.clipboard.writeText(text);
          } else {
            this.copyTextFallback(text);
          }
          this.copyFeedback.textContent = `${this.allLogEntries.length} logs em ${exporter.label} copiados.`;
        } catch (error) {
          this.copyTextFallback(text);
          this.copyFeedback.textContent = `${this.allLogEntries.length} logs em ${exporter.label} copiados.`;
        }
      }

      downloadLogs() {
        if (!this.allLogEntries.length) {
          this.copyFeedback.textContent = "Ainda nao ha logs para baixar.";
          return;
        }
        const blob = new Blob([this.getLogJson()], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.href = url;
        link.download = `ballsfoot-${this.matchId}.json`;
        document.body.appendChild(link);
        link.click();
        link.remove();
        URL.revokeObjectURL(url);
        this.copyFeedback.textContent = `${this.allLogEntries.length} logs baixados em JSON.`;
      }

      copyTextFallback(text) {
        const textarea = document.createElement("textarea");
        textarea.value = text;
        textarea.setAttribute("readonly", "");
        textarea.style.position = "fixed";
        textarea.style.opacity = "0";
        document.body.appendChild(textarea);
        textarea.select();
        document.execCommand("copy");
        textarea.remove();
      }

      addKeyMoment(entry) {
        if (!this.isKeyMoment(entry)) return;
        this.keyMomentEntries.unshift(entry);
        this.keyMomentEntries = this.keyMomentEntries.slice(0, 30);
      }

      isKeyMoment(entry) {
        const title = entry.title || "";
        return entry.type === "goal" ||
          title.includes("Finalizacao") ||
          title.includes("Entrou na zona") ||
          title.includes("Passe decisivo") ||
          title.includes("Cruzamento") ||
          title.includes("Contra-ataque") ||
          title.includes("Drible") ||
          title.includes("Saida de bola") ||
          title.includes("Impedimento");
      }

      getTeamPanelStats() {
        const totalPossessionSamples = [...this.possessionSamples.values()]
          .reduce((sum, value) => sum + value, 0);
        const statsByTeam = new Map(this.teams.map((team) => [team.id, {
          team,
          possession: totalPossessionSamples
            ? Math.round(((this.possessionSamples.get(team.id) || 0) / totalPossessionSamples) * 100)
            : 0,
          shots: 0,
          completedPasses: 0,
          missedPasses: 0
        }]));

        this.allLogEntries.forEach((entry) => {
          if (this.isPassAttemptEntry(entry)) {
            const team = this.teams.find((candidate) => candidate.shortName === entry.data.passer.team);
            const stats = team ? statsByTeam.get(team.id) : null;
            if (!stats) return;

            if (entry.data.intercepted || entry.analytics?.eventNumbers?.intercepted) {
              stats.missedPasses += 1;
            } else {
              stats.completedPasses += 1;
            }
            return;
          }

          if ((entry.kind === "shot" || entry.kind === "goal") && entry.data?.shooter) {
            const team = this.teams.find((candidate) => candidate.shortName === entry.data.shooter.team);
            const stats = team ? statsByTeam.get(team.id) : null;
            if (stats) stats.shots += 1;
          }
        });

        return this.teams.map((team) => statsByTeam.get(team.id));
      }

      renderMatchStats() {
        if (!this.matchStats) return;

        const header = document.createElement("div");
        header.className = "match-stats-head";
        ["Time", "Posse", "Fin.", "Certos", "Errados"].forEach((label) => {
          const cell = document.createElement("span");
          cell.textContent = label;
          header.appendChild(cell);
        });

        const rows = this.getTeamPanelStats().map((stats) => {
          const row = document.createElement("div");
          const team = document.createElement("span");
          const possession = document.createElement("span");
          const shots = document.createElement("span");
          const completed = document.createElement("span");
          const missed = document.createElement("span");

          row.className = "match-stats-row";
          row.style.setProperty("--team-color", stats.team.colors.main);
          team.className = "match-stats-team";
          team.textContent = stats.team.shortName;

          [possession, shots, completed, missed].forEach((cell) => {
            cell.className = "match-stats-value";
          });
          possession.textContent = `${stats.possession}%`;
          shots.textContent = stats.shots;
          completed.textContent = stats.completedPasses;
          missed.textContent = stats.missedPasses;

          row.append(team, possession, shots, completed, missed);
          return row;
        });

        this.matchStats.replaceChildren(header, ...rows);
      }

      renderEventLog() {
        this.renderMatchStats();
        this.renderKeyMoments();
        this.eventLog.innerHTML = "";
        const total = this.keyMomentEntries.length;
        this.logCount.textContent = `${total} ${total === 1 ? "lance" : "lances"}`;
      }

      getEventColor(entry) {
        if (entry.type === "goal") return "var(--yellow)";
        if (entry.type === "turnover") return "#f87171";
        if (entry.type === "system") return "#6ee7b7";

        const team = this.teams.find((item) => item.id === entry.type);
        return team?.colors?.main || "rgba(255, 255, 255, 0.24)";
      }

      renderKeyMoments() {
        this.keyMoments.innerHTML = "";

        if (!this.keyMomentEntries.length) {
          const empty = document.createElement("div");
          const time = document.createElement("time");
          const copy = document.createElement("div");
          const title = document.createElement("strong");
          const detail = document.createElement("span");

          empty.className = "key-moment system";
          empty.style.borderLeftColor = this.getEventColor({ type: "system" });
          time.textContent = "--";
          title.textContent = "Timeline";
          detail.textContent = "Lances importantes vao aparecer aqui.";
          copy.append(title, detail);
          empty.append(time, copy);
          this.keyMoments.appendChild(empty);
          return;
        }

        this.keyMomentEntries.forEach((entry) => {
          const item = document.createElement("div");
          const time = document.createElement("time");
          const copy = document.createElement("div");
          const title = document.createElement("strong");
          const detail = document.createElement("span");

          item.className = `key-moment ${entry.type}`;
          item.style.borderLeftColor = this.getEventColor(entry);
          time.textContent = entry.time;
          title.textContent = entry.title;
          detail.textContent = entry.fanText || entry.detail || entry.meta?.[0] || "lance importante";

          copy.append(title, detail);
          item.append(time, copy);
          this.keyMoments.appendChild(item);
        });
      }
    }

    document.addEventListener("DOMContentLoaded", () => {
      window.tacticsGame = new Game();
    });
  </script>
</body>
