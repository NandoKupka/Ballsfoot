            weight: Math.max(0.5, proximity * forwardBias * lateralBias * openSpaceBias * pressureBias * distanceBias * laneSafetyBias * triangleBias * switchBias * comboBias * reliefBias * goalkeeperBias * counterBias * buildUpBias * lateralEscapeBias * intentBias * offsideBias * overallBias)
          };
        });

        const intended = this.pickWeighted(weighted);
        if (!intended) return null;

        const distance = this.distanceBetween(this.possession, intended);
        const offside = this.isOffsidePass(this.possession, intended);
        if (offside.offside) {
          return {
            receiver: this.getOffsideRestartPlayer(this.possession.team),
            intended,
            offside: true,
            offsideLine: offside.line,
            distance,
            errorChance: 0
          };
        }

        const errorChance = this.getPassErrorChance(this.possession, intended, distance);
        const intercepted = Math.random() < errorChance;
        const receiver = intercepted
          ? this.chooseInterceptor(opponents, this.possession, intended)
          : intended;

        return { receiver, intended, intercepted, distance, errorChance };
      }

      getPassPool(teammates) {
        if (this.possession.role !== "GOL") return teammates;
        const shortOptions = teammates.filter((player) => {
          const distance = this.distanceBetween(this.possession, player);
          return ["ZAG", "LE", "LD", "VOL"].includes(player.role) || distance < 24;
        });

        return shortOptions.length ? shortOptions : teammates;
      }

      getGoalkeeperPassBias(player, distance) {
        if (this.possession.role !== "GOL") return 1;
        if (["ZAG", "LE", "LD", "VOL"].includes(player.role) && distance < 32) return 1.65;
        if (distance > 34) return 0.22;
        return 0.85;
      }

      getBuildUpPassBias(passer, receiver, distance, laneSafety) {
        const rules = this.tacticalRules.passing;
        const team = passer.team;
        const progress = this.getTeamBallProgress(team);
        const holdingMid = this.getHoldingMidfielder(team);
        const playmaker = this.getPlaymaker(team);
        const numberNine = this.getNumberNine(team);
        const cleanEnough = laneSafety > 0.48;
        let bias = 1;

        if ((passer.role === "GOL" || this.isDefensiveLineRole(passer.role)) && receiver === holdingMid && distance < 34 && cleanEnough) {
          bias *= rules.buildThroughVolanteBias;
        }

        if (passer.role === "ZAG" && receiver.role === "ZAG" && progress < 48) {
          bias *= 1.22;
        }

        if (passer === holdingMid) {
          if (receiver === playmaker && cleanEnough) bias *= rules.playmakerBias;
          if (["ME", "MD", "LE", "LD"].includes(receiver.role) && cleanEnough) bias *= rules.wingOutletBias;
          if (this.isForwardRole(receiver.role) && cleanEnough) bias *= receiver === numberNine ? rules.strikerOutletBias * 1.18 : rules.strikerOutletBias;
          if (receiver.role === "ZAG" && progress > 42 && passer.pressure < 0.5) bias *= 0.45;
        }

        if (passer === playmaker && receiver === numberNine && cleanEnough) {
          bias *= 1.35;
        }

        return bias;
      }

      getLateralPressureEscapeBias(passer, receiver, progress, distance, laneSafety) {
        if (!this.isFullbackRole(passer.role) && passer.role !== "ME" && passer.role !== "MD") return 1;
        if (passer.pressure < 0.56) return 1;
        if (passer.x > 34 && passer.x < 66) return 1;

        const rules = this.tacticalRules.passing;
        const passerSide = Math.sign(passer.x - 50) || this.getPlayerSideSign(passer);
        const receiverSide = Math.sign(receiver.x - 50) || this.getPlayerSideSign(receiver);
        const isOppositeSide = receiverSide && receiverSide !== passerSide;
        const isRecycle = progress < -4 || ["VOL", "MC", "ZAG"].includes(receiver.role);
        const cleanEnough = laneSafety > 0.52;

        if (isOppositeSide && distance > 22 && cleanEnough) return rules.lateralPressureSwitchBias;
        if (isRecycle && cleanEnough) return rules.lateralPressureRecycleBias;
        if (receiverSide === passerSide && progress > 2) return rules.lateralPressureSameSidePenalty;
        return 1;
      }

      getIntentPassBias(passer, receiver, intent, progress, distance, laneSafety) {
        const rules = this.tacticalRules.passing;
        const holdingMid = this.getHoldingMidfielder(passer.team);
        const playmaker = this.getPlaymaker(passer.team);
        const numberNine = this.getNumberNine(passer.team);

        if (this.isSupportStriker(passer) && this.isWideAttackCarrier(passer) && receiver === numberNine && laneSafety > 0.42) {
          return 1.9;
        }

        if (intent === "switch") {
          if (this.isSwitchOption(passer, receiver, receiver) && laneSafety > 0.5) return rules.intentSwitchBias;
          if (receiver === holdingMid || receiver.role === "ZAG" || progress < -5) return rules.intentRecycleBias;
          if (progress > 8 && Math.sign(receiver.x - 50) === Math.sign(passer.x - 50)) return 0.58;
        }

        if (intent === "recycle") {
          if (receiver === holdingMid || receiver.role === "ZAG" || progress < -4) return rules.intentRecycleBias;
          if (progress > 10 && distance > 22) return 0.62;
        }

        if (intent === "progress") {
          if (receiver === holdingMid || receiver === playmaker) return 1.22;
          if (progress > 4 && laneSafety > 0.5) return rules.intentProgressBias;
          if (progress < -8 && passer.pressure < 0.52) return 0.72;
        }

        if (intent === "create" || intent === "finish") {
          if (this.isForwardRole(receiver.role) || receiver === playmaker) return rules.intentCreateBias;
          if (["ME", "MD"].includes(receiver.role) && laneSafety > 0.55) return 1.16;
        }

        return 1;
      }

      hasStructuredPassOption(player) {
        const teammates = player.team.players.filter((teammate) => teammate !== player);
        const opponents = this.getOpponentTeam(player.team).players;
        return teammates.some((teammate) => {
          const distance = this.distanceBetween(player, teammate);
          if (distance > 34) return false;
          if (teammate.pressure > 0.62) return false;
          if (this.getPassingLaneSafety(player, teammate, opponents) < 0.58) return false;

          const holdingMid = this.getHoldingMidfielder(player.team);
          const playmaker = this.getPlaymaker(player.team);
          if ((player.role === "GOL" || this.isDefensiveLineRole(player.role)) && teammate === holdingMid) return true;
          if (player === holdingMid && (teammate === playmaker || ["ME", "MD", "LE", "LD"].includes(teammate.role) || this.isForwardRole(teammate.role))) return true;
          if (player === playmaker && this.isForwardRole(teammate.role)) return true;
          return teammate.spaceScore > 0.52 && this.getPassProgress(player, teammate, player.team) >= -4;
        });
      }

      getComboPassBias(player) {
        if (!this.isGiveAndGoOption(player)) return 1;
        return this.isInFinalThird(this.possession) ? 3 : 2.15;
      }

      getCounterPassBias(player, progress) {
        if (!this.isCounterTeam(this.possession.team)) return 1;
        if (progress > 12 && this.canJoinAttack(player)) return this.tacticalRules.counter.forwardPassBias;
        if (progress > 4) return 1.22;
        if (progress < -4) return 0.62;
        return 1;
      }

      isOffsidePass(passer, receiver) {
        if (!this.tacticalRules.offside.active) return { offside: false, line: null };
        if (passer.team !== receiver.team) return { offside: false, line: null };
        if (!this.isOffsideEligible(receiver)) return { offside: false, line: null };
        if (this.getPassProgress(passer, receiver, passer.team) <= 0) return { offside: false, line: null };

        const receiverProgress = this.getAttackProgress(receiver, passer.team);
        const ballProgress = this.getAttackProgress(passer, passer.team);
        const line = this.getOffsideLine(passer.team);

        return {
          offside: receiverProgress > 50 &&
            receiverProgress > ballProgress + this.tacticalRules.offside.margin &&
            receiverProgress > line + this.tacticalRules.offside.margin,
          line
        };
      }

      isOffsidePosition(player, point = player) {
        if (!this.tacticalRules.offside.active) return false;
        if (!this.isOffsideEligible(player)) return false;

        const progress = this.getAttackProgress(point, player.team);
        const ballProgress = this.getAttackProgress(this.possession, player.team);
        const line = this.getOffsideLine(player.team);

        return progress > 50 &&
          progress > ballProgress + this.tacticalRules.offside.margin &&
          progress > line + this.tacticalRules.offside.margin;
      }

      isOffsideEligible(player) {
        return this.isForwardRole(player.role) || ["ME", "MD", "ALA"].includes(player.role);
      }

      getOffsideLine(attackingTeam) {
        const defendingTeam = this.getOpponentTeam(attackingTeam);
        const progresses = defendingTeam.players
          .map((player) => this.getAttackProgress(player, attackingTeam))
          .sort((a, b) => b - a);

        return progresses[1] ?? progresses[0] ?? 100;
      }

      getDefensiveLineProgressAgainst(attackingTeam) {
        const defendingTeam = this.getOpponentTeam(attackingTeam);
        const defenders = defendingTeam.players.filter((player) => this.isDefensiveLineRole(player.role));
        const candidates = defenders.length ? defenders : defendingTeam.players.filter((player) => player.role !== "GOL");
        if (!candidates.length) return 70;

        return candidates.reduce((sum, player) => sum + this.getAttackProgress(player, attackingTeam), 0) / candidates.length;
      }

      getPocketProgress(attackingTeam) {
        const carrierProgress = this.getAttackProgress(this.possession, attackingTeam);
        const lineProgress = this.getDefensiveLineProgressAgainst(attackingTeam);
        const pocket = lineProgress - this.tacticalRules.shape442.mcPocketDepth;

        return this.clamp(Math.max(carrierProgress + 5, pocket), 45, 74);
      }

      getAttackProgress(point, team) {
        return team.attacksDown ? point.y : 100 - point.y;
      }

      pointFromAttackProgress(point, team, progress) {
        return {
          x: point.x,
          y: team.attacksDown ? progress : 100 - progress
        };
      }

      getOnsideAdjustedPoint(player, point) {
        if (!this.isOffsideEligible(player) || player.team !== this.possession.team) return point;

        const ballProgress = this.getAttackProgress(this.possession, player.team);
        const offsideLine = this.getOffsideLine(player.team);
        const maxProgress = Math.max(50, Math.min(ballProgress, offsideLine) - this.tacticalRules.offside.avoidDrop);
        const pointProgress = this.getAttackProgress(point, player.team);

        if (pointProgress <= maxProgress) return point;
        return this.pointFromAttackProgress(point, player.team, maxProgress);
      }

      getOffsideRestartPlayer(attackingTeam) {
        const defendingTeam = this.getOpponentTeam(attackingTeam);
        const defenders = defendingTeam.players.filter((player) => this.isDefensiveLineRole(player.role));
        const candidates = defenders.length ? defenders : defendingTeam.players;

        return this.getNearestPlayers(candidates, this.possession, 1)[0] || defendingTeam.players[0];
      }

      tryFinalThirdAction(carrier) {
        if (!this.canCreateFinalThirdAction(carrier)) return false;

        const actionType = this.shouldTryCross(carrier) ? "cross" : "through";
        const target = this.findFinalThirdTarget(carrier, actionType);
        if (!target) return false;

        const distance = this.distanceBetween(carrier, target);
        const progress = this.getPassProgress(carrier, target, carrier.team);
        const urgency = this.clamp((42 - this.distanceBetween(carrier, this.getGoalPoint(carrier.team))) / 28, 0, 1);
        const actionChance = this.clamp(
          ((actionType === "cross" ? 0.32 : 0.28) +
            urgency * 0.22 +
            target.spaceScore * 0.18 -
            carrier.pressure * 0.1) * this.getSuccessFactor(carrier, 0.16) * this.getSuccessFactor(target, 0.08),
          0.18,
          0.72
        );

        if (Math.random() > actionChance) return false;

        const opponents = this.getOpponentTeam(carrier.team).players;
        const errorChance = this.clamp(
          (this.getPassErrorChance(carrier, target, distance) +
            (actionType === "cross" ? 0.035 : 0.015) -
            target.spaceScore * 0.035) * this.getErrorFactor(carrier, 0.12),
          0.015,
          0.24
        );
        const intercepted = Math.random() < errorChance;
        const receiver = intercepted ? this.chooseInterceptor(opponents, carrier, target) : target;

        this.logChanceCreation(carrier, receiver, {
          intended: target,
          actionType,
          distance,
          progress,
          errorChance,
          intercepted
        });

        if (!intercepted) {
          this.registerCompletedPass(carrier, target, {
            intended: target,
            actionType,
            distance,
            progress,
            errorChance,
            intercepted: false
          });
          this.triggerGiveAndGoRun(carrier, target, true);
          target.spaceScore = Math.max(target.spaceScore, 0.9);
        }

        this.updatePossession(receiver, true);
        return true;
      }

      canCreateFinalThirdAction(player) {
        if (["GOL", "ZAG", "VOL"].includes(player.role)) return false;
        const distanceToGoal = this.distanceBetween(player, this.getGoalPoint(player.team));
        return distanceToGoal < 45 && !this.isInShotZone(player);
      }

      shouldTryCross(player) {
        const wide = this.isWideRole(player.role) || this.isFullbackRole(player.role) || this.isSupportStriker(player);
        const inWideLane = player.x < 28 || player.x > 72;
        return wide && inWideLane;
      }

      findFinalThirdTarget(passer, actionType) {
        const teammates = passer.team.players.filter((player) => player !== passer);
        const opponents = this.getOpponentTeam(passer.team).players;
        const candidates = teammates
          .filter((player) => this.isAttackingRole(player.role) || this.isMidfieldRole(player.role))
          .filter((player) => !this.isOffsidePass(passer, player).offside)
          .map((player) => {
            const distanceToGoal = this.distanceBetween(player, this.getGoalPoint(player.team));
            const passDistance = this.distanceBetween(passer, player);
            const progress = this.getPassProgress(passer, player, passer.team);
            const laneSafety = this.getPassingLaneSafety(passer, player, opponents);
            const goalThreat = this.clamp((40 - distanceToGoal) / 30, 0, 1);
            const forwardFit = actionType === "cross" ? this.clamp((30 - distanceToGoal) / 22, 0, 1) : this.clamp((progress + 8) / 22, 0, 1);
            const spacing = this.clamp(this.getNearestTeammateDistance(player) / 13, 0, 1);
            const distanceFit = this.getPassDistanceBias(passDistance);
            const pressureFit = Math.max(0.18, 1 - player.pressure * 0.82);
            const numberNineBonus = player === this.getNumberNine(passer.team)
              ? (actionType === "cross" ? 0.26 : 0.1)
              : 0;
            const score = goalThreat * 0.3 + forwardFit * 0.24 + laneSafety * 0.2 + player.spaceScore * 0.14 + spacing * 0.07 + distanceFit * 0.05 + numberNineBonus;

            return { player, score: score * pressureFit * this.getSuccessFactor(player, 0.12) };
          })
          .filter((item) => item.score > 0.34)
          .sort((a, b) => b.score - a.score);

        return candidates[0]?.player || null;
      }

      getNearestTeammateDistance(player) {
        const teammates = player.team.players.filter((teammate) => teammate !== player);
        return Math.min(...teammates.map((teammate) => this.distanceBetween(player, teammate)));
      }

      registerCompletedPass(passer, receiver, option = {}) {
        if (passer.team !== receiver.team || passer === receiver) return;

        this.lastCompletedPass = {
          passer,
          receiver,
          team: passer.team,
          minute: this.getExactMatchMinute(),
          type: option.actionType || "pass",
          distance: option.distance || this.distanceBetween(passer, receiver)
        };
      }

      getShotAssist(shooter) {
        const pass = this.lastCompletedPass;
        if (!pass) return null;
        if (pass.team !== shooter.team || pass.receiver !== shooter || pass.passer === shooter) return null;
        if (this.getExactMatchMinute() - pass.minute > 5) return null;
        return pass;
      }

      triggerGiveAndGoRun(passer, receiver, strong = false) {
        if (!this.canJoinAttack(passer)) return;
        passer.comboPartner = receiver;
        passer.comboUntil = this.getMatchMinute() + (strong || this.isInFinalThird(receiver) ? 6 : 4);
        passer.spaceScore = Math.max(passer.spaceScore, strong ? 0.94 : 0.82);
      }

      isGiveAndGoOption(player) {
        return player.comboPartner === this.possession && player.comboUntil >= this.getMatchMinute();
      }

      getPassDistanceBias(distance) {
        if (distance < 10) return 0.9;
        if (distance < 24) return 1;
        if (distance < 38) return 0.72;
        return 0.46;
      }

      getPressureReliefBias(distance, pressure) {
        if (pressure < 0.6) return 1;
        if (distance < 14) return 1.65;
        if (distance < 25) return 1.15;
        return 0.72;
      }

      getPassErrorChance(passer, intended, distance) {
        const laneSafety = this.getPassingLaneSafety(passer, intended, this.getOpponentTeam(passer.team).players);
        const laneRisk = 1 - laneSafety;
        const distanceRisk = this.clamp((distance - 12) / 34, 0, 1);
        const targetPressureRisk = intended.pressure * 0.06;
        const passerPressureRisk = passer.pressure * 0.06;
        const overallErrorFactor = (this.getErrorFactor(passer, 0.22) + this.getErrorFactor(intended, 0.12)) / 2;
        const blockedLanePenalty = laneSafety < 0.25
          ? (0.08 + distanceRisk * 0.1 + passer.pressure * 0.04)
          : 0;
        const maxError = laneSafety < 0.25
          ? this.clamp(0.34 + distanceRisk * 0.1 + passer.pressure * 0.06, 0.34, 0.48)
          : 0.2;
        const baseError = 0.01 + distanceRisk * 0.07 + laneRisk * this.tacticalRules.passing.blockedLaneError + blockedLanePenalty + targetPressureRisk + passerPressureRisk;

        return this.clamp(baseError * overallErrorFactor, 0.01, maxError);
      }

      chooseInterceptor(opponents, passer, intended) {
        const weighted = opponents.map((opponent) => {
          const laneDistance = this.distanceToSegment(opponent, passer, intended);
          const targetDistance = this.distanceBetween(opponent, intended);
          return {
            player: opponent,
            weight: Math.max(0.2, (14 / Math.max(laneDistance, 2) + 5 / Math.max(targetDistance, 4)) * this.getSuccessFactor(opponent, 0.18))
          };
        });

        return this.pickWeighted(weighted) || opponents[0] || intended;
      }

      tryPressureSteal() {
        if (this.state !== "playing") return false;
        if (this.shotInProgress) return false;
        const carrier = this.possession;
        const now = this.getExactMatchMinute();
        if (now < this.nextPressureStealAllowedAt) return false;
        if (carrier.team === this.protectedTeam && now < this.possessionProtectedUntil) {
          return false;
        }

        const opponents = this.getOpponentTeam(carrier.team).players;
        const pressers = opponents
          .map((player) => ({
            player,
            distance: this.distanceBetween(player, carrier)
          }))
          .filter((item) => item.distance < 7.5)
          .sort((a, b) => a.distance - b.distance);

        if (!pressers.length) return false;

        const best = pressers[0];
        const supportCount = pressers.filter((item) => item.distance < 10).length;
        const stealChance = this.clamp(
          (0.003 +
            carrier.pressure * 0.018 +
            (7.5 - best.distance) * 0.004 +
            Math.max(0, supportCount - 1) * 0.006) * this.getDuelFactor(best.player, carrier, 0.3),
          0.004,
          0.055
        );

        if (Math.random() >= stealChance) return false;

        this.logSteal(best.player, carrier, stealChance);
        this.nextPressureStealAllowedAt = now + 2.2;
        this.updatePossession(best.player, true);
        return true;
      }

      getPassingLaneSafety(from, to, opponents) {
        const danger = opponents.reduce((sum, opponent) => {
          const laneDistance = this.distanceToSegment(opponent, from, to);
          if (laneDistance > 12) return sum;
          const between = this.isPointBetweenPass(from, to, opponent) ? 1.35 : 0.65;
          return sum + ((12 - laneDistance) / 12) * between * this.getSuccessFactor(opponent, 0.12);
        }, 0);

        return this.clamp(1 - danger * 0.3, 0, 1);
      }

      isPointBetweenPass(from, to, point) {
        const passLength = this.distanceBetween(from, to) || 1;
        const distanceFromStart = this.distanceBetween(from, point);
        const distanceToEnd = this.distanceBetween(point, to);

        return distanceFromStart < passLength && distanceToEnd < passLength;
      }

      tryDribble(player) {
        if (!this.canTryDribble(player)) return false;

        const marker = this.getDribbleMarker(player);
        if (!marker) return false;

        const chance = this.getDribbleSuccessChance(player, marker);
        player.dribbleCooldownUntil = this.getExactMatchMinute() + this.tacticalRules.dribble.cooldownMinutes;

        if (Math.random() > chance) {
          this.logDribble(player, marker, chance, false);
          this.updatePossession(marker, true);
          return true;
        }

        this.applySuccessfulDribble(player, marker);
        this.logDribble(player, marker, chance, true);
        this.calculatePressure();
        this.updateBall(true);
        this.updateStatus();
        return true;
      }

      canTryDribble(player) {
        if (player.role === "GOL") return false;
        if (player.role === "ZAG") return false;
        if (player.role === "VOL" && this.getTeamBallProgress(player.team) < 62) return false;
        if (this.getExactMatchMinute() < player.dribbleCooldownUntil) return false;
        if (player.pressure < this.tacticalRules.dribble.pressureMin) return false;

        const marker = this.getDribbleMarker(player);
        if (!marker) return false;

        const roleFrequency = this.tacticalRules.dribble.roleFrequency[player.role] ?? 0.06;
        const pressureBonus = this.clamp((player.pressure - 0.28) * 0.22, 0, 0.13);
        const finalThirdBonus = this.isInFinalThird(player) ? 0.07 : 0;
        const badZonePenalty = player.role === "ZAG" || player.role === "VOL" ? -0.04 : 0;
        const frequency = this.clamp((roleFrequency + pressureBonus + finalThirdBonus + badZonePenalty) * this.getSuccessFactor(player, 0.08), 0, 0.42);

        return Math.random() < frequency;
      }

      getDribbleMarker(player) {
        const marker = player.marker;
        if (!marker || marker.role === "GOL") return null;
        if (this.distanceBetween(player, marker) > this.tacticalRules.dribble.nearestMarkerMaxDistance) return null;
        return marker;
      }

      getDribbleSuccessChance(player, marker) {
        const rules = this.tacticalRules.dribble;
        const roleSuccess = rules.roleSuccess[player.role] ?? 0;
        const pressurePenalty = player.pressure * 0.18;
        const spaceBonus = this.clamp((this.getNearestTeammateDistance(marker) - 7) / 24, 0, 0.08);
        const finalThirdBonus = this.isInFinalThird(player) && this.isForwardRole(player.role) ? 0.05 : 0;
        const duelFactor = this.getDuelFactor(player, marker, 0.22);
        const chance = (rules.baseChance + roleSuccess + spaceBonus + finalThirdBonus - pressurePenalty) * duelFactor;

        return this.clamp(chance, 0.08, 0.58);
      }

      applySuccessfulDribble(player, marker) {
        const rules = this.tacticalRules.dribble;
        const goal = this.getGoalPoint(player.team);
        const towardGoal = this.normalizedVector(player, goal);
        const awayFromMarker = this.normalizedVector(marker, player);
        const side = Math.sign(player.x - marker.x) || Math.sign(player.baseX - 50) || 1;
        const anchor = this.getAttackingAnchor(player);
        const target = {
          x: player.x + towardGoal.x * rules.progressPush + awayFromMarker.x * rules.sideStep + side * 1.8,
          y: player.y + towardGoal.y * rules.progressPush + awayFromMarker.y * rules.sideStep
        };

        player.setTarget(target, this.getAttackRadius(player), anchor);
        player.moveTowardTarget(this.getCarrierMoveSpeed(player) + 1.1);
        player.spaceScore = Math.max(player.spaceScore, 0.72);
        this.protectedTeam = player.team;
        this.possessionProtectedUntil = this.getExactMatchMinute() + 0.8;
      }

      shouldCarryBall(player, hasStructuredPass = false) {
        if (player.role === "GOL") return false;
        const goal = this.getGoalPoint(player.team);
        const distanceToGoal = this.distanceBetween(player, goal);
        const progress = this.getAttackProgress(player, player.team);
        const hasSpace = player.pressure < 0.52;
        const notTooClose = distanceToGoal > 17;
        const counterBoost = this.isCounterTeam(player.team) ? this.tacticalRules.counter.carryChanceBoost : 0;
        const roleBias = player.role === "MC" ? 0.08 : (player.role === "VOL" ? -0.1 : (player.role === "ZAG" ? -0.12 : 0));
        const buildCarry = player.role === "ZAG" && progress < this.tacticalRules.shape442.centerBackMaxProgress - 4 && player.pressure < 0.28;
        const structurePenalty = hasStructuredPass ? (buildCarry ? -0.04 : -0.16) : 0;
        const carryChance = ((player.pressure < 0.25 ? 0.2 : 0.055) + counterBoost + roleBias + structurePenalty) * this.getSuccessFactor(player, 0.14);

        return hasSpace && notTooClose && carryChance > 0 && Math.random() < carryChance;
      }

      shouldShoot(player) {
        const canShoot = this.isForwardRole(player.role) || ["ME", "MD", "ALA", "MC"].includes(player.role);
        if (!canShoot) return false;

        const distanceToGoal = this.distanceBetween(player, this.getGoalPoint(player.team));
        const maxDistance = this.isForwardRole(player.role) ? 38 : 26;
        if (distanceToGoal > maxDistance) return false;

        const closeness = this.clamp((maxDistance - distanceToGoal) / maxDistance, 0, 1);
        const roleBias = this.isForwardRole(player.role) ? 0.18 : 0;
        const closeRangeBoost = distanceToGoal < 20 ? 0.18 : 0;
        const shotZoneBonus = this.isInShotZone(player) ? 0.12 : 0;
        const pressurePenalty = player.pressure * (this.isInShotZone(player) ? 0.09 : 0.14);
        const shotTendency = this.clamp((0.24 + roleBias + closeRangeBoost + shotZoneBonus + closeness * 0.48 - pressurePenalty) * this.getSuccessFactor(player, 0.08), 0.2, 0.88);
        return Math.random() < shotTendency;
      }

      animateShot(player, outcome, goalkeeper = null) {
        const goal = this.getGoalPoint(player.team);
        const target = outcome === "goal"
          ? goal
          : (goalkeeper
            ? { x: goalkeeper.x, y: goalkeeper.y }
            : {
              x: goal.x + (player.x - goal.x) * 0.16,
              y: goal.y + (player.y - goal.y) * 0.16
            });
        const duration = Math.round(760 / this.getPlaybackRate());

        return new Promise((resolve) => {
          this.ball.style.transitionDuration = "0ms";
          this.ball.style.left = `${player.x}%`;
          this.ball.style.top = `${player.y}%`;

          window.requestAnimationFrame(() => {
            window.requestAnimationFrame(() => {
              this.ball.style.transitionDuration = `${duration}ms`;
              this.ball.style.left = `${this.clamp(target.x, 3, 97)}%`;
              this.ball.style.top = `${this.clamp(target.y, 0.5, 99.5)}%`;
              window.setTimeout(resolve, duration + 80);
            });
          });
        });
      }

      shootBall(player) {
        if (this.shotInProgress) return;

        const distanceToGoal = this.distanceBetween(player, this.getGoalPoint(player.team));
        const closeness = this.clamp((34 - distanceToGoal) / 28, 0, 1);
        const goalChance = this.clamp((0.05 + closeness * 0.56 + (1 - player.pressure) * 0.17) * this.getSuccessFactor(player, 0.18), 0.04, 0.72);
        const scored = Math.random() < goalChance;
        const assist = this.getShotAssist(player);
        const distanceMeters = Math.round(this.distanceMetersBetween(player, this.getGoalPoint(player.team)));
        const outcome = scored ? "goal" : "saved";
        const defendingTeam = this.getOpponentTeam(player.team);
        const goalkeeper = this.getGoalkeeper(defendingTeam);

        this.shotInProgress = true;
        this.stop();
        this.animateShot(player, outcome, goalkeeper).then(() => {
          if (outcome === "goal") {
            this.incrementTeamScore(player.team);
            this.updateScore();
            const goalContext = { assist, distanceMeters, goalChance };
            this.logShot(player, goalChance, "goal", goalContext);
            this.openGoalModal(player, goalContext);
          } else {
            this.logShot(player, goalChance, "saved", { assist, distanceMeters });
            this.restartAfterGoalkeeperSave(defendingTeam, { ballAtGoalkeeper: true });
          }

          this.shotInProgress = false;
          if (!this.pendingGoalRestartTeam && !this.resolvePeriodIfComplete() && this.state === "playing") {
            this.startLoops();
          }
        });
      }

      restartAfterGoal(nextTeam, reason = "gol sofrido") {
        this.prepareKickoff(nextTeam, { instant: true });
        this.state = "playing";
        this.updateControls();
        this.updateStatus();
        this.logKickoff(nextTeam, reason);
        if (!this.resolvePeriodIfComplete()) {
          this.startLoops();
        }
      }

      openGoalModal(scorer, context = {}) {
        const concedingTeam = this.getOpponentTeam(scorer.team);
        this.pendingGoalRestartTeam = concedingTeam;
        this.pendingGoalScorer = scorer;
        this.state = "goalPause";
        this.stop();
        this.updateControls();
        this.updateStatus("Gol confirmado - aguardando OK para a saida de bola");
        this.renderGoalModal(scorer, context, concedingTeam);
      }

      renderGoalModal(scorer, context, concedingTeam) {
        const assist = context.assist;
        const distance = context.distanceMeters ?? Math.round(this.distanceMetersBetween(scorer, this.getGoalPoint(scorer.team)));
        const assistText = assist ? ` apos passe de ${assist.passer.name}` : "";
        const shotText = this.getGoalDescriptionText(scorer, distance, assist);
        const compactScore = this.score.textContent.replace(/\s+/g, "");
        const fieldRect = this.field.getBoundingClientRect();

        this.goalModal.style.setProperty("--goal-modal-left", `${fieldRect.left + fieldRect.width / 2}px`);
        this.goalModal.style.setProperty("--goal-modal-top", `${fieldRect.top + fieldRect.height / 2}px`);
        this.goalModal.style.setProperty("--goal-modal-width", `${fieldRect.width}px`);
        this.goalModal.style.setProperty("--goal-modal-height", `${fieldRect.height}px`);
        this.goalTeam.textContent = scorer.team.shortName;
        this.goalTitle.textContent = "Gol";
        this.goalDetail.textContent = `${scorer.name} ${shotText} de ${distance}m${assistText}, aos ${this.clock.textContent}. ${compactScore} para ${scorer.team.shortName}.`;
        this.goalModal.hidden = false;
        this.goalOkButton.focus();
      }

      getGoalDescriptionText(scorer, distance, assist) {
        if (distance >= 24) return "acerta um lindo chute";
        if (scorer.pressure > 0.55) return "bate sob pressao";
        return "finaliza com categoria";
      }

      confirmGoalRestart() {
        if (!this.pendingGoalRestartTeam) return;
        const restartTeam = this.pendingGoalRestartTeam;
        this.pendingGoalRestartTeam = null;
        this.pendingGoalScorer = null;
        this.goalModal.hidden = true;
        this.restartAfterGoal(restartTeam, "gol sofrido");
      }

      restartAfterGoalkeeperSave(nextTeam, options = {}) {
        const goalkeeper = this.getGoalkeeper(nextTeam);

        this.softResetTeamShapes();
        this.clearTransitionState();
        this.shapeRecoveryUntil = this.getExactMatchMinute() + this.tacticalRules.restarts.shapeRecoveryMinutes;
        this.updatePossession(goalkeeper, !options.ballAtGoalkeeper, { skipTransition: true });
      }

      clearTransitionState() {
        this.lastPossessionTeam = null;
        this.lostBallTeam = null;
        this.postLossPressUntil = 0;
        this.counterTeam = null;
        this.counterUntil = 0;
        this.lastCompletedPass = null;
      }

      getCarrierMoveSpeed(player) {
        if (player.role === "ZAG") return 0.65;
        if (player.role === "VOL") return player.pressure < 0.35 ? 0.85 : 0.55;
        if (this.isFullbackRole(player.role)) return player.pressure < 0.5 ? 1.35 : 0.75;
        if (player.role === "MC") return player.pressure < 0.5 ? 1.85 : 0.9;
        return player.pressure < 0.5 ? 1.65 : 0.85;
      }

      getCarrierTarget(player, anchor = this.getAttackingAnchor(player), context = this.getTacticalContext(player.team)) {
        const goal = this.getGoalPoint(player.team);
        const closestMarker = player.marker;
        const away = closestMarker ? this.normalizedVector(closestMarker, player) : { x: 0, y: 0 };
        const towardGoal = this.normalizedVector(player, goal);
        const currentProgress = this.getAttackProgress(player, player.team);
        const anchorProgress = this.getAttackProgress(anchor, player.team);
        let carryPush = 4.5;

        if (player.role === "ZAG") carryPush = 0.6;
        else if (player.role === "VOL") carryPush = 1.5;
        else if (this.isFullbackRole(player.role)) carryPush = this.isBallSidePlayer(player, context) ? 3.2 : 0.8;
        else if (player.role === "MC") carryPush = 5.2;
        else if (player.role === "ME" || player.role === "MD") carryPush = 6.4;
        else if (this.isForwardRole(player.role)) carryPush = this.isSupportStriker(player) && this.isWideAttackCarrier(player) ? 6.2 : 4.2;

        const maxProgressByRole = player.role === "ZAG"
          ? this.tacticalRules.shape442.centerBackMaxProgress
          : (player.role === "VOL"
            ? this.tacticalRules.shape442.holdingMidMaxProgress
            : (this.isFullbackRole(player.role)
              ? this.tacticalRules.shape442.fullbackMaxProgress
              : 90));
        const targetProgress = this.clamp(Math.max(currentProgress, anchorProgress) + carryPush, 8, maxProgressByRole);
        const forwardPoint = this.pointFromAttackProgress(player, player.team, targetProgress);

        return {
          x: forwardPoint.x + towardGoal.x * carryPush * 0.35 + away.x * player.pressure * 4,
          y: forwardPoint.y + towardGoal.y * carryPush * 0.35 + away.y * player.pressure * 4
        };
      }

      getSupportTarget(player, anchor, context = this.getTacticalContext(player.team)) {
        const candidates = this.getOffBallRunCandidates(player, anchor, context);
        const best = candidates
          .map((point) => ({
            point,
            score: this.scoreSupportPosition(player, point)
          }))
          .sort((a, b) => b.score - a.score)[0];

        player.spaceScore = this.clamp(best?.score || 0, 0, 1);
        return best?.point || anchor;
      }

      assignPossessionSupportTargets(team, context = this.getTacticalContext(team)) {
        const targets = new Map();
        if (!this.possession || this.possession.team !== team || this.possession.role === "GOL") return targets;

        const rules = this.tacticalRules.supportOptions;
        const desiredCount = this.possession.pressure > 0.55 || context.phase === "finalThird"
          ? rules.pressuredCount
          : rules.normalCount;
        const candidates = team.players
          .filter((player) => player !== this.possession && player.role !== "GOL")
          .map((player) => ({
            player,
            score: this.getSupportOptionPriority(player, context)
          }))
          .filter((item) => item.score > 0)
          .sort((a, b) => b.score - a.score)
          .slice(0, desiredCount);

        candidates.forEach((item, index) => {
          const target = this.getSupportTriangleTarget(item.player, index, candidates.length, context);
          const anchor = this.getAttackingAnchor(item.player, context);
          const limited = item.player.limitToTacticalArea(target, this.getAttackRadius(item.player), anchor);
          const clamped = this.clampToRoleZone(item.player, limited, context);
          item.player.spaceScore = Math.max(item.player.spaceScore || 0, this.scoreSupportPosition(item.player, clamped));
          targets.set(item.player, this.avoidTeammateCrowding(item.player, clamped));
        });

        return targets;
      }

      getSupportOptionPriority(player, context) {
        const carrier = this.possession;
        const distance = this.distanceBetween(player, carrier);
        const rules = this.tacticalRules.supportOptions;
        const idealDistance = this.clamp(1 - Math.abs(distance - 16) / 22, 0, 1);
        const sideFit = this.isBallSidePlayer(player, context) ? 1.12 : 0.82;
        const laneSafety = this.getPassingLaneSafety(carrier, player, this.getOpponentTeam(player.team).players);
        let roleWeight = 0.55;

        if (player.role === "MC") roleWeight = 1.55;
        else if (player.role === "VOL") roleWeight = context.phase === "finalThird" ? 0.9 : 1.38;
        else if (player.role === "ME" || player.role === "MD") roleWeight = this.isBallSidePlayer(player, context) ? 1.32 : 0.72;
        else if (this.isFullbackRole(player.role)) roleWeight = this.isBallSidePlayer(player, context) ? 1.08 : 0.46;
        else if (this.isForwardRole(player.role)) roleWeight = this.getForwardPairRole(player) === "support" ? 1.22 : 0.62;
        else if (player.role === "ZAG") roleWeight = context.phase === "buildUp" ? 1.02 : 0.32;

        if (distance < rules.closeMin) roleWeight *= 0.45;
        if (distance > rules.closeMax + 10) roleWeight *= 0.72;
        return roleWeight * (0.65 + idealDistance * 0.35) * sideFit * Math.max(0.28, laneSafety);
      }

      getSupportTriangleTarget(player, index, count, context) {
        const team = player.team;
        const carrier = this.possession;
        const rules = this.tacticalRules.supportOptions;
        const carrierProgress = this.getAttackProgress(carrier, team);
        const side = this.getPlayerSideSign(player) || (index % 2 === 0 ? -1 : 1);
        const ballSideSign = this.getBallSideSign() || side;
        let targetX = carrier.x + side * rules.sideDistance;
        let targetProgress = carrierProgress;

        if (player.role === "VOL" || player.role === "ZAG") {
          targetX = this.clamp(50 + ballSideSign * 5, 36, 64);
          targetProgress = carrierProgress - rules.behindDistance;
        } else if (player.role === "MC") {
          targetX = this.clamp(carrier.x - ballSideSign * 10, 34, 66);
          targetProgress = carrierProgress + (context.phase === "finalThird" ? 3 : 1);
        } else if (player.role === "ME" || player.role === "MD" || this.isFullbackRole(player.role)) {
          targetX = this.clamp(carrier.x + side * rules.sideDistance, 7, 93);
          targetProgress = carrierProgress + (this.isBallSidePlayer(player, context) ? 2 : -2);
        } else if (this.isForwardRole(player.role)) {
          const pairRole = this.getForwardPairRole(player);
          targetX = this.clamp(carrier.x + side * (pairRole === "support" ? 9 : 14), 26, 74);
          targetProgress = carrierProgress + (pairRole === "support" ? rules.aheadDistance : rules.aheadDistance + 8);
        }

        if (count >= 3 && index === 2 && !this.isForwardRole(player.role)) {
          targetX = this.clamp(carrier.x - ballSideSign * rules.sideDistance, 12, 88);
          targetProgress = carrierProgress - 4;
        }

        return this.progressToPoint(team, targetX, this.clamp(targetProgress, 8, 92));
      }

      getOffBallRunCandidates(player, anchor, context = this.getTacticalContext(player.team)) {
        const goal = this.getGoalPoint(player.team);
        const carrier = this.possession;
        const towardGoal = this.normalizedVector(anchor, goal);
        const towardBall = this.normalizedVector(anchor, carrier);
        const marker = player.marker;
        const awayFromMarker = marker ? this.normalizedVector(marker, player) : { x: 0, y: 0 };
        const wideSide = this.isWideRole(player.role) ? Math.sign(player.baseX - 50) || 1 : 0;
        const counterPush = context.counter && this.canJoinAttack(player) ? this.tacticalRules.counter.runPush : 0;
        const attackPush = (this.isFullbackRole(player.role) ? 7.4 : (this.isMidfieldRole(player.role) ? 5.6 : 3.4)) + counterPush;
        const comboRun = this.isGiveAndGoOption(player) ? this.getGiveAndGoTarget(player, anchor) : null;
        const roleCandidates = this.getRoleSupportCandidates(player, anchor, context);

        const candidates = [
          anchor,
          ...roleCandidates,
          {
            x: anchor.x + towardGoal.x * attackPush + wideSide * 4,
            y: anchor.y + towardGoal.y * attackPush
          },
          {
            x: anchor.x + towardGoal.x * (attackPush + 3) - wideSide * 3,
            y: anchor.y + towardGoal.y * (attackPush + 3)
          },
          {
            x: anchor.x + towardBall.x * 4 + awayFromMarker.x * 5,
            y: anchor.y + towardBall.y * 3 + awayFromMarker.y * 5
          },
          {
            x: anchor.x + awayFromMarker.x * 7 + wideSide * 3,
            y: anchor.y + awayFromMarker.y * 7
          }
        ];

        if (comboRun) candidates.push(comboRun);
        return candidates.map((point) => {
          const limited = player.limitToTacticalArea(point, this.getAttackRadius(player), anchor);
          return this.getOnsideAdjustedPoint(player, this.clampToRoleZone(player, limited, context));
        });
      }

      getRoleSupportCandidates(player, anchor, context) {
        const team = player.team;
        const carrier = this.possession;
        const rules = this.tacticalRules.shape442;
        const carrierProgress = this.getAttackProgress(carrier, team);
        const anchorProgress = this.getAttackProgress(anchor, team);
        const side = this.getPlayerSideSign(player);
        const ballSide = this.isBallSidePlayer(player, context);
        const behindBall = this.clamp(carrierProgress - 10, 8, 86);
        const aheadBall = this.clamp(carrierProgress + 10, 14, 90);
        const candidates = [];

        if (player.role === "ZAG") {
          candidates.push(this.progressToPoint(team, this.clamp(player.baseX + side * 7, 18, 82), this.clamp(carrierProgress - 16, 16, rules.centerBackMaxProgress)));
        } else if (this.isFullbackRole(player.role)) {
          if (ballSide) {
            candidates.push(this.progressToPoint(team, this.clamp(player.baseX + side * 3, 7, 93), this.clamp(carrierProgress + 5, 28, rules.fullbackMaxProgress)));
            candidates.push(this.progressToPoint(team, this.clamp(carrier.x + side * 11, 8, 92), this.clamp(carrierProgress - 3, 22, rules.fullbackMaxProgress)));
            if (carrier.pressure > 0.55) {
              candidates.push(this.progressToPoint(team, this.clamp(carrier.x - side * 7, 16, 84), this.clamp(carrierProgress - 9, 18, rules.fullbackMaxProgress)));
            }
          } else {
            candidates.push(this.progressToPoint(team, this.clamp(player.baseX + (50 - player.baseX) * 0.55, 24, 76), this.clamp(anchorProgress - 5, 20, 48)));
            if (carrier.pressure > 0.55) {
              candidates.push(this.progressToPoint(team, this.clamp(player.baseX + side * 2, 7, 93), this.clamp(carrierProgress + 2, 34, rules.fullbackMaxProgress)));
            }
          }
        } else if (player.role === "VOL") {
          candidates.push(this.progressToPoint(team, this.clamp(50 + (carrier.x - 50) * 0.22, 38, 62), this.clamp(behindBall, 26, rules.holdingMidMaxProgress)));
          candidates.push(this.progressToPoint(team, this.clamp(50 + (carrier.x < 50 ? 7 : -7), 39, 61), this.clamp(carrierProgress + 4, 30, rules.holdingMidMaxProgress)));
        } else if (player.role === "MC") {
          const pocketProgress = this.getPocketProgress(team);
          const pocketSide = carrier.x < 50 ? 1 : -1;
          candidates.push(this.progressToPoint(team, this.clamp(50 + pocketSide * rules.mcPocketWidth, 34, 66), pocketProgress));
          candidates.push(this.progressToPoint(team, this.clamp(carrier.x + pocketSide * 11, 34, 66), this.clamp(carrierProgress + 6, 42, rules.midfieldMaxProgress)));
          candidates.push(this.progressToPoint(team, this.clamp(50 + (carrier.x - 50) * 0.28, 38, 62), this.clamp(pocketProgress - 5, 40, rules.midfieldMaxProgress)));
        } else if (player.role === "ME" || player.role === "MD") {
          const maxWideProgress = rules.wideMidfieldMaxProgress;
          if (ballSide) {
            candidates.push(this.progressToPoint(team, this.clamp(carrier.x + side * 10, 7, 93), this.clamp(carrierProgress + 8, 36, maxWideProgress)));
            candidates.push(this.progressToPoint(team, this.clamp(player.baseX + side * 5, 6, 94), this.clamp(carrierProgress + 15, 42, maxWideProgress)));
            if (carrier.pressure > 0.55) {
              candidates.push(this.progressToPoint(team, this.clamp(carrier.x - side * 8, 18, 82), this.clamp(carrierProgress - 3, 32, maxWideProgress)));
            }
          } else {
            candidates.push(this.progressToPoint(team, this.clamp(player.baseX + side * 3, 7, 93), this.clamp(carrierProgress + 8, 40, maxWideProgress)));
            candidates.push(this.progressToPoint(team, this.clamp(50 + side * 22, 18, 82), this.clamp(carrierProgress - 2, 34, 66)));
            if (carrier.pressure > 0.55) {
              candidates.push(this.progressToPoint(team, this.clamp(player.baseX + side * 5, 7, 93), this.clamp(carrierProgress + 10, 40, maxWideProgress)));
            }
          }
        } else if (this.isForwardRole(player.role)) {
          const pairRole = this.getForwardPairRole(player);
          const defensiveLine = this.getDefensiveLineProgressAgainst(team);
          const onLineProgress = this.clamp(defensiveLine - rules.strikerLineGap, 56, 87);
          const aggressiveRun = Math.random() < rules.strikerAggressiveRunChance;
          const runProgress = this.clamp(onLineProgress + (aggressiveRun ? rules.strikerAggressiveRunPush : 3), 62, 90);
          const channelX = this.clamp(50 + side * (aggressiveRun ? 15 : 10), 28, 72);
          const isNine = player === this.getNumberNine(team);
          const wingCarrier = this.isWideAttackCarrier(carrier);
          const wingSide = Math.sign(carrier.x - 50) || side || 1;

          if (isNine) {
            if (wingCarrier) {
              candidates.push(this.progressToPoint(
                team,
                this.clamp(50 + wingSide * 4, 43, 57),
                this.clamp(Math.max(onLineProgress, carrierProgress + rules.numberNineWingAdvance), 64, 90)
              ));
              candidates.push(this.progressToPoint(
                team,
                this.clamp(50 - wingSide * 5, 42, 58),
                this.clamp(Math.max(onLineProgress - 2, carrierProgress + 6), 60, 88)
              ));
            }
            candidates.push(this.progressToPoint(team, this.clamp(50 + side * 3, 42, 58), onLineProgress));
            candidates.push(this.progressToPoint(team, this.clamp(50 - side * 2, 42, 58), this.clamp(onLineProgress + 4, 60, 88)));
            candidates.push(this.progressToPoint(team, this.clamp(50 + side * rules.strikerBetweenCenterBacksWidth, 40, 60), this.clamp(onLineProgress - 2, 56, 84)));
          } else if (pairRole === "support") {
            const roamSide = wingCarrier ? wingSide : (Math.random() < 0.5 ? side : -side);
            candidates.push(this.progressToPoint(team, this.clamp(carrier.x + (carrier.x < 50 ? 8 : -8), 30, 70), this.clamp(carrierProgress - rules.strikerSupportDrop, 42, 72)));
            candidates.push(this.progressToPoint(team, this.clamp(50 + roamSide * rules.supportStrikerWideLane, 20, 80), this.clamp(onLineProgress - 3, 50, 82)));
            candidates.push(this.progressToPoint(team, this.clamp(carrier.x + roamSide * 10, 18, 82), this.clamp(carrierProgress + 10, 52, 86)));
          } else {
            candidates.push(this.progressToPoint(team, this.clamp(50 + side * (isNine ? rules.strikerBetweenCenterBacksWidth : 9), 32, 68), onLineProgress));
            candidates.push(this.progressToPoint(team, isNine ? this.clamp(50 + side * 4, 38, 62) : channelX, runProgress));
            candidates.push(this.progressToPoint(team, this.clamp(carrier.x + side * 8, 30, 70), this.clamp(Math.max(carrierProgress + 13, onLineProgress), 62, 88)));
          }
        }

        return candidates;
      }

      getGiveAndGoTarget(player, anchor) {
        const goal = this.getGoalPoint(player.team);
        const towardGoal = this.normalizedVector(player, goal);
        const side = Math.sign(player.x - this.possession.x) || Math.sign(player.baseX - 50) || 1;

        return {
          x: anchor.x + towardGoal.x * 9 + side * 5,
          y: anchor.y + towardGoal.y * 9
        };
      }

      scoreSupportPosition(player, point) {
        const carrier = this.possession;
        const opponents = this.getOpponentTeam(player.team).players;
        const teammates = player.team.players.filter((teammate) => teammate !== player && teammate !== carrier);
        const nearestOpponent = Math.min(...opponents.map((opponent) => this.distanceBetween(point, opponent)));
        const nearestTeammate = Math.min(...teammates.map((teammate) => this.distanceBetween(point, teammate)));
        const passDistance = this.distanceBetween(carrier, point);
        const forwardGain = this.getPassProgress(carrier, point, player.team);
        const laneSafety = this.getPassingLaneSafety(carrier, point, opponents);
        const offsidePenalty = this.isOffsidePosition(player, point) ? 0.18 : 1;
        const openSpace = this.clamp(nearestOpponent / 18, 0, 1);
        const spacing = this.clamp(nearestTeammate / 12, 0, 1);
        const distanceFit = this.getPassDistanceBias(passDistance);
        const progression = this.clamp((forwardGain + 6) / 24, 0, 1);
        const roleProgress = this.isAttackingRole(player.role) || this.isMidfieldRole(player.role) ? progression : progression * 0.7;
        const triangle = this.getTriangleSupportScore(player, point, carrier);
        const switchOption = this.isSwitchOption(carrier, point, player) ? 0.18 : 0;
        const lineRun = this.getLineRunScore(player, point);
        const pocket = this.getPocketReceiveScore(player, point);
        const strikerSeparation = this.getStrikerSeparationScore(player, point);

        return this.clamp((
          openSpace * 0.28 +
          laneSafety * 0.27 +
          roleProgress * 0.18 +
          distanceFit * 0.12 +
          spacing * 0.08 +
          triangle * 0.12 +
          lineRun * 0.16 +
          pocket * 0.16 +
          strikerSeparation * 0.12 +
          switchOption) * offsidePenalty,
          0,
          1
        );
      }

      getLineRunScore(player, point) {
        if (!this.isForwardRole(player.role)) return 0;
        const line = this.getDefensiveLineProgressAgainst(player.team);
        const progress = this.getAttackProgress(point, player.team);
        const distanceFromLine = Math.abs((line - this.tacticalRules.shape442.strikerLineGap) - progress);
        const isNine = player === this.getNumberNine(player.team);
        const lane = isNine
          ? 1 - this.clamp(Math.abs(point.x - 50) / 16, 0, 1)
          : this.clamp(Math.abs(point.x - 50) / 18, 0, 1);

        return this.clamp(1 - distanceFromLine / 12, 0, 1) * (0.65 + lane * 0.35);
      }

      getStrikerSeparationScore(player, point) {
        if (!this.isForwardRole(player.role)) return 0;
        const other = player.team.players.find((candidate) => candidate !== player && this.isForwardRole(candidate.role));
        if (!other) return 0.5;
        const distance = this.distanceBetween(point, other);

        return this.clamp((distance - 6) / 15, 0, 1);
      }

      getRoleZone(player, context = this.getTacticalContext(player.team)) {
        const lines = context.lineCenters;
        const side = this.getPlayerSideSign(player);
        const ballShift = this.clamp((this.possession.x - 50) * 0.12, -this.tacticalRules.compactness.horizontalBallShift, this.tacticalRules.compactness.horizontalBallShift);
        const role = player.role;
        let xMin = player.baseX - 12;
        let xMax = player.baseX + 12;
        let progressMin = lines.midfield - 10;
        let progressMax = lines.midfield + 10;

        if (role === "GOL") {
          xMin = 43; xMax = 57; progressMin = 0; progressMax = 12;
        } else if (role === "ZAG") {
          xMin = player.baseX - 10 + ballShift * 0.35;
          xMax = player.baseX + 10 + ballShift * 0.35;
          progressMin = Math.max(14, lines.defense - 8);
          progressMax = Math.min(this.tacticalRules.shape442.centerBackMaxProgress, lines.defense + 10);
        } else if (this.isFullbackRole(role)) {
          xMin = side < 0 ? 6 : 64;
          xMax = side < 0 ? 36 : 94;
          progressMin = Math.max(18, lines.defense - 6);
          progressMax = context.inPossession ? this.tacticalRules.shape442.fullbackMaxProgress : lines.midfield + 3;
        } else if (role === "VOL") {
          xMin = 34 + ballShift * 0.35;
          xMax = 66 + ballShift * 0.35;
          progressMin = Math.max(lines.defense + 4, 24);
          progressMax = Math.min(this.tacticalRules.shape442.holdingMidMaxProgress, lines.midfield + 7);
        } else if (role === "MC") {
          xMin = 30 + ballShift * 0.4;
          xMax = 70 + ballShift * 0.4;
          progressMin = Math.max(lines.midfield - 7, 36);
          progressMax = Math.min(this.tacticalRules.shape442.midfieldMaxProgress, lines.attack - 4);
        } else if (role === "ME" || role === "MD") {
          xMin = side < 0 ? 5 : 58;
          xMax = side < 0 ? 42 : 95;
          progressMin = Math.max(lines.midfield - 8, 32);
          progressMax = Math.min(lines.attack + 12, this.tacticalRules.shape442.wideMidfieldMaxProgress);
        } else if (this.isForwardRole(role)) {
          const isNine = player === this.getNumberNine(player.team);
          xMin = isNine ? 38 : 16;
          xMax = isNine ? 62 : 84;
          progressMin = Math.max(lines.attack - 14, 46);
          progressMax = 90;
        }

        return {
          xMin: this.clamp(xMin, 4, 96),
          xMax: this.clamp(xMax, 4, 96),
          progressMin: this.clamp(progressMin, 0, 96),
          progressMax: this.clamp(progressMax, 4, 98)
        };
      }

      clampToRoleZone(player, point, context = this.getTacticalContext(player.team)) {
        const zone = this.getRoleZone(player, context);
        const progress = this.getAttackProgress(point, player.team);
        const clampedProgress = this.clamp(progress, Math.min(zone.progressMin, zone.progressMax), Math.max(zone.progressMin, zone.progressMax));

        return this.progressToPoint(
          player.team,
          this.clamp(point.x, Math.min(zone.xMin, zone.xMax), Math.max(zone.xMin, zone.xMax)),
          clampedProgress
        );
      }

      getPocketReceiveScore(player, point) {
        if (player.role !== "MC") return 0;
        const pocketProgress = this.getPocketProgress(player.team);
        const progress = this.getAttackProgress(point, player.team);
        const centrality = 1 - this.clamp(Math.abs(point.x - 50) / 22, 0, 1);
        const depthFit = this.clamp(1 - Math.abs(progress - pocketProgress) / 14, 0, 1);

        return depthFit * (0.55 + centrality * 0.45);
      }

      getTriangleSupportScore(player, point, carrier = this.possession) {
        const distance = this.distanceBetween(carrier, point);
        const rules = this.tacticalRules.passing;
        const idealDistance = distance >= rules.closeOptionIdealMin && distance <= rules.closeOptionIdealMax ? 1 : 0;
        const lateralAngle = Math.abs(point.x - carrier.x) >= 5 ? 1 : 0.35;
        const progress = Math.abs(this.getPassProgress(carrier, point, player.team));
        const sameLinePenalty = progress < 2 && Math.abs(point.x - carrier.x) < 7 ? 0.55 : 1;

        if (distance > 30) return 0;
        return this.clamp((idealDistance * 0.65 + lateralAngle * 0.35) * sameLinePenalty, 0, 1);
      }

      isSwitchOption(carrier, targetPoint, player) {
        if (!this.isWideRole(player.role)) return false;
        const carrierWide = carrier.x < 34 || carrier.x > 66;
        const oppositeSide = Math.sign(targetPoint.x - 50) !== Math.sign(carrier.x - 50);
        const distance = this.distanceBetween(carrier, targetPoint);

        return carrierWide && oppositeSide && distance >= this.tacticalRules.passing.switchMinDistance;
      }

      getAttackingAnchor(player, context = this.getTacticalContext(player.team)) {
        const rules = this.tacticalRules.shape442;
        const team = player.team;
        const progress = this.getTeamBallProgress(team);
        const baseProgress = this.getAttackProgress({ x: player.baseX, y: player.baseY }, team);
        const teamShift = this.clamp((progress - 24) * 0.48, 0, rules.attackLinePush);
        const roleFactor = this.getAttackRoleFactor(player.role);
        const mentalityFactor = context.mentality === "chasing"
          ? this.tacticalRules.mentality.chasingAttackBoost
          : (context.mentality === "protecting" ? this.tacticalRules.mentality.protectingAttackDrop : 1);
        const blockShiftX = this.clamp((this.possession.x - 50) * 0.16, -rules.blockHorizontalShift, rules.blockHorizontalShift);
        let targetProgress = baseProgress + teamShift * roleFactor * mentalityFactor;
        let targetX = player.baseX + blockShiftX;

        if (context.phase === "buildUp") {
          return this.clampToRoleZone(player, this.getBuildUpAnchor(player, { x: targetX, progress: targetProgress }, context), context);
        }

        if (this.isFullbackRole(player.role)) {
          return this.clampToRoleZone(player, this.getFullbackAnchor(player, { x: targetX, progress: targetProgress }, context), context);
        }

        if (player.role === "GOL") {
          return this.getGoalkeeperSupportTarget(player, context);
        }

        if (player.role === "ZAG") {
          const side = this.getPlayerSideSign(player);
          targetX = this.clamp(player.baseX + side * 2.4 + blockShiftX * 0.35, 28, 72);
          targetProgress = this.clamp(targetProgress, baseProgress, rules.centerBackMaxProgress);
          const coverTarget = this.getFullbackCoverTarget(player, { x: targetX, progress: targetProgress }, context);
          targetX = coverTarget.x;
          targetProgress = coverTarget.progress;
        } else if (player.role === "VOL") {
          targetX = this.clamp(50 + blockShiftX * 0.35, 39, 61);
          targetProgress = this.clamp(Math.max(targetProgress, progress - 8), 32, rules.holdingMidMaxProgress);
        } else if (player.role === "MC") {
          const pocketProgress = this.getPocketProgress(team);
          targetX = this.clamp(50 + (this.possession.x < 50 ? 9 : -9) + blockShiftX * 0.45, 36, 68);
          targetProgress = this.clamp(context.phase === "finalThird" ? pocketProgress : Math.max(targetProgress, pocketProgress - 6), 42, rules.midfieldMaxProgress);
        } else if (player.role === "ME" || player.role === "MD") {
          const side = this.getPlayerSideSign(player);
          const ballSide = this.isBallSidePlayer(player, context);
          const attackWing = context.phase === "wideAttack" || context.phase === "finalThird";
          targetX = ballSide
            ? this.clamp(player.baseX + side * (attackWing ? 5 : 2) + blockShiftX * 0.35, 6, 94)
            : this.clamp(player.baseX + (50 - player.baseX) * 0.38 + blockShiftX * 0.55, 24, 76);
          targetProgress = this.clamp(targetProgress + (ballSide ? (attackWing ? 11 : 5) : 1), 42, rules.wideMidfieldMaxProgress);
        } else if (this.isForwardRole(player.role)) {
          const pairRole = this.getForwardPairRole(player);
          const defensiveLine = this.getDefensiveLineProgressAgainst(team);
          const lineProgress = this.clamp(defensiveLine - rules.strikerLineGap, 56, 87);
          const side = this.getPlayerSideSign(player) || (pairRole === "depth" ? 1 : -1);
          const isNine = player === this.getNumberNine(team);
          const wingCarrier = this.isWideAttackCarrier(this.possession);
          const wingSide = Math.sign(this.possession.x - 50) || side || 1;
          if (isNine) {
            targetX = wingCarrier
              ? this.clamp(50 + wingSide * 4, 43, 57)
              : this.clamp(50 + side * 2 + blockShiftX * 0.18, 42, 58);
            targetProgress = this.clamp(
              Math.max(targetProgress + rules.strikerDepthPush * 0.55, lineProgress, wingCarrier ? progress + rules.numberNineWingAdvance : 0),
              58,
              90
            );
          } else {
            const supportSide = wingCarrier ? wingSide : side;
            targetX = this.clamp(50 + supportSide * rules.supportStrikerWideLane + blockShiftX * 0.35, 20, 80);
            targetProgress = pairRole === "depth"
              ? this.clamp(Math.max(targetProgress + rules.strikerDepthPush, lineProgress + 2), 58, 88)
              : this.clamp(Math.max(progress + (wingCarrier ? 5 : -rules.strikerSupportDrop), baseProgress, lineProgress - 10), 44, 84);
          }
        }

        if (context.counter && this.canJoinAttack(player)) {
          targetProgress = this.clamp(targetProgress + this.tacticalRules.counter.runPush, 8, 92);
        }

        return this.clampToRoleZone(player, this.progressToPoint(team, this.clamp(targetX, 6, 94), this.clamp(targetProgress, 6, 94)), context);
      }

      getBuildUpAnchor(player, anchor, context) {
        const rules = this.tacticalRules.buildUp;
        const shape = this.tacticalRules.shape442;

        if (player.role === "ZAG") {
          const side = Math.sign(player.baseX - 50) || 1;
          const lineProgress = this.getAttackProgress({ x: player.baseX, y: context.defensiveLineY }, player.team);
          return this.progressToPoint(player.team, this.clamp(player.baseX + side * rules.centerBackWidth, 8, 92), this.clamp(lineProgress + rules.centerBackStep, 18, shape.centerBackMaxProgress));
        }

        if (player.role === "VOL") {
          const lineProgress = this.getAttackProgress({ x: player.baseX, y: context.defensiveLineY }, player.team);
          return this.progressToPoint(player.team, this.clamp(50 + (this.possession.x - 50) * 0.12, 34, 66), this.clamp(lineProgress + rules.holdingMidDrop, 28, shape.holdingMidMaxProgress));
        }

        if (this.isFullbackRole(player.role)) {
          return this.getFullbackAnchor(player, anchor, context);
        }

        return this.progressToPoint(player.team, this.clamp(anchor.x, 6, 94), this.clamp(anchor.progress, 6, 94));
      }

      getFullbackAnchor(player, anchor, context) {
        const rules = this.tacticalRules.buildUp;
        const shape = this.tacticalRules.shape442;
        const isLeft = player.role === "LE";
        const ballSideMatches = (context.ballSide === "left" && isLeft) || (context.ballSide === "right" && !isLeft);
        const side = this.getPlayerSideSign(player);

        if (ballSideMatches || context.ballSide === "center") {
          return this.progressToPoint(player.team, this.clamp(player.baseX + side * 2, 8, 92), this.clamp(anchor.progress + rules.ballSideFullbackPush, 28, shape.fullbackMaxProgress));
        }

        return this.progressToPoint(player.team, this.clamp(player.baseX + (50 - player.baseX) * 0.5, 20, 80), this.clamp(anchor.progress - rules.farSideFullbackTuck, 24, 48));
      }

      getFullbackCoverTarget(centerBack, target, context) {
        if (centerBack.role !== "ZAG") return target;

        const side = this.getPlayerSideSign(centerBack);
        const ballSideSign = this.getBallSideSign();
        if (ballSideSign && side !== ballSideSign) return target;

        const fullback = centerBack.team.players.find((player) => this.isFullbackRole(player.role) && this.getPlayerSideSign(player) === side);
        if (!fullback) return target;

        const fullbackProgress = this.getAttackProgress(fullback, centerBack.team);
        const teamProgress = this.getTeamBallProgress(centerBack.team);
        const expectedSupport = teamProgress > 42 && (context.ballSide === "center" || this.isBallSidePlayer(fullback, context));
        const fullbackIsAdvanced = fullbackProgress > context.lineCenters.defense + 11 || expectedSupport;
        if (!fullbackIsAdvanced) return target;

        return {
          x: this.clamp(target.x + side * 6.5, 24, 76),
          progress: this.clamp(Math.min(target.progress, context.lineCenters.defense + 5), 18, this.tacticalRules.shape442.centerBackMaxProgress - 3)
        };
      }

      getCompactLineShift(player, context) {
        if (player.role === "GOL") return 0;
        const direction = player.team.attacksDown ? 1 : -1;
        const lineTarget = context.defensiveLineY;
        const desiredGap = this.isAttackingRole(player.role)
          ? this.tacticalRules.compactness.defenseToMidfield + this.tacticalRules.compactness.midfieldToAttack
          : (this.isMidfieldRole(player.role) ? this.tacticalRules.compactness.defenseToMidfield : 0);
        const desiredY = lineTarget + direction * desiredGap;
        return this.clamp((desiredY - player.baseY) * 0.18, -8, 8);
      }

      getAttackRoleFactor(role) {
        if (role === "GOL") return 0;
        if (role === "ZAG") return 0.42;
        if (this.isFullbackRole(role)) return 1.08;
        if (role === "VOL") return 0.68;
        if (["MC", "ME", "MD"].includes(role)) return 0.98;
        if (role === "ALA") return 1.08;
        return 1;
      }

      getAttackRadius(player) {
        if (player.role === "GOL") return 3;
        if (player.role === "ZAG") return 6;
        if (this.isFullbackRole(player.role)) return 18;
        if (player === this.possession) return 18;
        if (this.isMidfieldRole(player.role)) return 15;
        if (this.isAttackingRole(player.role)) return 14;
        return 10;
      }

      getPressTarget(player) {
        const ownGoal = this.getOwnGoalPoint(player.team);
        const side = Math.sign(player.x - this.possession.x) || Math.sign(player.baseX - 50) || 1;
        const closePoint = this.pointBetween(this.possession, ownGoal, 0.1);

        return {
          x: closePoint.x + side * 1.4,
          y: closePoint.y
        };
      }

      getMarkingTarget(player, target) {
        const ownGoal = this.getOwnGoalPoint(player.team);
        const blockPoint = this.pointBetween(target, ownGoal, 0.32);
        const zoneDiscipline = this.isDefensiveLineRole(player.role) ? 0.48 : 0.18;
        const defensiveLineY = this.getDynamicDefensiveLineY(player.team, this.getTeamMentality(player.team), false);

        return {
          x: blockPoint.x * (1 - zoneDiscipline) + player.baseX * zoneDiscipline,
          y: blockPoint.y * (1 - zoneDiscipline) + defensiveLineY * zoneDiscipline
        };
      }

      getDefensiveZoneTarget(player, context = this.getTacticalContext(player.team)) {
        if (player.role === "GOL") {
          return { x: player.baseX, y: player.baseY };
        }

        const shape = this.tacticalRules.shape442;
        const side = this.getPlayerSideSign(player);
        const ballSide = this.isBallSidePlayer(player, context);
        const blockShift = this.clamp((this.possession.x - 50) * 0.14, -shape.blockHorizontalShift, shape.blockHorizontalShift);
        const lineY = this.getRoleDefensiveLineY(player, context);
        const ballYShift = this.isDefensiveLineRole(player.role)
          ? this.clamp((this.possession.y - lineY) * 0.04, -2, 2)
          : this.clamp((this.possession.y - lineY) * 0.08, -4, 4);
        let targetX = player.baseX + blockShift;

        if (player.role === "ZAG") {
          targetX = this.clamp(player.baseX + blockShift * 0.45, 34, 66);
        } else if (this.isFullbackRole(player.role)) {
          targetX = ballSide
            ? this.clamp(player.baseX + blockShift * 0.55, 8, 92)
            : this.clamp(player.baseX + (50 - player.baseX) * 0.28 + blockShift * 0.35, 18, 82);
        } else if (player.role === "VOL") {
          targetX = this.clamp(50 + blockShift * 0.35, 39, 61);
        } else if (player.role === "MC") {
          targetX = this.clamp(52 + blockShift * 0.55, 36, 68);
        } else if (player.role === "ME" || player.role === "MD") {
          targetX = ballSide
            ? this.clamp(player.baseX + side * 1.5 + blockShift * 0.35, 7, 93)
            : this.clamp(player.baseX + (50 - player.baseX) * 0.34 + blockShift * 0.45, 24, 76);
        } else if (this.isForwardRole(player.role)) {
          const pairRole = this.getForwardPairRole(player);
          targetX = this.clamp(50 + (pairRole === "depth" ? 7 : -7) + blockShift * 0.5, 34, 66);
        }

        return this.clampToRoleZone(player, {
          x: targetX,
          y: lineY + ballYShift
        }, context);
      }

      getRoleDefensiveLineY(player, context) {
        const direction = player.team.attacksDown ? 1 : -1;
        if (this.isDefensiveLineRole(player.role)) return context.defensiveLineY;
        if (this.isMidfieldRole(player.role)) {
          return context.defensiveLineY + direction * this.tacticalRules.compactness.defenseToMidfield;
        }
        if (this.isAttackingRole(player.role)) {
          return context.defensiveLineY + direction * (
            this.tacticalRules.compactness.defenseToMidfield +
            this.tacticalRules.compactness.midfieldToAttack
          );
        }
        return player.baseY;
      }

      getDefensiveAnchor(player, context) {
        return {
          x: this.clamp(this.getDefensiveZoneTarget(player, context).x, 6, 94),
          y: this.clamp(this.getRoleDefensiveLineY(player, context), 6, 94)
        };
      }

      assignZoneMarks(team) {
        const marks = new Map();
        const defenders = team.players.filter((player) => this.isDefensiveLineRole(player.role));
        const intruders = this.getOpponentTeam(team).players
          .filter((opponent) => this.hasInvadedDefensiveZone(opponent, team));
        const available = new Set(intruders);

        defenders.forEach((defender) => {
          const target = [...available]
            .map((opponent) => ({
              opponent,
              laneDistance: Math.abs(opponent.x - defender.baseX),
              distance: this.distanceBetween(opponent, defender)
            }))
            .filter((item) => item.laneDistance <= this.tacticalRules.zoneMarking.defenderLaneWidth || item.distance <= this.tacticalRules.zoneMarking.stickDistance)
            .sort((a, b) => a.laneDistance + a.distance * 0.35 - (b.laneDistance + b.distance * 0.35))[0]?.opponent;

          if (target) {
            marks.set(defender, target);
            available.delete(target);
          }
        });

        return marks;
      }

      assignMidfieldZoneMarks(team) {
        const marks = new Map();
        const midfielders = team.players.filter((player) => this.isMidfieldRole(player.role));
        const opponents = this.getOpponentTeam(team).players
          .filter((opponent) => opponent !== this.possession)
          .filter((opponent) => this.isBetweenLines(opponent, team));
        const available = new Set(opponents);

        midfielders.forEach((midfielder) => {
          const laneWidth = this.getMidfieldLaneWidth(midfielder, midfielders);
          const target = [...available]
            .map((opponent) => ({
              opponent,
              laneDistance: Math.abs(opponent.x - midfielder.baseX),
              distance: this.distanceBetween(opponent, midfielder)
            }))
            .filter((item) => item.laneDistance <= laneWidth || item.distance < 13)
            .sort((a, b) => a.laneDistance * 1.2 + a.distance * 0.35 - (b.laneDistance * 1.2 + b.distance * 0.35))[0]?.opponent;

          if (target) {
            marks.set(midfielder, target);
            available.delete(target);
          }
        });

        return marks;
      }

      getMidfieldLaneWidth(player, midfielders) {
        const centralMids = midfielders.filter((midfielder) => ["MC", "VOL"].includes(midfielder.role));
        if (centralMids.length >= 3 && ["MC", "VOL"].includes(player.role)) return 13;
        if (this.isWideRole(player.role)) return 16;
        return 18;
      }

      isBetweenLines(opponent, defendingTeam) {
        const ownGoal = this.getOwnGoalPoint(defendingTeam);
        const distanceToGoal = this.distanceBetween(opponent, ownGoal);
        return distanceToGoal >= 30 && distanceToGoal <= 66;
      }

      avoidTeammateCrowding(player, target) {
        const rules = this.tacticalRules.spacing;
        const nearby = player.team.players
          .filter((teammate) => teammate !== player)
          .filter((teammate) => this.distanceBetween(teammate, target) < rules.minimum);

        if (!nearby.length) return target;

        const push = nearby.reduce((vector, teammate) => {
          const away = this.normalizedVector(teammate, target);
          return {
            x: vector.x + away.x,
            y: vector.y + away.y
          };
        }, { x: 0, y: 0 });

        return {
          x: target.x + push.x * rules.pushX,
          y: target.y + push.y * rules.pushY
        };
      }

      hasInvadedDefensiveZone(opponent, defendingTeam) {
        const ownGoal = this.getOwnGoalPoint(defendingTeam);
        const distanceToGoal = this.distanceBetween(opponent, ownGoal);
        const dynamicTrigger = this.tacticalRules.zoneMarking.defenderTriggerDistanceToOwnGoal;

        return distanceToGoal < dynamicTrigger;
      }

      findMarkTarget(player) {
        const opponents = this.getOpponentTeam(player.team).players;
        const candidates = opponents
          .filter((opponent) => opponent !== this.possession)
          .filter((opponent) => opponent.role !== "GOL")
          .map((opponent) => ({
            opponent,
            distance: this.distanceBetween(player, opponent),
            baseDistance: this.distanceBetween({ x: player.baseX, y: player.baseY }, opponent)
          }))
          .filter((item) => item.distance < 20 || item.baseDistance < 16)
          .sort((a, b) => a.distance + a.baseDistance * 0.35 - (b.distance + b.baseDistance * 0.35));

        return candidates[0]?.opponent || null;
      }

      calculatePressure() {
        const allPlayers = this.teams.flatMap((team) => team.players);

        allPlayers.forEach((player) => {
          const opponents = allPlayers.filter((candidate) => candidate.team !== player.team && candidate.role !== "GOL");
          const nearestList = opponents
            .map((opponent) => ({ opponent, distance: player.distanceTo(opponent) }))
            .sort((a, b) => a.distance - b.distance);
          const nearest = nearestList[0];
          const nearbyPressure = nearestList
            .filter((item) => item.distance < 9)
            .reduce((sum, item) => sum + ((9 - item.distance) / 9) * this.getSuccessFactor(item.opponent, 0.1), 0);
          const nearestPressure = nearest ? (1 - nearest.distance / 18) * this.getSuccessFactor(nearest.opponent, 0.12) : 0;
          const receiverComposure = this.getErrorFactor(player, 0.08);

          player.marker = nearest?.opponent || null;
          player.pressure = nearest ? this.clamp((nearestPressure + nearbyPressure * 0.12) * receiverComposure, 0, 1) : 0;
        });
      }

      getNearestPlayers(players, target, amount) {
        return [...players]
          .sort((a, b) => this.distanceBetween(a, target) - this.distanceBetween(b, target))
          .slice(0, amount);
      }

      getOpponentTeam(team) {
        return this.teams.find((candidate) => candidate !== team);
      }

      getGoalPoint(team) {
        return { x: 50, y: team.attacksDown ? 100 : 0 };
      }

      getOwnGoalPoint(team) {
        return { x: 50, y: team.attacksDown ? 0 : 100 };
      }

      isWideRole(role) {
        return ["LE", "LD", "ME", "MD", "ALA", "PE", "PD"].includes(role);
      }

      isAttackingRole(role) {
        return ["ATA", "CA", "PE", "PD", "ME", "MD", "ALA"].includes(role);
      }

      isForwardRole(role) {
        return ["ATA", "CA", "PE", "PD"].includes(role);
      }

      isDefensiveLineRole(role) {
        return ["ZAG", "LE", "LD"].includes(role);
      }

      isFullbackRole(role) {
        return ["LE", "LD"].includes(role);
      }

      isMidfieldRole(role) {
        return ["VOL", "MC", "ME", "MD", "ALA"].includes(role);
      }

      canJoinAttack(player) {
        return player.role !== "GOL" && player.role !== "ZAG";
      }

      canPressBall(player) {
        if (player.role === "GOL") return false;
        if (this.isDefensiveLineRole(player.role) && !this.hasInvadedDefensiveZone(this.possession, player.team)) return false;
        const radius = this.isPostLossPressTeam(player.team)
          ? this.tacticalRules.postLossPress.radius
          : 34;
        return this.distanceBetween(player, this.possession) < radius;
      }

      isInShotZone(player) {
        return this.distanceBetween(player, this.getGoalPoint(player.team)) < 28;
      }

      isInFinalThird(player) {
        return this.distanceBetween(player, this.getGoalPoint(player.team)) < 45;
      }

      normalizedVector(from, to) {
        const dx = to.x - from.x;
        const dy = to.y - from.y;
        const distance = Math.hypot(dx, dy) || 1;
        return { x: dx / distance, y: dy / distance };
      }

      pointBetween(from, to, amount) {
        return {
          x: from.x + (to.x - from.x) * amount,
          y: from.y + (to.y - from.y) * amount
        };
      }

      distanceBetween(a, b) {
        return Math.hypot(a.x - b.x, a.y - b.y);
      }

      distanceMetersBetween(a, b) {
        const fieldWidthMeters = 68;
        const fieldLengthMeters = 105;
        const dx = ((a.x - b.x) / 100) * fieldWidthMeters;
        const dy = ((a.y - b.y) / 100) * fieldLengthMeters;
        return Math.hypot(dx, dy);
      }

      distanceToSegment(point, start, end) {
        const dx = end.x - start.x;
        const dy = end.y - start.y;
