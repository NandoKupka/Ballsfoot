<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Football Tactics MVP</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #101317;
      --panel: #191e24;
      --panel-soft: #20262d;
      --line: rgba(255, 255, 255, 0.13);
      --field: #247047;
      --field-alt: #1f633e;
      --text: #eef4f6;
      --muted: #9caab3;
      --yellow: #ffd84f;
      --shadow: 0 16px 44px rgba(0, 0, 0, 0.26);
      --radius: 8px;
      --ball-move-ms: 560ms;
      --player-move-ms: 260ms;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      color: var(--text);
      background:
        radial-gradient(circle at 18% 12%, rgba(110, 231, 183, 0.1), transparent 30%),
        radial-gradient(circle at 82% 20%, rgba(255, 216, 79, 0.08), transparent 28%),
        linear-gradient(145deg, #0d1014 0%, var(--bg) 48%, #15181c 100%);
    }

    button,
    select {
      font: inherit;
    }

    .app {
      width: min(1500px, 100%);
      min-height: 100vh;
      margin: 0 auto;
      padding: 22px;
      display: grid;
      grid-template-columns: minmax(220px, 280px) minmax(440px, 1fr) minmax(220px, 280px);
      gap: 18px;
      align-items: stretch;
    }

    .team-panel,
    .match-panel {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(25, 30, 36, 0.92);
      box-shadow: var(--shadow);
    }

    .team-panel {
      min-width: 0;
      padding: 18px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .team-heading {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .team-name {
      min-width: 0;
    }

    .team-name h2 {
      margin: 0 0 3px;
      font-size: 20px;
      line-height: 1.1;
      letter-spacing: 0;
    }

    .team-name span {
      display: block;
      color: var(--muted);
      font-size: 13px;
    }

    .team-mark {
      width: 34px;
      height: 34px;
      flex: 0 0 auto;
      display: grid;
      place-items: center;
      border-radius: 50%;
      font-weight: 800;
      font-size: 14px;
      border: 2px solid rgba(255, 255, 255, 0.18);
    }

    .team-mark {
      background: var(--team-color);
      box-shadow: 0 0 22px var(--team-glow);
    }

    .control-group {
      display: grid;
      gap: 7px;
    }

    .control-group label {
      color: var(--muted);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    select {
      width: 100%;
      min-height: 40px;
      color: var(--text);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #12171c;
      padding: 0 12px;
      outline: none;
    }

    select:focus {
      border-color: rgba(255, 255, 255, 0.32);
    }

    .player-list {
      display: grid;
      gap: 7px;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .player-list li {
      min-height: 34px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.035);
      padding: 7px 10px;
      color: #dfe7eb;
      font-size: 14px;
    }

    .player-list b {
      width: 24px;
      height: 24px;
      display: grid;
      place-items: center;
      flex: 0 0 auto;
      border-radius: 50%;
      color: #fff;
      font-size: 12px;
    }

    .player-list b {
      background: var(--team-color);
    }

    .player-role {
      color: var(--muted);
      font-size: 12px;
    }

    .match-panel {
      min-width: 0;
      padding: 16px;
      display: grid;
      grid-template-rows: auto 1fr;
      gap: 14px;
    }

    .scorebar {
      display: grid;
      grid-template-columns: minmax(92px, 0.65fr) minmax(180px, 1fr);
      align-items: center;
      gap: 12px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.035);
      padding: 12px;
    }

    .clock,
    .score {
      min-height: 58px;
      display: grid;
      place-items: center;
      border-radius: var(--radius);
      background: #12171c;
      border: 1px solid rgba(255, 255, 255, 0.08);
      font-weight: 800;
      line-height: 1;
    }

    .clock {
      font-size: clamp(26px, 4vw, 42px);
      font-variant-numeric: tabular-nums;
    }

    .score {
      grid-template-columns: 1fr auto 1fr;
      gap: 12px;
      padding: 0 14px;
      font-size: clamp(28px, 4vw, 44px);
      font-variant-numeric: tabular-nums;
    }

    .score small {
      color: var(--muted);
      font-size: 14px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .controls {
      display: grid;
      gap: 8px;
    }

    .match-actions {
      display: grid;
      grid-template-columns: minmax(160px, 1fr) minmax(140px, 0.8fr);
      gap: 10px;
      align-items: stretch;
    }

    .speed-control {
      min-height: 58px;
      display: grid;
      gap: 8px;
      align-content: center;
      border-radius: var(--radius);
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: #12171c;
      padding: 9px 12px;
    }

    .speed-label {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .speed-label output {
      color: var(--text);
      font-size: 13px;
      letter-spacing: 0;
      text-transform: none;
    }

    .speed-slider {
      width: 100%;
      accent-color: #6ee7b7;
      cursor: pointer;
    }

    .btn {
      min-height: 42px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: var(--radius);
      color: var(--text);
      background: var(--panel-soft);
      cursor: pointer;
      transition: transform 140ms ease, border-color 140ms ease, background 140ms ease;
      white-space: normal;
    }

    .btn:hover {
      transform: translateY(-1px);
      border-color: rgba(255, 255, 255, 0.26);
      background: #29313a;
    }

    .btn:active {
      transform: translateY(0);
    }

    .btn.primary {
      border-color: rgba(43, 211, 124, 0.4);
      background: #16834a;
    }

    .btn.primary:hover {
      background: #1b9656;
    }

    .match-body {
      display: grid;
      grid-template-columns: minmax(320px, 500px) minmax(240px, 1fr);
      gap: 14px;
      align-items: start;
      min-width: 0;
    }

    .field-wrap {
      width: min(100%, 500px);
      justify-self: center;
      align-self: stretch;
      display: grid;
      gap: 10px;
      min-height: 0;
    }

    .field {
      position: relative;
      width: 100%;
      aspect-ratio: 2 / 3;
      min-height: 420px;
      max-height: calc(100vh - 220px);
      align-self: center;
      overflow: hidden;
      border: 3px solid rgba(255, 255, 255, 0.58);
      border-radius: var(--radius);
      background:
        repeating-linear-gradient(
          0deg,
          var(--field) 0%,
          var(--field) 10%,
          var(--field-alt) 10%,
          var(--field-alt) 20%
        );
      box-shadow: inset 0 0 0 2px rgba(255, 255, 255, 0.13), 0 24px 55px rgba(0, 0, 0, 0.34);
    }

    .field::before,
    .field::after {
      content: "";
      position: absolute;
      pointer-events: none;
    }

    .field::before {
      inset: 50% 0 auto;
      height: 2px;
      background: rgba(255, 255, 255, 0.62);
      transform: translateY(-1px);
    }

    .field::after {
      left: 50%;
      top: 50%;
      width: 26%;
      aspect-ratio: 1;
      border: 2px solid rgba(255, 255, 255, 0.62);
      border-radius: 50%;
      transform: translate(-50%, -50%);
    }

    .center-dot,
    .box,
    .goal-line {
      position: absolute;
      pointer-events: none;
    }

    .center-dot {
      left: 50%;
      top: 50%;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.7);
      transform: translate(-50%, -50%);
      z-index: 1;
    }

    .box {
      left: 25%;
      width: 50%;
      height: 16%;
      border: 2px solid rgba(255, 255, 255, 0.58);
      z-index: 1;
    }

    .box.top {
      top: -2px;
      border-top: 0;
    }

    .box.bottom {
      bottom: -2px;
      border-bottom: 0;
    }

    .goal-line {
      left: 38%;
      width: 24%;
      height: 4%;
      border-inline: 2px solid rgba(255, 255, 255, 0.48);
      z-index: 1;
    }

    .goal-line.top {
      top: 0;
      border-bottom: 2px solid rgba(255, 255, 255, 0.48);
    }

    .goal-line.bottom {
      bottom: 0;
      border-top: 2px solid rgba(255, 255, 255, 0.48);
    }

    .player-token {
      --size: clamp(28px, 4.2vw, 36px);
      position: absolute;
      left: calc(var(--x) * 1%);
      top: calc(var(--y) * 1%);
      width: var(--size);
      height: var(--size);
      display: grid;
      place-items: center;
      border: 2px solid rgba(255, 255, 255, 0.74);
      border-radius: 50%;
      color: #fff;
      font-weight: 900;
      font-size: 14px;
      transform: translate(-50%, -50%);
      z-index: 3;
      box-shadow: 0 7px 18px rgba(0, 0, 0, 0.32);
      transition: left var(--player-move-ms) ease, top var(--player-move-ms) ease, box-shadow 160ms ease, border-color 160ms ease;
      user-select: none;
    }

    .player-token {
      background: radial-gradient(circle at 35% 25%, var(--team-highlight) 0%, var(--team-color) 48%, var(--team-deep) 100%);
    }

    .player-token.has-ball {
      border-color: var(--yellow);
      box-shadow: 0 0 0 4px rgba(255, 216, 79, 0.18), 0 0 28px rgba(255, 216, 79, 0.58);
    }

    .ball {
      position: absolute;
      left: 50%;
      top: 50%;
      width: clamp(12px, 2.2vw, 16px);
      height: clamp(12px, 2.2vw, 16px);
      border-radius: 50%;
      background: #f7fafc;
      border: 2px solid #d6dde2;
      box-shadow: 0 5px 14px rgba(0, 0, 0, 0.34), 0 0 14px rgba(255, 255, 255, 0.48);
      transform: translate(-50%, -50%);
      transition: left var(--ball-move-ms) cubic-bezier(0.2, 0.8, 0.25, 1), top var(--ball-move-ms) cubic-bezier(0.2, 0.8, 0.25, 1);
      z-index: 5;
      pointer-events: none;
    }

    .status-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      min-height: 30px;
      color: var(--muted);
      font-size: 14px;
    }

    .log-panel {
      min-width: 0;
      height: min(560px, calc(100vh - 210px));
      min-height: 360px;
      display: grid;
      grid-template-rows: auto auto 1fr auto;
      border: 1px solid rgba(255, 255, 255, 0.09);
      border-radius: var(--radius);
      background: rgba(18, 23, 28, 0.78);
      overflow: hidden;
    }

    .log-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 13px 14px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(255, 255, 255, 0.035);
    }

    .log-header h3 {
      margin: 0;
      font-size: 15px;
      letter-spacing: 0;
    }

    .log-badge {
      flex: 0 0 auto;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .match-stats {
      display: grid;
      gap: 0;
      padding: 10px 12px 12px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.045), rgba(255, 255, 255, 0.018));
    }

    .match-stats-head,
    .match-stats-row {
      display: grid;
      grid-template-columns: minmax(92px, 1.15fr) repeat(2, minmax(76px, 1fr));
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .match-stats-head {
      padding: 2px 10px 9px;
      color: var(--muted);
      font-size: 10px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.07em;
    }

    .match-stats-row {
      border-top: 1px solid rgba(255, 255, 255, 0.075);
      padding: 10px;
      color: var(--text);
      font-size: 12px;
      font-variant-numeric: tabular-nums;
    }

    .match-stats-team {
      position: relative;
      min-width: 0;
      overflow: hidden;
      color: var(--text);
      font-weight: 850;
      text-overflow: ellipsis;
      white-space: nowrap;
      text-align: right;
    }

    .match-stats-team::before {
      display: inline-block;
      width: 7px;
      height: 7px;
      margin-right: 6px;
      border-radius: 50%;
      background: var(--team-color);
      content: "";
      box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.055);
    }

    .match-stats-label {
      color: var(--muted);
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.035em;
      text-transform: uppercase;
    }

    .match-stats-value {
      text-align: right;
      color: var(--text);
      font-size: 12px;
      font-weight: 850;
    }

    .key-moments {
      display: flex;
      flex-direction: column;
      gap: 9px;
      padding: 12px;
      overflow-y: auto;
      background:
        radial-gradient(circle at top right, rgba(255, 255, 255, 0.035), transparent 42%),
        rgba(255, 255, 255, 0.018);
      scrollbar-color: rgba(255, 255, 255, 0.26) transparent;
    }

    .key-moment {
      display: grid;
      grid-template-columns: 42px 1fr;
      gap: 10px;
      align-items: start;
      min-width: 0;
      border: 1px solid rgba(255, 255, 255, 0.085);
      border-left: 3px solid rgba(255, 255, 255, 0.22);
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.042);
      padding: 10px;
      color: var(--text);
    }

    .key-moment time {
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
      font-variant-numeric: tabular-nums;
    }

    .key-moment strong {
      display: block;
      color: var(--text);
      font-size: 13px;
      font-weight: 850;
      line-height: 1.2;
    }

    .key-moment span {
      display: block;
      margin-top: 3px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.4;
    }

    .timeline-copy {
      display: grid;
      gap: 8px;
      padding: 10px;
      border-top: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(255, 255, 255, 0.035);
    }

    .log-export-actions {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    .copy-feedback {
      min-height: 16px;
      color: var(--muted);
      font-size: 12px;
      text-align: center;
    }

    .key-moment.turnover {
      border-left-color: var(--yellow);
    }

    .key-moment.system {
      border-left-color: #6ee7b7;
    }

    .key-moment.goal {
      border-left-color: var(--yellow);
      background: rgba(255, 216, 79, 0.1);
    }

    .event-log {
      display: none;
      margin: 0;
      padding: 10px;
      flex-direction: column;
      gap: 8px;
      overflow-y: auto;
      list-style: none;
      scrollbar-color: rgba(255, 255, 255, 0.26) transparent;
    }

    .event-log li {
      display: grid;
      grid-template-columns: 48px 1fr;
      gap: 9px;
      align-items: start;
      border: 1px solid rgba(255, 255, 255, 0.075);
      border-left: 3px solid rgba(255, 255, 255, 0.22);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.035);
      padding: 9px;
      color: #dfe7eb;
      font-size: 13px;
      line-height: 1.35;
    }

    .event-log time {
      color: var(--muted);
      font-weight: 800;
      font-variant-numeric: tabular-nums;
    }

    .event-copy {
      display: grid;
      gap: 5px;
      min-width: 0;
    }

    .event-title {
      color: var(--text);
      font-size: 13px;
      font-weight: 800;
    }

    .event-detail {
      color: var(--muted);
      font-size: 12px;
    }

    .event-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
    }

    .event-pill {
      border: 1px solid rgba(255, 255, 255, 0.09);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.045);
      color: #cbd6dc;
      padding: 3px 7px;
      font-size: 11px;
      font-weight: 700;
    }

    .event-log .turnover {
      border-left-color: var(--yellow);
    }

    .event-log .system {
      border-left-color: #6ee7b7;
      color: #d8f7ea;
    }

    .event-log .goal {
      border-left-color: var(--yellow);
      background: rgba(255, 216, 79, 0.09);
    }

    .status-dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: var(--muted);
      box-shadow: 0 0 0 4px rgba(255, 255, 255, 0.04);
    }

    .goal-modal {
      position: fixed;
      left: var(--goal-modal-left, 50%);
      top: var(--goal-modal-top, 50%);
      width: var(--goal-modal-width, min(500px, calc(100vw - 28px)));
      min-height: var(--goal-modal-height, 220px);
      z-index: 30;
      display: grid;
      place-items: center;
      background: rgba(5, 8, 12, 0.36);
      backdrop-filter: blur(3px);
      padding: 12px;
      transform: translate(-50%, -50%);
      pointer-events: auto;
    }

    .goal-modal[hidden] {
      display: none;
    }

    .goal-dialog {
      width: min(330px, 100%);
      border: 1px solid rgba(255, 216, 79, 0.3);
      border-radius: var(--radius);
      background: rgba(21, 26, 32, 0.95);
      box-shadow: 0 16px 42px rgba(0, 0, 0, 0.38);
      padding: 15px;
      display: grid;
      gap: 10px;
      text-align: center;
    }

    .goal-eyebrow {
      justify-self: center;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 999px;
      background: rgba(255, 216, 79, 0.12);
      color: var(--yellow);
      padding: 4px 9px;
      font-size: 11px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .goal-dialog h2 {
      margin: 0;
      color: var(--yellow);
      font-size: clamp(25px, 4vw, 34px);
      letter-spacing: 0;
      line-height: 1;
    }

    .goal-dialog p {
      margin: 0;
      color: var(--text);
      font-size: 13px;
      line-height: 1.45;
    }

    @media (max-width: 1120px) {
      .app {
        grid-template-columns: 1fr 1fr;
      }

      .match-panel {
        grid-column: 1 / -1;
        grid-row: 1;
      }

      .match-body {
        grid-template-columns: minmax(320px, 500px) minmax(260px, 1fr);
      }

      .team-panel {
        min-height: auto;
      }
    }

    @media (max-width: 760px) {
      .app {
        padding: 12px;
        grid-template-columns: 1fr;
      }

      .match-panel {
        grid-template-rows: auto auto;
        padding: 12px;
      }

      .match-body {
        grid-template-columns: 1fr;
      }

      .scorebar {
        grid-template-columns: 1fr;
      }

      .match-actions {
        grid-template-columns: 1fr;
      }

      .controls {
        grid-template-columns: 1fr;
      }

      .field {
        min-height: auto;
        max-height: none;
      }

      .log-panel {
        height: 300px;
        min-height: 300px;
      }

      .player-token {
        --size: 30px;
        font-size: 12px;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <div id="home-team-slot"></div>

    <section class="match-panel" aria-label="Simulador da partida">
      <header class="scorebar">
        <div class="clock" id="clock">00'</div>
        <div class="score" aria-label="Placar">
          <small id="score-home-label">Mandante</small>
          <span id="score">0 x 0</span>
          <small id="score-away-label">Visitante</small>
        </div>
      </header>

      <div class="match-body">
        <div class="field-wrap">
          <div class="field" id="field" aria-label="Campo de futebol">
            <div class="box top"></div>
            <div class="box bottom"></div>
            <div class="goal-line top"></div>
            <div class="goal-line bottom"></div>
            <div class="center-dot"></div>
            <div class="ball" id="ball" aria-hidden="true"></div>
          </div>
          <div class="status-row" aria-live="polite">
            <span class="status-dot" id="status-dot"></span>
            <span id="status-text"></span>
          </div>
          <div class="match-actions">
            <div class="speed-control">
              <label class="speed-label" for="speed-slider">
                Velocidade
                <output id="speed-value">1.0x</output>
              </label>
              <input class="speed-slider" id="speed-slider" type="range" min="0" max="6" step="1" value="1">
            </div>
            <div class="controls" id="controls"></div>
          </div>
        </div>

        <div class="log-panel" aria-label="Timeline da partida">
          <div class="log-header">
            <h3>Resumo da partida</h3>
            <span class="log-badge" id="log-count">0 importantes</span>
          </div>
          <div class="match-stats" id="match-stats" aria-label="Estatisticas da partida"></div>
          <div class="key-moments" id="key-moments" aria-label="Eventos importantes, do mais novo para o mais antigo"></div>
          <ol class="event-log" id="event-log" aria-hidden="true"></ol>
          <div class="timeline-copy">
            <div class="log-export-actions">
              <button class="btn" id="copy-logs" type="button">Copiar texto</button>
              <button class="btn" id="copy-jsonl" type="button">Copiar JSONL</button>
              <button class="btn" id="copy-csv" type="button">Copiar CSV</button>
              <button class="btn" id="download-json" type="button">Baixar JSON</button>
            </div>
            <span class="copy-feedback" id="copy-feedback" aria-live="polite"></span>
          </div>
        </div>
      </div>
    </section>
    <div id="away-team-slot"></div>

  </main>

  <div class="goal-modal" id="goal-modal" hidden>
    <div class="goal-dialog" role="dialog" aria-modal="true" aria-labelledby="goal-title">
      <span class="goal-eyebrow" id="goal-team">Gol</span>
      <h2 id="goal-title">GOOOL!</h2>
      <p id="goal-detail"></p>
      <button class="btn primary" id="goal-ok" type="button">OK</button>
    </div>
  </div>

  <script src="src/config/teams.js"></script>
  <script src="src/domain/match-engine.js"></script>
  <script src="src/ui/browser-game-adapter.js"></script>
</body>
</html>
