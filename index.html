<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Football Tactics MVP</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #101317;
      --panel: #191e24;
      --panel-soft: #20262d;
      --line: rgba(255, 255, 255, 0.13);
      --field: #247047;
      --field-alt: #1f633e;
      --text: #eef4f6;
      --muted: #9caab3;
      --yellow: #ffd84f;
      --shadow: 0 16px 44px rgba(0, 0, 0, 0.26);
      --radius: 8px;
      --ball-move-ms: 560ms;
      --player-move-ms: 260ms;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      color: var(--text);
      background:
        radial-gradient(circle at 18% 12%, rgba(110, 231, 183, 0.1), transparent 30%),
        radial-gradient(circle at 82% 20%, rgba(255, 216, 79, 0.08), transparent 28%),
        linear-gradient(145deg, #0d1014 0%, var(--bg) 48%, #15181c 100%);
    }

    button,
    select {
      font: inherit;
    }

    .app {
      width: min(1500px, 100%);
      min-height: 100vh;
      margin: 0 auto;
      padding: 22px;
      display: grid;
      grid-template-columns: minmax(220px, 280px) minmax(440px, 1fr) minmax(220px, 280px);
      gap: 18px;
      align-items: stretch;
    }

    .team-panel,
    .match-panel {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(25, 30, 36, 0.92);
      box-shadow: var(--shadow);
    }

    .team-panel {
      min-width: 0;
      padding: 18px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .team-heading {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .team-name {
      min-width: 0;
    }

    .team-name h2 {
      margin: 0 0 3px;
      font-size: 20px;
      line-height: 1.1;
      letter-spacing: 0;
    }

    .team-name span {
      display: block;
      color: var(--muted);
      font-size: 13px;
    }

    .team-mark {
      width: 34px;
      height: 34px;
      flex: 0 0 auto;
      display: grid;
      place-items: center;
      border-radius: 50%;
      font-weight: 800;
      font-size: 14px;
      border: 2px solid rgba(255, 255, 255, 0.18);
    }

    .team-mark {
      background: var(--team-color);
      box-shadow: 0 0 22px var(--team-glow);
    }

    .control-group {
      display: grid;
      gap: 7px;
    }

    .control-group label {
      color: var(--muted);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    select {
      width: 100%;
      min-height: 40px;
      color: var(--text);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #12171c;
      padding: 0 12px;
      outline: none;
    }

    select:focus {
      border-color: rgba(255, 255, 255, 0.32);
    }

    .player-list {
      display: grid;
      gap: 7px;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .player-list li {
      min-height: 34px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.035);
      padding: 7px 10px;
      color: #dfe7eb;
      font-size: 14px;
    }

    .player-list b {
      width: 24px;
      height: 24px;
      display: grid;
      place-items: center;
      flex: 0 0 auto;
      border-radius: 50%;
      color: #fff;
      font-size: 12px;
    }

    .player-list b {
      background: var(--team-color);
    }

    .player-role {
      color: var(--muted);
      font-size: 12px;
    }

    .match-panel {
      min-width: 0;
      padding: 16px;
      display: grid;
      grid-template-rows: auto 1fr;
      gap: 14px;
    }

    .scorebar {
      display: grid;
      grid-template-columns: minmax(92px, 0.65fr) minmax(180px, 1fr);
      align-items: center;
      gap: 12px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.035);
      padding: 12px;
    }

    .clock,
    .score {
      min-height: 58px;
      display: grid;
      place-items: center;
      border-radius: var(--radius);
      background: #12171c;
      border: 1px solid rgba(255, 255, 255, 0.08);
      font-weight: 800;
      line-height: 1;
    }

    .clock {
      font-size: clamp(26px, 4vw, 42px);
      font-variant-numeric: tabular-nums;
    }

    .score {
      grid-template-columns: 1fr auto 1fr;
      gap: 12px;
      padding: 0 14px;
      font-size: clamp(28px, 4vw, 44px);
      font-variant-numeric: tabular-nums;
    }

    .score small {
      color: var(--muted);
      font-size: 14px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .controls {
      display: grid;
      gap: 8px;
    }

    .match-actions {
      display: grid;
      grid-template-columns: minmax(160px, 1fr) minmax(140px, 0.8fr);
      gap: 10px;
      align-items: stretch;
    }

    .speed-control {
      min-height: 58px;
      display: grid;
      gap: 8px;
      align-content: center;
      border-radius: var(--radius);
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: #12171c;
      padding: 9px 12px;
    }

    .speed-label {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .speed-label output {
      color: var(--text);
      font-size: 13px;
      letter-spacing: 0;
      text-transform: none;
    }

    .speed-slider {
      width: 100%;
      accent-color: #6ee7b7;
      cursor: pointer;
    }

    .btn {
      min-height: 42px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: var(--radius);
      color: var(--text);
      background: var(--panel-soft);
      cursor: pointer;
      transition: transform 140ms ease, border-color 140ms ease, background 140ms ease;
      white-space: normal;
    }

    .btn:hover {
      transform: translateY(-1px);
      border-color: rgba(255, 255, 255, 0.26);
      background: #29313a;
    }

    .btn:active {
      transform: translateY(0);
    }

    .btn.primary {
      border-color: rgba(43, 211, 124, 0.4);
      background: #16834a;
    }

    .btn.primary:hover {
      background: #1b9656;
    }

    .match-body {
      display: grid;
      grid-template-columns: minmax(320px, 500px) minmax(240px, 1fr);
      gap: 14px;
      align-items: start;
      min-width: 0;
    }

    .field-wrap {
      width: min(100%, 500px);
      justify-self: center;
      align-self: stretch;
      display: grid;
      gap: 10px;
      min-height: 0;
    }

    .field {
      position: relative;
      width: 100%;
      aspect-ratio: 2 / 3;
      min-height: 420px;
      max-height: calc(100vh - 220px);
      align-self: center;
      overflow: hidden;
      border: 3px solid rgba(255, 255, 255, 0.58);
      border-radius: var(--radius);
      background:
        repeating-linear-gradient(
          0deg,
          var(--field) 0%,
          var(--field) 10%,
          var(--field-alt) 10%,
          var(--field-alt) 20%
        );
      box-shadow: inset 0 0 0 2px rgba(255, 255, 255, 0.13), 0 24px 55px rgba(0, 0, 0, 0.34);
    }

    .field::before,
    .field::after {
      content: "";
      position: absolute;
      pointer-events: none;
    }

    .field::before {
      inset: 50% 0 auto;
      height: 2px;
      background: rgba(255, 255, 255, 0.62);
      transform: translateY(-1px);
    }

    .field::after {
      left: 50%;
      top: 50%;
      width: 26%;
      aspect-ratio: 1;
      border: 2px solid rgba(255, 255, 255, 0.62);
      border-radius: 50%;
      transform: translate(-50%, -50%);
    }

    .center-dot,
    .box,
    .goal-line {
      position: absolute;
      pointer-events: none;
    }

    .center-dot {
      left: 50%;
      top: 50%;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.7);
      transform: translate(-50%, -50%);
      z-index: 1;
    }

    .box {
      left: 25%;
      width: 50%;
      height: 16%;
      border: 2px solid rgba(255, 255, 255, 0.58);
      z-index: 1;
    }

    .box.top {
      top: -2px;
      border-top: 0;
    }

    .box.bottom {
      bottom: -2px;
      border-bottom: 0;
    }

    .goal-line {
      left: 38%;
      width: 24%;
      height: 4%;
      border-inline: 2px solid rgba(255, 255, 255, 0.48);
      z-index: 1;
    }

    .goal-line.top {
      top: 0;
      border-bottom: 2px solid rgba(255, 255, 255, 0.48);
    }

    .goal-line.bottom {
      bottom: 0;
      border-top: 2px solid rgba(255, 255, 255, 0.48);
    }

    .player-token {
      --size: clamp(28px, 4.2vw, 36px);
      position: absolute;
      left: calc(var(--x) * 1%);
      top: calc(var(--y) * 1%);
      width: var(--size);
      height: var(--size);
      display: grid;
      place-items: center;
      border: 2px solid rgba(255, 255, 255, 0.74);
      border-radius: 50%;
      color: #fff;
      font-weight: 900;
      font-size: 14px;
      transform: translate(-50%, -50%);
      z-index: 3;
      box-shadow: 0 7px 18px rgba(0, 0, 0, 0.32);
      transition: left var(--player-move-ms) ease, top var(--player-move-ms) ease, box-shadow 160ms ease, border-color 160ms ease;
      user-select: none;
    }

    .player-token {
      background: radial-gradient(circle at 35% 25%, var(--team-highlight) 0%, var(--team-color) 48%, var(--team-deep) 100%);
    }

    .player-token.has-ball {
      border-color: var(--yellow);
      box-shadow: 0 0 0 4px rgba(255, 216, 79, 0.18), 0 0 28px rgba(255, 216, 79, 0.58);
    }

    .ball {
      position: absolute;
      left: 50%;
      top: 50%;
      width: clamp(12px, 2.2vw, 16px);
      height: clamp(12px, 2.2vw, 16px);
      border-radius: 50%;
      background: #f7fafc;
      border: 2px solid #d6dde2;
      box-shadow: 0 5px 14px rgba(0, 0, 0, 0.34), 0 0 14px rgba(255, 255, 255, 0.48);
      transform: translate(-50%, -50%);
      transition: left var(--ball-move-ms) cubic-bezier(0.2, 0.8, 0.25, 1), top var(--ball-move-ms) cubic-bezier(0.2, 0.8, 0.25, 1);
      z-index: 5;
      pointer-events: none;
    }

    .status-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      min-height: 30px;
      color: var(--muted);
      font-size: 14px;
    }

    .log-panel {
      min-width: 0;
      height: min(560px, calc(100vh - 210px));
      min-height: 360px;
      display: grid;
      grid-template-rows: auto auto 1fr auto;
      border: 1px solid rgba(255, 255, 255, 0.09);
      border-radius: var(--radius);
      background: rgba(18, 23, 28, 0.78);
      overflow: hidden;
    }

    .log-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 13px 14px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(255, 255, 255, 0.035);
    }

    .log-header h3 {
      margin: 0;
      font-size: 15px;
      letter-spacing: 0;
    }

    .log-badge {
      flex: 0 0 auto;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .match-stats {
      display: grid;
      gap: 8px;
      padding: 10px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(255, 255, 255, 0.028);
    }

    .match-stats-head,
    .match-stats-row {
      display: grid;
      grid-template-columns: minmax(64px, 1.1fr) repeat(4, minmax(42px, 0.7fr));
      align-items: center;
      gap: 6px;
      min-width: 0;
    }

    .match-stats-head {
      color: var(--muted);
      font-size: 10px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .match-stats-row {
      border: 1px solid rgba(255, 255, 255, 0.085);
      border-left: 3px solid var(--team-color);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.045);
      padding: 8px;
      color: var(--text);
      font-size: 12px;
      font-variant-numeric: tabular-nums;
    }

    .match-stats-team {
      min-width: 0;
      overflow: hidden;
      color: var(--text);
      font-weight: 850;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .match-stats-value {
      text-align: right;
      font-weight: 800;
    }

    .key-moments {
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 10px;
      overflow-y: auto;
      background: rgba(255, 255, 255, 0.025);
      scrollbar-color: rgba(255, 255, 255, 0.26) transparent;
    }

    .key-moment {
      display: grid;
      grid-template-columns: 48px 1fr;
      gap: 9px;
      align-items: start;
      min-width: 0;
      border: 1px solid rgba(255, 255, 255, 0.085);
      border-left: 3px solid rgba(255, 255, 255, 0.22);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.045);
      padding: 8px;
      color: var(--text);
    }

    .key-moment time {
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
      font-variant-numeric: tabular-nums;
    }

    .key-moment strong {
      display: block;
      overflow: hidden;
      color: var(--text);
      font-size: 12px;
      font-weight: 800;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .key-moment span {
      display: block;
      overflow: hidden;
      color: var(--muted);
      font-size: 11px;
      line-height: 1.25;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .timeline-copy {
      display: grid;
      gap: 8px;
      padding: 10px;
      border-top: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(255, 255, 255, 0.035);
    }

    .log-export-actions {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    .copy-feedback {
      min-height: 16px;
      color: var(--muted);
      font-size: 12px;
      text-align: center;
    }

    .key-moment.turnover {
      border-left-color: var(--yellow);
    }

    .key-moment.system {
      border-left-color: #6ee7b7;
    }

    .key-moment.goal {
      border-left-color: var(--yellow);
      background: rgba(255, 216, 79, 0.1);
    }

    .event-log {
      display: none;
      margin: 0;
      padding: 10px;
      flex-direction: column;
      gap: 8px;
      overflow-y: auto;
      list-style: none;
      scrollbar-color: rgba(255, 255, 255, 0.26) transparent;
    }

    .event-log li {
      display: grid;
      grid-template-columns: 48px 1fr;
      gap: 9px;
      align-items: start;
      border: 1px solid rgba(255, 255, 255, 0.075);
      border-left: 3px solid rgba(255, 255, 255, 0.22);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.035);
      padding: 9px;
      color: #dfe7eb;
      font-size: 13px;
      line-height: 1.35;
    }

    .event-log time {
      color: var(--muted);
      font-weight: 800;
      font-variant-numeric: tabular-nums;
    }

    .event-copy {
      display: grid;
      gap: 5px;
      min-width: 0;
    }

    .event-title {
      color: var(--text);
      font-size: 13px;
      font-weight: 800;
    }

    .event-detail {
      color: var(--muted);
      font-size: 12px;
    }

    .event-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
    }

    .event-pill {
      border: 1px solid rgba(255, 255, 255, 0.09);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.045);
      color: #cbd6dc;
      padding: 3px 7px;
      font-size: 11px;
      font-weight: 700;
    }

    .event-log .turnover {
      border-left-color: var(--yellow);
    }

    .event-log .system {
      border-left-color: #6ee7b7;
      color: #d8f7ea;
    }

    .event-log .goal {
      border-left-color: var(--yellow);
      background: rgba(255, 216, 79, 0.09);
    }

    .status-dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: var(--muted);
      box-shadow: 0 0 0 4px rgba(255, 255, 255, 0.04);
    }

    .goal-modal {
      position: fixed;
      left: var(--goal-modal-left, 50%);
      top: var(--goal-modal-top, 50%);
      width: var(--goal-modal-width, min(500px, calc(100vw - 28px)));
      min-height: var(--goal-modal-height, 220px);
      z-index: 30;
      display: grid;
      place-items: center;
      background: rgba(5, 8, 12, 0.36);
      backdrop-filter: blur(3px);
      padding: 12px;
      transform: translate(-50%, -50%);
      pointer-events: auto;
    }

    .goal-modal[hidden] {
      display: none;
    }

    .goal-dialog {
      width: min(330px, 100%);
      border: 1px solid rgba(255, 216, 79, 0.3);
      border-radius: var(--radius);
      background: rgba(21, 26, 32, 0.95);
      box-shadow: 0 16px 42px rgba(0, 0, 0, 0.38);
      padding: 15px;
      display: grid;
      gap: 10px;
      text-align: center;
    }

    .goal-eyebrow {
      justify-self: center;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 999px;
      background: rgba(255, 216, 79, 0.12);
      color: var(--yellow);
      padding: 4px 9px;
      font-size: 11px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .goal-dialog h2 {
      margin: 0;
      color: var(--yellow);
      font-size: clamp(25px, 4vw, 34px);
      letter-spacing: 0;
      line-height: 1;
    }

    .goal-dialog p {
      margin: 0;
      color: var(--text);
      font-size: 13px;
      line-height: 1.45;
    }

    @media (max-width: 1120px) {
      .app {
        grid-template-columns: 1fr 1fr;
      }

      .match-panel {
        grid-column: 1 / -1;
        grid-row: 1;
      }

      .match-body {
        grid-template-columns: minmax(320px, 500px) minmax(260px, 1fr);
      }

      .team-panel {
        min-height: auto;
      }
    }

    @media (max-width: 760px) {
      .app {
        padding: 12px;
        grid-template-columns: 1fr;
      }

      .match-panel {
        grid-template-rows: auto auto;
        padding: 12px;
      }

      .match-body {
        grid-template-columns: 1fr;
      }

      .scorebar {
        grid-template-columns: 1fr;
      }

      .match-actions {
        grid-template-columns: 1fr;
      }

      .controls {
        grid-template-columns: 1fr;
      }

      .field {
        min-height: auto;
        max-height: none;
      }

      .log-panel {
        height: 300px;
        min-height: 300px;
      }

      .player-token {
        --size: 30px;
        font-size: 12px;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <div id="home-team-slot"></div>

    <section class="match-panel" aria-label="Simulador da partida">
      <header class="scorebar">
        <div class="clock" id="clock">00'</div>
        <div class="score" aria-label="Placar">
          <small id="score-home-label">Mandante</small>
          <span id="score">0 x 0</span>
          <small id="score-away-label">Visitante</small>
        </div>
      </header>

      <div class="match-body">
        <div class="field-wrap">
          <div class="field" id="field" aria-label="Campo de futebol">
            <div class="box top"></div>
            <div class="box bottom"></div>
            <div class="goal-line top"></div>
            <div class="goal-line bottom"></div>
            <div class="center-dot"></div>
            <div class="ball" id="ball" aria-hidden="true"></div>
          </div>
          <div class="status-row" aria-live="polite">
            <span class="status-dot" id="status-dot"></span>
            <span id="status-text"></span>
          </div>
          <div class="match-actions">
            <div class="speed-control">
              <label class="speed-label" for="speed-slider">
                Velocidade
                <output id="speed-value">1.0x</output>
              </label>
              <input class="speed-slider" id="speed-slider" type="range" min="0" max="6" step="1" value="1">
            </div>
            <div class="controls" id="controls"></div>
          </div>
        </div>

        <div class="log-panel" aria-label="Timeline da partida">
          <div class="log-header">
            <h3>Timeline</h3>
            <span class="log-badge" id="log-count">0 lances</span>
          </div>
          <div class="match-stats" id="match-stats" aria-label="Estatisticas da partida"></div>
          <div class="key-moments" id="key-moments" aria-label="Lances importantes"></div>

    class Player {
      constructor(number, name, team, role, preferredPositions = [], squadIndex = 0) {
        this.number = number;
        this.name = name;
        this.team = team;
        this.role = role;
        this.preferredPositions = preferredPositions;
        this.squadIndex = squadIndex;
        this.overall = 80;
        this.baseX = 50;
        this.baseY = 50;
        this.targetX = 50;
        this.targetY = 50;
        this.pressure = 0;
        this.spaceScore = 0;
        this.marker = null;
        this.comboPartner = null;
        this.comboUntil = 0;
        this.dribbleCooldownUntil = 0;
        this.nextTargetUpdateAt = 0;
        this.movementRadius = 9;
        this.x = 50;
        this.y = 50;
        this.element = document.createElement("div");
        this.element.className = "player-token";
        this.element.style.setProperty("--team-color", team.colors.main);
        this.element.style.setProperty("--team-deep", team.colors.deep);
        this.element.style.setProperty("--team-highlight", team.colors.highlight);
        this.element.textContent = number;
        this.updateTitle();
      }

      setPosition(point) {
        this.x = point.x;
        this.y = point.y;
        this.element.style.setProperty("--x", this.x);
        this.element.style.setProperty("--y", this.y);
      }

      setBasePosition(point) {
        this.baseX = point.x;
        this.baseY = point.y;
        this.targetX = point.x;
        this.targetY = point.y;
        this.setPosition(point);
      }

      setTarget(point, radius = this.movementRadius, anchor = { x: this.baseX, y: this.baseY }) {
        const limited = this.limitToTacticalArea(point, radius, anchor);
        this.targetX = limited.x;
        this.targetY = limited.y;
      }

      moveTowardTarget(speed) {
        const dx = this.targetX - this.x;
        const dy = this.targetY - this.y;
        const distance = Math.hypot(dx, dy);

        if (distance <= 0.05) return;

        const step = Math.min(speed, distance);
        this.setPosition({
          x: this.x + (dx / distance) * step,
          y: this.y + (dy / distance) * step
        });
      }

      returnToBase(speed = 1.7) {
        this.setTarget({ x: this.baseX, y: this.baseY });
        this.moveTowardTarget(speed);
      }

      limitToTacticalArea(point, radius = this.movementRadius, anchor = { x: this.baseX, y: this.baseY }) {
        const dx = point.x - anchor.x;
        const dy = point.y - anchor.y;
        const distance = Math.hypot(dx, dy);
        const limited = distance > radius
          ? {
              x: anchor.x + (dx / distance) * radius,
              y: anchor.y + (dy / distance) * radius
            }
          : point;

        return {
          x: Math.max(6, Math.min(94, limited.x)),
          y: Math.max(6, Math.min(94, limited.y))
        };
      }

      setRole(role) {
        this.role = role;
        this.updateTitle();
      }

      setNumber(number) {
        this.number = number;
        this.element.textContent = number;
        this.updateTitle();
      }

      setOverall(overall) {
        this.overall = overall;
        this.updateTitle();
      }

      updateTitle() {
        this.element.title = `${this.team.name} ${this.number} - ${this.name} (${this.role}) OVR ${this.overall}`;
      }

      distanceTo(other) {
        const dx = this.x - other.x;
        const dy = this.y - other.y;
        return Math.hypot(dx, dy);
      }
    }

    class Team {
      constructor(options) {
        this.id = options.id;
        this.name = options.name;
        this.shortName = options.shortName;
        this.mark = options.mark;
        this.venue = options.venue;
        this.config = options.config;
        this.colors = options.colors;
        this.attacksDown = options.attacksDown;
        this.select = options.select;
        this.list = options.list;
        this.players = this.createPlayers();
        this.select.addEventListener("change", () => this.applyFormation(this.select.value));
      }

      createPlayers() {
        return this.config.players.map((playerData, index) => {
          const player = new Player(
            playerData.number ?? index + 1,
            playerData.name,
            this,
            "RES",
            Array.isArray(playerData.preferredPositions)
              ? playerData.preferredPositions.map((role) => String(role).toUpperCase())
              : [],
            index
          );

          player.setOverall(playerData.overall ?? 80);

          return player;
        });
      }

      renderList() {
        this.list.innerHTML = "";
        this.players.forEach((player) => {
          const item = document.createElement("li");
          item.innerHTML = `<span><b>${player.number}</b></span><span>${player.name}</span><span class="player-role">${player.role} | OVR ${player.overall}</span>`;
          this.list.appendChild(item);
        });
      }

      mount(field) {
        this.players.forEach((player) => field.appendChild(player.element));
      }

      applyFormation(name) {
        const formation = Team.formations[name] || Team.formations["4-4-2"];
        const mapped = this.attacksDown
          ? formation.slots.map((slot) => ({ ...slot, y: 100 - slot.y }))
          : formation.slots;
        const assignments = this.assignFormationSlots(mapped);

        this.players.forEach((player) => {
          const slot = assignments.get(player);
          if (!slot) return;
          player.setRole(slot.role);
          player.setBasePosition(slot);
        });
        this.renderList();
      }

      assignFormationSlots(slots) {
        const assignments = new Map();
        const availableSlots = slots.map((slot, index) => ({ ...slot, slotIndex: index }));
        const rankedPlayers = [...this.players].sort((a, b) =>
          b.overall - a.overall ||
          (a.preferredPositions.length || Number.MAX_SAFE_INTEGER) -
            (b.preferredPositions.length || Number.MAX_SAFE_INTEGER) ||
          a.squadIndex - b.squadIndex
        );
        const unassigned = [];

        rankedPlayers.forEach((player) => {
          let selectedIndex = -1;

          for (const preferredRole of player.preferredPositions) {
            selectedIndex = availableSlots.findIndex((slot) => slot.role === preferredRole);
            if (selectedIndex >= 0) break;
          }

          if (selectedIndex < 0) {
            unassigned.push(player);
            return;
          }

          assignments.set(player, availableSlots.splice(selectedIndex, 1)[0]);
        });

        unassigned.forEach((player) => {
          const fallbackSlot = availableSlots.shift();
          if (fallbackSlot) assignments.set(player, fallbackSlot);
        });

        return assignments;
      }

      static get formations() {
        return {
          "4-4-2": {
            slots: [
              { role: "GOL", x: 50, y: 91 },
              { role: "LE", x: 18, y: 77 }, { role: "ZAG", x: 39, y: 79 }, { role: "ZAG", x: 61, y: 79 }, { role: "LD", x: 82, y: 77 },
              { role: "ME", x: 18, y: 60 }, { role: "VOL", x: 40, y: 60 }, { role: "MC", x: 60, y: 60 }, { role: "MD", x: 82, y: 60 },
              { role: "ATA", x: 42, y: 41 }, { role: "ATA", x: 58, y: 41 }
            ]
          }
        };
      }
    }

    function renderTeamPanel(config, slot) {
      const panel = document.createElement("aside");
      const heading = document.createElement("div");
      const nameBlock = document.createElement("div");
      const title = document.createElement("h2");
      const venue = document.createElement("span");
      const mark = document.createElement("div");
      const control = document.createElement("div");
      const label = document.createElement("label");
      const select = document.createElement("select");
      const list = document.createElement("ol");
      const selectId = `${config.id}-formation`;

      panel.className = "team-panel";
      panel.setAttribute("aria-label", `Painel do ${config.name}`);
      panel.style.setProperty("--team-color", config.colors.main);
      panel.style.setProperty("--team-deep", config.colors.deep);
      panel.style.setProperty("--team-highlight", config.colors.highlight);
      panel.style.setProperty("--team-glow", config.colors.glow);

      heading.className = "team-heading";
      nameBlock.className = "team-name";
      title.textContent = config.name;
      venue.textContent = config.venue === "home" ? "Mandante" : "Visitante";
      mark.className = "team-mark";
      mark.setAttribute("aria-hidden", "true");
      mark.textContent = config.mark;

      control.className = "control-group";
      label.setAttribute("for", selectId);
      label.textContent = "Formacao";
      select.id = selectId;

      (config.formations || Object.keys(Team.formations)).forEach((formationName) => {
        const option = document.createElement("option");
        option.value = formationName;
        option.textContent = formationName;
        option.selected = formationName === config.defaultFormation;
        select.appendChild(option);
      });

      list.className = "player-list";
      nameBlock.append(title, venue);
      heading.append(nameBlock, mark);
      control.append(label, select);
      panel.append(heading, control, list);
      slot.replaceChildren(panel);

      return { panel, select, list };
    }

    class Game {
      constructor() {
        this.homeSlot = document.getElementById("home-team-slot");
        this.awaySlot = document.getElementById("away-team-slot");
        this.field = document.getElementById("field");
        this.ball = document.getElementById("ball");
        this.clock = document.getElementById("clock");
        this.score = document.getElementById("score");
        this.scoreHomeLabel = document.getElementById("score-home-label");
        this.scoreAwayLabel = document.getElementById("score-away-label");
        this.statusText = document.getElementById("status-text");
        this.statusDot = document.getElementById("status-dot");
        this.controls = document.getElementById("controls");
        this.speedSlider = document.getElementById("speed-slider");
        this.speedValue = document.getElementById("speed-value");
        this.eventLog = document.getElementById("event-log");
        this.keyMoments = document.getElementById("key-moments");
        this.matchStats = document.getElementById("match-stats");
        this.logCount = document.getElementById("log-count");
        this.copyLogsButton = document.getElementById("copy-logs");
        this.copyJsonlButton = document.getElementById("copy-jsonl");
        this.copyCsvButton = document.getElementById("copy-csv");
        this.downloadJsonButton = document.getElementById("download-json");
        this.copyFeedback = document.getElementById("copy-feedback");
        this.goalModal = document.getElementById("goal-modal");
        this.goalTeam = document.getElementById("goal-team");
        this.goalTitle = document.getElementById("goal-title");
        this.goalDetail = document.getElementById("goal-detail");
        this.goalOkButton = document.getElementById("goal-ok");
        this.logEntries = [];
        this.allLogEntries = [];
        this.keyMomentEntries = [];
        this.logSequence = 0;
        this.matchId = this.createMatchId();
        this.debugLogs = false;
        this.lastShotZoneKey = "";
        this.possessionProtectedUntil = 0;
        this.protectedTeam = null;
        this.nextPressureStealAllowedAt = 0;
        this.lastPossessionTeam = null;
        this.lostBallTeam = null;
        this.postLossPressUntil = 0;
        this.counterTeam = null;
        this.counterUntil = 0;
        this.lastCompletedPass = null;
        this.pendingGoalRestartTeam = null;
        this.pendingGoalScorer = null;
        this.shotInProgress = false;
        this.shapeRecoveryUntil = 0;
        this.tacticalRules = this.createTacticalRules();
        this.state = "pre";
        this.period = 1;
        this.halfMinute = 0;
        this.stoppage = this.drawStoppage();
        this.lastShotZoneKey = "";
        this.intervalId = null;
        this.movementIntervalId = null;
        this.speedOptions = [0.5, 1, 1.5, 2, 3, 4, 5];
        this.speed = 1;
        this.baseActionMs = 1000;
        this.baseMovementMs = 120;
        this.baseBallMoveMs = 560;
        this.basePlayerMoveMs = 260;

        this.setupTeams();
        this.possession = this.getKickoffPlayer(this.getKickoffTeamForPeriod(1));
        this.bindControls();
        this.render();
      }

      setupTeams() {
        const homeConfig = this.getTeamConfigByVenue("home");
        const awayConfig = this.getTeamConfigByVenue("away");

        const homeElements = renderTeamPanel(homeConfig, this.homeSlot);
        const awayElements = renderTeamPanel(awayConfig, this.awaySlot);

        this.homeTeam = this.createTeamFromConfig(homeConfig, homeElements, false);
        this.awayTeam = this.createTeamFromConfig(awayConfig, awayElements, true);
        this.teams = [this.homeTeam, this.awayTeam];
        this.scores = new Map(this.teams.map((team) => [team.id, 0]));
        this.possessionSamples = new Map(this.teams.map((team) => [team.id, 0]));
        this.scoreHomeLabel.textContent = this.homeTeam.shortName;
        this.scoreAwayLabel.textContent = this.awayTeam.shortName;
      }

      setTeamDirectionsForPeriod(period) {
        this.homeTeam.attacksDown = period === 2;
        this.awayTeam.attacksDown = period === 1;
        this.teams.forEach((team) => team.applyFormation(team.select.value));
      }

      getKickoffTeamForPeriod(period) {
        return period === 1 ? this.homeTeam : this.awayTeam;
      }

      getKickoffPlayer(team) {
        return this.getKickoffPlayers(team)[0] || team.players[0];
      }

      getHoldingMidfielder(team) {
        return team.players.find((player) => player.role === "VOL") ||
          team.players.find((player) => player.number === 5);
      }

      getPlaymaker(team) {
        return team.players.find((player) => player.number === 10) ||
          team.players.find((player) => player.role === "MC");
      }

      getNumberNine(team) {
        return team.players.find((player) => player.number === 9) ||
          team.players.find((player) => this.isForwardRole(player.role));
      }

      getKickoffPlayers(team) {
        const preferredNumbers = [9, 10];
        const preferred = preferredNumbers
          .map((number) => team.players.find((player) => player.number === number))
          .filter(Boolean);
        const forwards = team.players.filter((player) => this.isForwardRole(player.role));
        const midfielders = team.players.filter((player) => ["MC", "ME", "MD", "VOL"].includes(player.role));

        return [...new Set([...preferred, ...forwards, ...midfielders, ...team.players])].slice(0, 2);
      }

      getGoalkeeper(team) {
        return team.players.find((player) => player.role === "GOL") || team.players[0];
      }

      getKickoffPoint() {
        return { x: 50, y: 50 };
      }

      getOwnHalfY(team, desiredY, margin = 1.2) {
        if (team.attacksDown) {
          return Math.min(desiredY, 50 - margin);
        }

        return Math.max(desiredY, 50 + margin);
      }

      getTeamConfigByVenue(venue) {
        const configs = TEAMS_CONFIG.filter((team) => team.venue === venue);

        if (configs.length !== 1) {
          throw new Error("TEAMS_CONFIG precisa ter exatamente um mandante e um visitante.");
        }

        return configs[0];
      }

      createTeamFromConfig(config, elements, attacksDown) {
        return new Team({
          id: config.id,
          name: config.name,
          shortName: config.shortName,
          mark: config.mark,
          venue: config.venue,
          config,
          colors: config.colors,
          attacksDown,
          select: elements.select,
          list: elements.list
        });
      }

      resetScores() {
        this.scores = new Map(this.teams.map((team) => [team.id, 0]));
      }

      resetPossessionSamples() {
        this.possessionSamples = new Map(this.teams.map((team) => [team.id, 0]));
      }

      samplePossession() {
        if (!this.possession?.team || !this.possessionSamples) return;
        const teamId = this.possession.team.id;
        this.possessionSamples.set(teamId, (this.possessionSamples.get(teamId) || 0) + 1);
        this.renderMatchStats();
      }

      getTeamScore(team) {
        return this.scores.get(team.id) || 0;
      }

      incrementTeamScore(team) {
        this.scores.set(team.id, this.getTeamScore(team) + 1);
      }

      bindControls() {
        this.teams.forEach((team) => {
          team.select.addEventListener("change", () => {
            this.updateBall();
            this.updateStatus();
          });
        });

        this.speedSlider.addEventListener("input", () => {
          const optionIndex = Number(this.speedSlider.value);
          this.setGameSpeed(this.speedOptions[optionIndex] ?? 1);
        });
        this.copyLogsButton.addEventListener("click", () => this.copyLogs("text"));
        this.copyJsonlButton.addEventListener("click", () => this.copyLogs("jsonl"));
        this.copyCsvButton.addEventListener("click", () => this.copyLogs("csv"));
        this.downloadJsonButton.addEventListener("click", () => this.downloadLogs());
        this.goalOkButton.addEventListener("click", () => this.confirmGoalRestart());
        window.addEventListener("resize", () => this.updateBall(false));
      }

      render() {
        this.teams.forEach((team) => {
          team.mount(this.field);
        });
        this.setTeamDirectionsForPeriod(1);
        this.prepareKickoff(this.getKickoffTeamForPeriod(1), { instant: true });
        this.calculatePressure();
        this.updateClock();
        this.updateScore();
        this.renderMatchStats();
        this.updateControls();
        this.setGameSpeed(this.speed);
        this.addEventLog({
          time: "00'",
          type: "system",
          title: "Pronto para iniciar",
          detail: `Os times estao nas formacoes iniciais e a posse comeca com ${this.homeTeam.name}.`,
          meta: [this.score.textContent, `posse ${this.homeTeam.shortName}`]
        });
      }

      start() {
        if (this.intervalId || this.state === "finished") return;
        const previousState = this.state;

        if (this.state === "halftime") {
          this.period = 2;
          this.halfMinute = 0;
          this.setTeamDirectionsForPeriod(2);
          this.prepareKickoff(this.getKickoffTeamForPeriod(2), { instant: true });
        }

        this.state = "playing";
        this.updateClock();
        this.updateControls();
        this.updateStatus();
        if (previousState === "pre") {
          this.addEventLog({
            time: this.clock.textContent,
            type: "system",
            title: "Apito inicial",
            detail: "A simulacao comecou: os times vao ajustar linhas, pressionar e trocar passes.",
            meta: [`1o tempo +${this.stoppage.first}`, `posse ${this.possession.team.shortName}`]
          });
        } else if (previousState === "halftime") {
          this.addEventLog({
            time: this.clock.textContent,
            type: "system",
            title: "Comeca o segundo tempo",
            detail: `${this.possession.team.name} sai pelo meio, e os times inverteram o lado de ataque.`,
            meta: [`2o tempo +${this.stoppage.second}`, `posse ${this.possession.team.shortName}`]
          });
        } else if (previousState === "paused") {
          this.addEventLog({
            time: this.clock.textContent,
            type: "system",
            title: "Jogo retomado",
            detail: "A bola volta a circular a partir da posse atual.",
            meta: [`posse ${this.possession.team.name}`, this.score.textContent]
          });
        }
        this.startLoops();
      }

      pause() {
        if (this.state !== "playing") return;
        this.stop();
        this.state = "paused";
        this.updateControls();
        this.updateStatus("Partida pausada");
        this.addEventLog({
          time: this.clock.textContent,
          type: "system",
          title: "Partida pausada",
          detail: "A simulacao congelou com os jogadores nas posicoes atuais.",
          meta: [`posse ${this.possession.team.name}`, this.score.textContent]
        });
      }

      tick() {
        if (this.state !== "playing") {
          this.stop();
          return;
        }

        this.halfMinute += 1;
        this.samplePossession();
        this.updateClock();
        this.decideBallAction();
        if (this.shotInProgress) return;

        this.resolvePeriodIfComplete();
      }

      resolvePeriodIfComplete() {
        if (!this.isHalfComplete()) return false;

        this.stop();
        if (this.period === 1) {
          this.state = "halftime";
          this.updateStatus(`Intervalo - acrescimos do 1o tempo: +${this.stoppage.first}`);
          this.addEventLog({
            time: this.clock.textContent,
            type: "system",
            title: "Intervalo",
            detail: "Fim do primeiro tempo. Clique para iniciar a segunda etapa.",
            meta: [`acrescimos +${this.stoppage.first}`, this.score.textContent]
          });
        } else {
          this.state = "finished";
          this.updateStatus(`Fim de jogo - acrescimos do 2o tempo: +${this.stoppage.second}`);
          this.addEventLog({
            time: this.clock.textContent,
            type: "system",
            title: "Fim de jogo",
            detail: "A simulacao terminou. O botao de reiniciar esta liberado.",
            meta: [`acrescimos +${this.stoppage.second}`, this.score.textContent]
          });
        }
        this.updateControls();
        return true;
      }

      stop() {
        window.clearInterval(this.intervalId);
        window.clearInterval(this.movementIntervalId);
        this.intervalId = null;
        this.movementIntervalId = null;
      }

      startLoops() {
        window.clearInterval(this.intervalId);
        window.clearInterval(this.movementIntervalId);
        this.intervalId = window.setInterval(() => this.tick(), this.getActionIntervalMs());
        this.movementIntervalId = window.setInterval(() => this.updateMovement(), this.getMovementIntervalMs());
      }

      getActionIntervalMs() {
        return Math.max(70, this.baseActionMs / this.getPlaybackRate());
      }

      getMovementIntervalMs() {
        return Math.max(12, this.baseMovementMs / this.getPlaybackRate());
      }

      isShapeRecoveryActive() {
        return this.shapeRecoveryUntil > this.getExactMatchMinute();
      }

      setGameSpeed(speed) {
        this.speed = this.speedOptions.reduce((closest, option) =>
          Math.abs(option - speed) < Math.abs(closest - speed) ? option : closest
        , this.speedOptions[0]);
        this.speedSlider.value = String(this.speedOptions.indexOf(this.speed));
        this.speedValue.textContent = `${this.formatSpeed(this.speed)}x`;
        const playbackRate = this.getPlaybackRate();
        document.documentElement.style.setProperty("--ball-move-ms", `${Math.round(this.baseBallMoveMs / playbackRate)}ms`);
        document.documentElement.style.setProperty("--player-move-ms", `${Math.round(this.basePlayerMoveMs / playbackRate)}ms`);

        if (this.state === "playing" && !this.shotInProgress) {
          this.startLoops();
        }
      }

      formatSpeed(speed) {
        return Number.isInteger(speed) ? `${speed}.0` : String(speed);
      }

      getPlaybackRate() {
        return this.speed * 2;
      }

      createTacticalRules() {
        return {
          defensiveLine: {
            ownBox: 16,
            lowBlock: 25,
            midBlock: 37,
            highBlock: 52,
            buildUp: 34,
            maxStepFromBase: 24
          },
          compactness: {
            defenseToMidfield: 17,
            midfieldToAttack: 16,
            maxTeamStretch: 36,
            horizontalBallShift: 8,
            possessionDefenseFollow: 0.32,
            possessionMidfieldFollow: 0.58,
            possessionAttackFollow: 0.82,
            defendingDefenseFollow: 0.48,
            defendingMidfieldFollow: 0.68,
            defendingAttackFollow: 0.54
          },
          shape442: {
            attackLinePush: 23,
            defenseLineSupportPush: 9,
            blockHorizontalShift: 8,
            nearSideSupport: 7,
            farSideTuck: 8,
            wideLane: 16,
            centralLane: 50,
            strikerSupportDrop: 10,
            strikerDepthPush: 9,
            strikerLineGap: 3.2,
            strikerAggressiveRunChance: 0.32,
            strikerAggressiveRunPush: 8,
            strikerBetweenCenterBacksWidth: 7,
            supportStrikerWideLane: 25,
            numberNineWingAdvance: 10,
            mcPocketDepth: 12,
            mcPocketWidth: 13,
            fullbackMaxProgress: 58,
            centerBackMaxProgress: 50,
            holdingMidMaxProgress: 58,
            midfieldMaxProgress: 72,
            wideMidfieldMaxProgress: 84
          },
          zoneMarking: {
            defenderTriggerDistanceToOwnGoal: 38,
            defenderLaneWidth: 14,
            stickDistance: 11,
            coverDistance: 13
          },
          buildUp: {
            ownHalfDepth: 54,
            centerBackWidth: 9,
            centerBackStep: 9,
            holdingMidDrop: 8,
            ballSideFullbackPush: 15,
            farSideFullbackTuck: 10
          },
          counter: {
            durationMinutes: 5,
            lineHeightTrigger: 45,
            forwardPassBias: 1.65,
            carryChanceBoost: 0.18,
            runPush: 10
          },
          postLossPress: {
            durationMinutes: 3,
            pressers: 3,
            fallbackPressers: 1,
            radius: 40
          },
          supportOptions: {
            normalCount: 2,
            pressuredCount: 3,
            closeMin: 8,
            closeMax: 24,
            sideDistance: 12,
            behindDistance: 10,
            aheadDistance: 9
          },
          passingLaneCover: {
            normalClosers: 2,
            postLossClosers: 2,
            maxLaneDistance: 18,
            maxPlayerDistance: 30
          },
          spacing: {
            minimum: 8.5,
            pushX: 5.2,
            pushY: 3.8
          },
          passing: {
            closeOptionIdealMin: 8,
            closeOptionIdealMax: 24,
            switchMinDistance: 28,
            laneSafetyWeight: 1.35,
            blockedLaneError: 0.12,
            buildThroughVolanteBias: 1.9,
            playmakerBias: 1.5,
            wingOutletBias: 1.28,
            strikerOutletBias: 1.22,
            lateralPressureSwitchBias: 1.85,
            lateralPressureRecycleBias: 1.45,
            lateralPressureSameSidePenalty: 0.62,
            intentSwitchBias: 1.7,
            intentRecycleBias: 1.45,
            intentProgressBias: 1.28,
            intentCreateBias: 1.24
          },
          reaction: {
            urgent: 0.12,
            normal: 0.55,
            patient: 1.1,
            roleDelay: {
              GOL: 1.15,
              ZAG: 0.95,
              LE: 0.7,
              LD: 0.7,
              VOL: 0.68,
              MC: 0.56,
              ME: 0.58,
              MD: 0.58,
              ATA: 0.5,
              CA: 0.5
            }
          },
          restarts: {
            shapeRecoveryMinutes: 1.4,
            recoveryMoveSpeed: 0.95
          },
          dribble: {
            pressureMin: 0.28,
            nearestMarkerMaxDistance: 8.5,
            cooldownMinutes: 1.4,
            baseChance: 0.18,
            progressPush: 7,
            sideStep: 4.5,
            roleFrequency: {
              ATA: 0.28,
              CA: 0.28,
              PE: 0.3,
              PD: 0.3,
              ME: 0.16,
              MD: 0.16,
              MC: 0.13,
              ALA: 0.17,
              LE: 0.08,
              LD: 0.08,
              VOL: 0.05,
              ZAG: 0.015,
              GOL: 0
            },
            roleSuccess: {
              ATA: 0.08,
              CA: 0.08,
              PE: 0.1,
              PD: 0.1,
              ME: 0.04,
              MD: 0.04,
              MC: 0.035,
              ALA: 0.05,
              LE: -0.02,
              LD: -0.02,
              VOL: -0.06,
              ZAG: -0.12,
              GOL: -1
            }
          },
          offside: {
            active: true,
            margin: 1.2,
            avoidDrop: 2.4,
            passWeightPenalty: 0.04
          },
          mentality: {
            chasingLinePush: 6,
            protectingLineDrop: 6,
            chasingAttackBoost: 1.12,
            protectingAttackDrop: 0.84
          }
        };
      }

      reset() {
        if (this.state !== "finished") return;
        this.stop();
        this.state = "pre";
        this.period = 1;
        this.halfMinute = 0;
        this.stoppage = this.drawStoppage();
        this.resetScores();
        this.resetPossessionSamples();
        this.possessionProtectedUntil = 0;
        this.protectedTeam = null;
        this.nextPressureStealAllowedAt = 0;
        this.lastPossessionTeam = null;
        this.lostBallTeam = null;
        this.postLossPressUntil = 0;
        this.counterTeam = null;
        this.counterUntil = 0;
        this.lastCompletedPass = null;
        this.pendingGoalRestartTeam = null;
        this.pendingGoalScorer = null;
        this.goalModal.hidden = true;
        this.shotInProgress = false;
        this.shapeRecoveryUntil = 0;
        this.matchId = this.createMatchId();
        this.setTeamDirectionsForPeriod(1);
        this.prepareKickoff(this.getKickoffTeamForPeriod(1), { instant: true });
        this.calculatePressure();
        this.updateClock();
        this.updateScore();
        this.renderMatchStats();
        this.updateControls();
        this.clearEventLog();
        this.addEventLog({
          time: "00'",
          type: "system",
          title: "Jogo reiniciado",
          detail: "Placares, relogio e posicoes voltaram ao estado inicial.",
          meta: ["0 x 0", "novos acrescimos"]
        });
      }

      drawStoppage() {
        return {
          first: Math.floor(Math.random() * 5) + 1,
          second: Math.floor(Math.random() * 5) + 1
        };
      }

      halfLimit() {
        return 45 + (this.period === 1 ? this.stoppage.first : this.stoppage.second);
      }

      isHalfComplete() {
        return this.halfMinute >= this.halfLimit();
      }

      getMatchMinute() {
        return (this.period === 1 ? 0 : 45) + Math.floor(this.halfMinute);
      }

      getExactMatchMinute() {
        return (this.period === 1 ? 0 : 45) + this.halfMinute;
      }

      resetTeamShapes(options = {}) {
        const updateBall = options.updateBall !== false;

        this.teams.forEach((team) => {
          team.players.forEach((player) => {
            player.setPosition({ x: player.baseX, y: player.baseY });
            player.setTarget({ x: player.baseX, y: player.baseY });
            player.spaceScore = 0;
            player.comboPartner = null;
            player.comboUntil = 0;
            player.dribbleCooldownUntil = 0;
            player.nextTargetUpdateAt = 0;
          });
        });
        if (updateBall) {
          this.updateBall(false);
        }
      }

      softResetTeamShapes() {
        this.teams.forEach((team) => {
          team.players.forEach((player) => {
            player.setTarget({ x: player.baseX, y: player.baseY });
          });
        });
      }

      prepareKickoff(team, options = {}) {
        const instant = options.instant !== false;
        const taker = this.getKickoffPlayer(team);

        this.shapeRecoveryUntil = 0;
        this.resetTeamShapes({ updateBall: false });
        this.clearTransitionState();
        this.arrangeKickoffShape(team);
        this.updatePossession(taker, !instant, { skipTransition: true });
      }

      arrangeKickoffShape(kickoffTeam) {
        const kickoffPlayers = this.getKickoffPlayers(kickoffTeam);
        const kickoffSet = new Set(kickoffPlayers);
        const kickoffSpots = [
          { x: 50, y: 50 },
          { x: 54, y: 50 }
        ];

        kickoffPlayers.forEach((player, index) => {
          const spot = kickoffSpots[index] || this.getKickoffPoint();
          player.setPosition(spot);
          player.setTarget(spot, 1, spot);
        });

        this.teams.forEach((team) => {
          team.players.forEach((player) => {
            if (kickoffSet.has(player)) return;

            const halfMargin = team === kickoffTeam ? 1.4 : 6;
            const point = {
              x: player.baseX,
              y: this.getOwnHalfY(team, player.baseY, halfMargin)
            };

            player.setPosition(point);
            player.setTarget(point, 3, point);
          });
        });
      }

      updateMovement() {
        if (this.shotInProgress) return;

        this.calculatePressure();
        if (this.isShapeRecoveryActive()) {
          this.softResetTeamShapes();
          this.teams.forEach((team) => {
            team.players.forEach((player) => player.moveTowardTarget(this.tacticalRules.restarts.recoveryMoveSpeed));
          });
          this.calculatePressure();
          this.updateBall(true);
          return;
        }

        this.teams.forEach((team) => {
          if (team === this.possession.team) {
            this.moveTeamInPossession(team);
          } else {
            this.moveTeamOutOfPossession(team);
          }
        });
        this.calculatePressure();
        this.tryPressureSteal();
        this.updateBall(true);
      }

      moveTeamInPossession(team) {
        const context = this.getTacticalContext(team);
        const supportTargets = this.assignPossessionSupportTargets(team, context);
        team.players.forEach((player) => {
          const anchor = this.getAttackingAnchor(player, context);
          const speed = this.getPossessionMoveSpeed(player, context);

          if (player === this.possession) {
            if (player.role === "GOL") {
              this.setReactiveTarget(player, this.getGoalkeeperSupportTarget(player, context), 6, { x: player.baseX, y: player.baseY }, "patient");
              player.moveTowardTarget(0.85);
              return;
            }

            this.setReactiveTarget(player, this.getCarrierTarget(player, anchor, context), this.getAttackRadius(player), anchor, player.pressure > 0.55 ? "urgent" : "normal");
            player.moveTowardTarget(this.getCarrierMoveSpeed(player));
            return;
          }

          if (player.role === "GOL") {
            this.setReactiveTarget(player, this.getGoalkeeperSupportTarget(player, context), 6, { x: player.baseX, y: player.baseY }, "patient");
            player.moveTowardTarget(0.75);
            return;
          }

          if (supportTargets.has(player)) {
            this.setReactiveTarget(player, supportTargets.get(player), this.getAttackRadius(player), anchor, "normal");
            player.moveTowardTarget(speed * 1.08);
            return;
          }

          this.setReactiveTarget(player, this.getSupportTarget(player, anchor, context), this.getAttackRadius(player), anchor, this.isForwardRole(player.role) || player.role === "MC" ? "normal" : "patient");
          player.moveTowardTarget(speed);
        });
      }

      moveTeamOutOfPossession(team) {
        const context = this.getTacticalContext(team);
        const zoneMarks = this.assignZoneMarks(team);
        const midfieldMarks = this.assignMidfieldZoneMarks(team);
        const pressAmount = this.isPostLossPressTeam(team)
          ? this.tacticalRules.postLossPress.pressers
          : this.tacticalRules.postLossPress.fallbackPressers;
        const nearestPressers = this.getNearestPlayers(
          team.players.filter((player) => this.canPressBall(player)),
          this.possession,
          pressAmount
        );
        const coverShadows = this.assignPassingLaneCovers(team, nearestPressers, context);
        const coverMarks = this.assignCoverMarks(team, nearestPressers, new Set(coverShadows.keys()));

        team.players.forEach((player) => {
          const defensiveAnchor = this.getDefensiveAnchor(player, context);
          if (player.role === "GOL") {
            this.setReactiveTarget(player, this.getGoalkeeperHomeTarget(player), 3, { x: player.baseX, y: player.baseY }, "patient");
            player.moveTowardTarget(0.8);
            return;
          }

          if (nearestPressers.includes(player)) {
            this.setReactiveTarget(player, this.getPressTarget(player), 15, defensiveAnchor, "urgent");
            player.moveTowardTarget(this.isPostLossPressTeam(team) ? 2.35 : 2.05);
            return;
          }

          if (coverShadows.has(player)) {
            this.setReactiveTarget(player, this.avoidTeammateCrowding(player, coverShadows.get(player)), 9, defensiveAnchor, "normal");
            player.moveTowardTarget(1.62);
            return;
          }

          if (coverMarks.has(player)) {
            this.setReactiveTarget(player, this.avoidTeammateCrowding(player, coverMarks.get(player)), 9, defensiveAnchor, "normal");
            player.moveTowardTarget(1.55);
            return;
          }

          const markTarget = zoneMarks.get(player) || midfieldMarks.get(player) || (player.role !== "GOL" && !this.isDefensiveLineRole(player.role) ? this.findMarkTarget(player) : null);
          if (markTarget) {
            const radius = this.isDefensiveLineRole(player.role) ? 8 : 11;
            this.setReactiveTarget(player, this.avoidTeammateCrowding(player, this.getMarkingTarget(player, markTarget)), radius, defensiveAnchor, "normal");
            player.moveTowardTarget(1.45);
            return;
          }

          this.setReactiveTarget(player, this.avoidTeammateCrowding(player, this.getDefensiveZoneTarget(player, context)), this.isDefensiveLineRole(player.role) ? 5 : 8, defensiveAnchor, "patient");
          player.moveTowardTarget(this.isDefensiveLineRole(player.role) ? 1.05 : 1.35);
        });
      }

      setReactiveTarget(player, target, radius, anchor, urgency = "normal") {
        const now = this.getExactMatchMinute();
        const distanceToTarget = this.distanceBetween({ x: player.targetX, y: player.targetY }, target);
        const mustUpdate = distanceToTarget > 7 || this.distanceBetween(player, target) < 1.3 || now >= player.nextTargetUpdateAt;

        if (!mustUpdate) return;

        player.setTarget(target, radius, anchor);
        player.nextTargetUpdateAt = now + this.getReactionDelay(player, urgency);
      }

      getReactionDelay(player, urgency = "normal") {
        const rules = this.tacticalRules.reaction;
        const urgencyBase = rules[urgency] ?? rules.normal;
        const roleDelay = rules.roleDelay[player.role] ?? 0.7;
        const pressureAcceleration = player.pressure > 0.55 ? 0.72 : 1;

        return urgencyBase * roleDelay * pressureAcceleration;
      }

      getTacticalContext(team) {
        const mentality = this.getTeamMentality(team);
        const inPossession = team === this.possession.team;
        const tacticalState = this.createTacticalState(team, inPossession, mentality);

        return {
          team,
          inPossession,
          mentality,
          tacticalState,
          phase: tacticalState.phase,
          intent: tacticalState.intent,
          pressureZone: tacticalState.pressureZone,
          ballSide: tacticalState.ballSide,
          lineCenters: tacticalState.lineCenters,
          defensiveLineY: this.progressToPoint(team, 50, tacticalState.lineCenters.defense).y,
          counter: this.isCounterTeam(team),
          postLossPress: this.isPostLossPressTeam(team)
        };
      }

      createTacticalState(team, inPossession, mentality) {
        const progress = this.getTeamBallProgress(team);
        const ballSide = this.getBallSide();
        const pressureZone = this.getPressureZone(this.possession);
        const phase = this.getTacticalPhase(team, inPossession, progress, pressureZone);
        const lineCenters = this.getLineCenters(team, inPossession, phase, progress, mentality);
        const intent = inPossession ? this.getCarrierIntent(this.possession, phase, pressureZone, progress) : "defend";

        return { phase, intent, pressureZone, ballSide, lineCenters };
      }

      getTacticalPhase(team, inPossession, progress, pressureZone) {
        if (!inPossession) {
          return this.isPostLossPressTeam(team) ? "transition" : "defending";
        }

        if (pressureZone === "wideTrap") return "wideAttack";
        if (progress < this.tacticalRules.buildUp.ownHalfDepth) return "buildUp";
        if (progress > 74 || this.distanceBetween(this.possession, this.getGoalPoint(team)) < 34) return "finalThird";
        if (this.possession.x < 25 || this.possession.x > 75) return "wideAttack";
        return "progression";
      }

      getPressureZone(player) {
        if (!player || player.pressure < 0.56) return "none";
        if (player.x < 30 || player.x > 70) return "wideTrap";
        return "centralPressure";
      }

      getCarrierIntent(carrier, phase, pressureZone, progress) {
        if (this.isInShotZone(carrier)) {
          return carrier.pressure < 0.82 ? "finish" : "create";
        }
        if (pressureZone === "wideTrap") return "switch";
        if (phase === "finalThird") {
          return carrier.pressure > 0.84 ? "recycle" : "create";
        }
        if (carrier.pressure > 0.7) return "recycle";
        if (phase === "buildUp") return "progress";
        if (progress > 64 && carrier.pressure < 0.45) return "create";
        return "progress";
      }

      getLineCenters(team, inPossession, phase, progress, mentality) {
        const rules = this.tacticalRules.compactness;
        const baseDefense = this.getAttackProgress({ x: 50, y: this.getDynamicDefensiveLineY(team, mentality, inPossession) }, team);
        let defense = baseDefense;

        if (inPossession) {
          defense = this.clamp(22 + progress * rules.possessionDefenseFollow, 22, this.tacticalRules.shape442.centerBackMaxProgress);
        } else {
          defense = this.clamp(14 + progress * rules.defendingDefenseFollow, 14, 58);
        }

        if (phase === "buildUp") defense = this.clamp(defense, 22, 40);
        if (phase === "finalThird" && inPossession) defense = this.clamp(defense + 4, 34, 54);
        if (phase === "transition") defense = this.clamp(defense + 6, 18, 62);
        if (mentality === "protecting" && !inPossession) defense = this.clamp(defense - 5, 12, 56);
        if (mentality === "chasing") defense = this.clamp(defense + 5, 18, 64);

        const midfieldGap = phase === "buildUp" ? rules.defenseToMidfield + 2 : rules.defenseToMidfield;
        const attackGap = phase === "finalThird" ? rules.midfieldToAttack + 3 : rules.midfieldToAttack;
        const midfieldFollow = inPossession ? rules.possessionMidfieldFollow : rules.defendingMidfieldFollow;
        const attackFollow = inPossession ? rules.possessionAttackFollow : rules.defendingAttackFollow;
        const midfield = this.clamp(defense + midfieldGap + progress * (midfieldFollow - 0.45) * 0.25, 26, 76);
        const attack = this.clamp(midfield + attackGap + progress * (attackFollow - 0.5) * 0.22, 42, 90);

        return { defense, midfield, attack };
      }

      getTeamMentality(team) {
        const opponent = this.getOpponentTeam(team);
        const scoreDiff = this.getTeamScore(team) - this.getTeamScore(opponent);
        const lateGame = this.getMatchMinute() >= 75;

        if (scoreDiff < 0 && lateGame) return "chasing";
        if (scoreDiff > 0 && lateGame) return "protecting";
        return "balanced";
      }

      getTeamPhase(team, inPossession) {
        if (!inPossession) return "defending";
        const progress = team.attacksDown ? this.possession.y : 100 - this.possession.y;
        if (progress < this.tacticalRules.buildUp.ownHalfDepth) return "buildUp";
        if (progress > 68) return "finalThird";
        return "progression";
      }

      getBallSide() {
        if (this.possession.x < 42) return "left";
        if (this.possession.x > 58) return "right";
        return "center";
      }

      getBallSideSign() {
        if (this.possession.x < 42) return -1;
        if (this.possession.x > 58) return 1;
        return 0;
      }

      getPlayerSideSign(player) {
        if (player.role === "LE" || player.role === "ME") return -1;
        if (player.role === "LD" || player.role === "MD") return 1;
        return Math.sign(player.baseX - 50) || 0;
      }

      isBallSidePlayer(player, context = this.getTacticalContext(player.team)) {
        const side = this.getPlayerSideSign(player);
        return context.ballSide === "center" || side === 0 || side === this.getBallSideSign();
      }

      getTeamBallProgress(team) {
        return this.getAttackProgress(this.possession, team);
      }

      progressToPoint(team, x, progress) {
        return {
          x,
          y: team.attacksDown ? progress : 100 - progress
        };
      }

      getForwardPairRole(player) {
        if (!this.isForwardRole(player.role)) return null;
        const forwards = player.team.players.filter((candidate) => this.isForwardRole(candidate.role));
        const depthForward = forwards.find((candidate) => candidate.number === 9) ||
          [...forwards].sort((a, b) => b.baseX - a.baseX)[0];

        return player === depthForward ? "depth" : "support";
      }

      isSupportStriker(player) {
        return this.isForwardRole(player?.role) && player !== this.getNumberNine(player.team);
      }

      isWideAttackCarrier(player = this.possession) {
        if (!player) return false;
        const progress = this.getAttackProgress(player, player.team);
        return (player.x < 30 || player.x > 70) && progress >= 54;
      }

      getDynamicDefensiveLineY(team, mentality, inPossession = false) {
        const rules = this.tacticalRules.defensiveLine;
        const direction = team.attacksDown ? 1 : -1;
        const ballProgress = team.attacksDown ? this.possession.y : 100 - this.possession.y;
        let lineFromOwnGoal;

        if (inPossession) {
          lineFromOwnGoal = this.getTeamPhase(team, true) === "buildUp" ? rules.buildUp : rules.highBlock;
        } else if (ballProgress < 32) {
          lineFromOwnGoal = rules.ownBox;
        } else if (ballProgress < 52) {
          lineFromOwnGoal = rules.lowBlock;
        } else if (ballProgress < 72) {
          lineFromOwnGoal = rules.midBlock;
        } else {
          lineFromOwnGoal = rules.highBlock;
        }

        if (mentality === "chasing") lineFromOwnGoal -= this.tacticalRules.mentality.chasingLinePush;
        if (mentality === "protecting") lineFromOwnGoal += this.tacticalRules.mentality.protectingLineDrop;

        const ownGoalY = team.attacksDown ? 0 : 100;
        return this.clamp(ownGoalY + direction * lineFromOwnGoal, 12, 88);
      }

      getPossessionMoveSpeed(player, context) {
        const overallSpeed = this.getSuccessFactor(player, 0.06);
        if (context.counter && this.canJoinAttack(player)) return 2.15 * overallSpeed;
        if (this.isWideRole(player.role) || this.isMidfieldRole(player.role)) return 1.85 * overallSpeed;
        if (this.isDefensiveLineRole(player.role)) return 1.35 * overallSpeed;
        return 1.55 * overallSpeed;
      }

      assignCoverMarks(team, pressers, reserved = new Set()) {
        const marks = new Map();
        const candidates = team.players
          .filter((player) => !pressers.includes(player))
          .filter((player) => !reserved.has(player))
          .filter((player) => player.role !== "GOL")
          .filter((player) => !this.isDefensiveLineRole(player.role) || this.hasInvadedDefensiveZone(this.possession, team));
        const available = new Set(candidates);

        pressers.forEach((presser) => {
          const cover = [...available]
            .map((player) => ({
              player,
              distance: this.distanceBetween(player, presser),
              centrality: Math.abs(player.x - 50)
            }))
            .filter((item) => item.distance < 26)
            .sort((a, b) => a.distance + a.centrality * 0.12 - (b.distance + b.centrality * 0.12))[0]?.player;

          if (cover) {
            marks.set(cover, this.getCoverTarget(cover, presser));
            available.delete(cover);
          }
        });

        return marks;
      }

      assignPassingLaneCovers(team, pressers, context = this.getTacticalContext(team)) {
        const covers = new Map();
        if (!this.possession || this.possession.team === team) return covers;

        const rules = this.tacticalRules.passingLaneCover;
        const coverCount = this.isPostLossPressTeam(team) ? rules.postLossClosers : rules.normalClosers;
        const passOptions = this.getLikelyOpponentPassOptions(team).slice(0, coverCount + 1);
        const candidates = team.players
          .filter((player) => !pressers.includes(player))
          .filter((player) => player.role !== "GOL")
          .filter((player) => !this.isDefensiveLineRole(player.role) || this.hasInvadedDefensiveZone(this.possession, team));
        const available = new Set(candidates);

        passOptions.forEach((receiver) => {
          if (covers.size >= coverCount) return;
          const lanePoint = this.pointBetween(this.possession, receiver, 0.55);
          const cover = [...available]
            .map((player) => {
              const roleBias = this.isMidfieldRole(player.role) ? 0 : (this.isForwardRole(player.role) ? 2.5 : 5);
              return {
                player,
                laneDistance: this.distanceToSegment(player, this.possession, receiver),
                distance: this.distanceBetween(player, lanePoint),
                roleBias
              };
            })
            .filter((item) => item.laneDistance <= rules.maxLaneDistance || item.distance <= rules.maxPlayerDistance)
            .sort((a, b) => a.laneDistance * 1.3 + a.distance * 0.35 + a.roleBias - (b.laneDistance * 1.3 + b.distance * 0.35 + b.roleBias))[0]?.player;

          if (cover) {
            covers.set(cover, this.getCoverShadowTarget(cover, receiver, context));
            available.delete(cover);
          }
        });

        return covers;
      }

      getLikelyOpponentPassOptions(defendingTeam) {
        const attackingTeam = this.getOpponentTeam(defendingTeam);
        return attackingTeam.players
          .filter((player) => player !== this.possession && player.role !== "GOL")
          .map((player) => {
            const distance = this.distanceBetween(this.possession, player);
            const laneSafety = this.getPassingLaneSafety(this.possession, player, defendingTeam.players);
            const progress = this.getPassProgress(this.possession, player, attackingTeam);
            const roleBias = this.isForwardRole(player.role) ? 1.15 : (this.isMidfieldRole(player.role) ? 1.05 : 0.82);
            const distanceBias = this.getPassDistanceBias(distance);
            const forwardBias = progress > -6 ? 1.1 : 0.72;
            return {
              player,
              score: laneSafety * distanceBias * roleBias * forwardBias * (0.8 + (player.spaceScore || 0) * 0.4)
            };
          })
          .sort((a, b) => b.score - a.score)
          .map((item) => item.player);
      }

      getCoverShadowTarget(player, receiver, context) {
        const lanePoint = this.pointBetween(this.possession, receiver, 0.52);
        const ownGoal = this.getOwnGoalPoint(player.team);
        const protectedPoint = this.pointBetween(lanePoint, ownGoal, 0.14);
        const side = Math.sign(player.baseX - 50) || this.getPlayerSideSign(player) || 1;
        const target = {
          x: protectedPoint.x + side * 1.8,
          y: protectedPoint.y
        };

        return this.clampToRoleZone(player, target, context);
      }

      getCoverTarget(cover, presser) {
        const ownGoal = this.getOwnGoalPoint(cover.team);
        const coverPoint = this.pointBetween(this.possession, ownGoal, 0.18);
        const side = Math.sign(cover.baseX - presser.baseX) || Math.sign(cover.baseX - 50) || 1;

        return {
          x: coverPoint.x + side * this.tacticalRules.zoneMarking.coverDistance * 0.35,
          y: coverPoint.y
        };
      }

      getGoalkeeperHomeTarget(player) {
        return { x: player.baseX, y: player.baseY };
      }

      getGoalkeeperSupportTarget(player, context) {
        if (context.phase !== "buildUp" || player.team !== this.possession.team) {
          return this.getGoalkeeperHomeTarget(player);
        }

        const direction = player.team.attacksDown ? 1 : -1;
        return {
          x: this.clamp(50 + (this.possession.x - 50) * 0.16, 43, 57),
          y: this.clamp(player.baseY + direction * 5.5, 6, 94)
        };
      }

      decideBallAction() {
        if (this.shotInProgress) return;

        const carrier = this.possession;
        const context = this.getTacticalContext(carrier.team);
        const intent = context.intent;
        const inShotZone = this.isInShotZone(carrier);

        if (inShotZone) {
          const shotZoneKey = `${carrier.team.name}-${carrier.number}`;
          if (this.lastShotZoneKey !== shotZoneKey) {
            this.addEventLog({
              time: this.clock.textContent,
              type: carrier.team.id,
              title: "Entrou na zona de finalizacao",
              detail: `${this.formatPlayer(carrier)} recebeu perto do gol e pode acelerar a jogada.`,
              meta: [this.describePressure(carrier.pressure), "perigo no ataque"]
            });
            this.lastShotZoneKey = shotZoneKey;
          }
        } else {
          this.lastShotZoneKey = "";
        }

        if (intent === "finish" && this.shouldShoot(carrier)) {
          this.shootBall(carrier);
          return;
        }

        if ((intent === "create" || intent === "finish") && this.tryFinalThirdAction(carrier)) return;

        const hasStructuredPass = this.hasStructuredPassOption(carrier);
        if (inShotZone && (intent === "create" || intent === "finish")) {
          if (this.shouldShoot(carrier)) {
            this.shootBall(carrier);
            return;
          }
          if (this.tryDribble(carrier)) return;
        }

        if (!hasStructuredPass && intent !== "recycle" && intent !== "switch" && this.tryDribble(carrier)) return;

        if (carrier.pressure > 0.66) {
          this.passBall(intent);
          return;
        }

        if (this.tryPressureSteal()) return;

        if (intent === "progress" && this.shouldCarryBall(carrier, hasStructuredPass)) {
          this.logCarry(carrier);
          this.updateBall(true);
          this.updateStatus();
          return;
        }

        this.passBall(intent);
      }

      passBall(intent = "progress") {
        const passer = this.possession;
        const option = this.choosePassOption(intent);
        const receiver = option?.receiver || passer;
        if (receiver === passer) return;

        if (option.offside) {
          this.logOffside(passer, option.intended, receiver, option.offsideLine);
          this.updatePossession(receiver, true);
          return;
        }

        this.logBallMovement(passer, receiver, option);
        if (!option.intercepted) {
          this.registerCompletedPass(passer, receiver, option);
          this.triggerGiveAndGoRun(passer, receiver);
        }
        this.updatePossession(receiver, true);
      }

      choosePassOption(intent = "progress") {
        const allPlayers = this.teams.flatMap((team) => team.players);
        const candidates = allPlayers.filter((player) => player !== this.possession);
        const sameTeam = candidates.filter((player) => player.team === this.possession.team);
        const opponents = candidates.filter((player) => player.team !== this.possession.team);
        const forwardOptions = sameTeam.filter((player) => this.getPassProgress(this.possession, player, this.possession.team) >= -5);
        const hasForwardOption = forwardOptions.some((player) => player.spaceScore > 0.35 && player.pressure < 0.72);
        const underPressure = this.possession.pressure > 0.58;
        const passPool = this.getPassPool(sameTeam);
        const weighted = passPool.map((player) => {
          const distance = Math.max(this.possession.distanceTo(player), 3);
          const proximity = 120 / distance;
          const progress = this.getPassProgress(this.possession, player, this.possession.team);
          const laneSafety = this.getPassingLaneSafety(this.possession, player, opponents);
          const forwardBias = this.forwardValue(player, this.possession.team, progress, hasForwardOption, underPressure);
          const lateralBias = this.lateralPassValue(progress, distance);
          const openSpaceBias = 0.75 + player.spaceScore * 2.25;
          const pressureBias = Math.max(0.28, 1.12 - player.pressure * 0.85);
          const distanceBias = this.getPassDistanceBias(distance);
          const laneSafetyBias = Math.max(0.18, Math.pow(laneSafety, this.tacticalRules.passing.laneSafetyWeight));
          const triangleBias = 1 + this.getTriangleSupportScore(player, player, this.possession) * 0.55;
          const switchBias = this.isSwitchOption(this.possession, player, player) && laneSafety > 0.62 ? 1.45 : 1;
          const comboBias = this.getComboPassBias(player);
          const reliefBias = this.getPressureReliefBias(distance, this.possession.pressure);
          const goalkeeperBias = this.getGoalkeeperPassBias(player, distance);
          const counterBias = this.getCounterPassBias(player, progress);
          const buildUpBias = this.getBuildUpPassBias(this.possession, player, distance, laneSafety);
          const lateralEscapeBias = this.getLateralPressureEscapeBias(this.possession, player, progress, distance, laneSafety);
          const intentBias = this.getIntentPassBias(this.possession, player, intent, progress, distance, laneSafety);
          const offsideBias = this.isOffsidePass(this.possession, player).offside ? this.tacticalRules.offside.passWeightPenalty : 1;
          const overallBias = this.getSuccessFactor(this.possession, 0.08) * this.getSuccessFactor(player, 0.06);
          return {
            player,
